<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Walk-in Frozen & Chiller | v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #fff;
            --text: #1e293b;
            --primary: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --orange: #f97316;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 20px;
            --move-color: #8b5cf6;
            --in-color: #10b981;
            --out-color: #ef4444;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #e0e7ff, #f0f4ff);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            width: 100%;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .area-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .area-selector select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-weight: 600;
        }
        .user-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-bar {
            display: flex;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 6px 12px;
            gap: 6px;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1 0 auto;
            padding: 10px 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: #64748b;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.82rem;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .container {
            width: 100%;
            max-width: 780px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 16px;
            box-shadow: var(--shadow);
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 4px;
        }
        input,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #f8fafc;
        }
        .btn {
            padding: 12px 18px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.75rem;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 12px;
            margin-bottom: 6px;
        }
        .item-row.expired {
            background: #fee2e2;
            border: 1px solid #ef4444;
        }
        .empty-state {
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
            z-index: 200;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .chip {
            background: #e2e8f0;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 2px;
        }
        .baris-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            margin-top: 10px;
            margin-bottom: 4px;
            background: #e2e8f0;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .rekap-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .rekap-tab {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .rekap-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .rekap-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .rekap-table th {
            background: #1e3a5f;
            color: white;
            padding: 10px 8px;
            text-align: left;
        }
        .rekap-table td {
            padding: 9px 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .stat-box {
            background: #f0f4ff;
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .stat-box .val {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
        }
        .stat-box .lbl {
            font-size: 0.75rem;
            color: #64748b;
        }
        .stat-box.out {
            background: #fff0f0;
        }
        .stat-box.out .val {
            color: var(--danger);
        }
        .section-badge {
            background: #dbeafe;
            color: #1d4ed8;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 2px;
            display: inline-block;
        }
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-row select {
            width: auto;
            padding: 8px 12px;
            font-size: 0.85rem;
        }
        .reset-btn {
            background: #fee2e2;
            color: #ef4444;
            border: 2px solid #ef4444;
            padding: 10px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
        }
        .google-btn {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
            width: 100%;
        }

        /* Denah - kotak tidak persegi, cukup tinggi untuk 5 slot */
        .fp-room {
            border: 3px solid #1e293b;
            border-radius: 10px;
            padding: 10px;
            overflow-x: auto;
        }
        .fp-room-title {
            font-weight: 800;
            font-size: 0.95rem;
            color: #1e293b;
            margin-bottom: 10px;
            text-align: center;
        }
        .fp-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 8px 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .baris-box {
            width: 110px;
            height: 175px;
            background: #fde68a;
            border: 2.5px solid #d97706;
            border-radius: 10px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .baris-box-lbl {
            font-size: 0.6rem;
            font-weight: 800;
            color: #92400e;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
        }
        .baris-slots {
            display: flex;
            flex-direction: column-reverse;
            gap: 1px;
            flex: 1;
            min-height: 0;
        }

        .basket-slot {
            flex: 1;
            min-height: 0;
            border-radius: 5px;
            background: #fff;
            border: 1.5px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
            overflow: hidden;
        }
        .basket-slot:active {
            transform: scale(0.95);
        }
        .basket-slot.green {
            border-color: var(--success);
            background: #ecfdf5;
        }
        .basket-slot.orange {
            border-color: var(--orange);
            background: #fff7ed;
            animation: softPulse 1.8s infinite;
        }
        .basket-slot.red {
            border-color: var(--danger);
            background: #fef2f2;
            animation: strongPulse 0.9s infinite;
        }
        .basket-slot.slot-empty {
            background: #f8fafc;
            border: 1.5px dashed #d1d5db;
            cursor: default;
        }
        .slot-num {
            font-weight: 800;
            font-size: 0.6rem;
            line-height: 1;
            color: #1e293b;
        }
        .slot-count {
            font-size: 0.5rem;
            color: #64748b;
        }
        .slot-alert {
            position: absolute;
            top: -3px;
            right: -3px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 11px;
            height: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.4rem;
            font-weight: bold;
            z-index: 5;
        }

        .baris-box.stock-box {
            background: #e0e7ff;
            border-color: #6366f1;
            justify-content: center;
            align-items: center;
            gap: 4px;
            width: 110px;
            height: 175px;
        }
        .baris-box.stock-box .baris-box-lbl {
            color: #4338ca;
            font-size: 0.58rem;
            white-space: normal;
            text-align: center;
            line-height: 1.3;
            margin: 0;
        }
        .stock-icon {
            font-size: 1.8rem;
        }

        .spacer {
            min-height: 40px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8d3df;
            font-size: 0.75rem;
            flex: 1;
        }
        .spacer-box {
            width: 110px;
            height: 175px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px dashed #d1d5db;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8d3df;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .frz-plan {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 820px;
        }
        .frz-body {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .frz-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .frz-right {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .frz-bot {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .boxes-row {
            display: flex;
            gap: 8px;
        }

        .chl-plan {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 840px;
        }
        .chl-top {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .chl-space {
            min-height: 80px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8d3df;
            font-size: 0.75rem;
        }
        .chl-bot {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .move-form {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 8px;
            margin-top: 6px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .move-form select {
            width: auto;
            padding: 6px;
        }

        /* Riwayat - badge warna */
        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .history-item.type-in {
            background: #ecfdf5;
            border-left: 6px solid var(--in-color);
        }
        .history-item.type-out {
            background: #fef2f2;
            border-left: 6px solid var(--out-color);
        }
        .history-item.type-move {
            background: #f5f3ff;
            border-left: 6px solid var(--move-color);
        }
        .history-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }
        .badge-in {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-out {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-move {
            background: #ede9fe;
            color: #5b21b6;
        }

        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.3) }
            50% { box-shadow: 0 0 0 5px rgba(249, 115, 22, 0.1) }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.3) }
        }
        @keyframes strongPulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5) }
            50% { box-shadow: 0 0 0 7px rgba(239, 68, 68, 0.15) }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5) }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="container" style="max-width:400px;margin-top:40px;">
        <div class="card" style="text-align:center">
            <h2>🔐 Masuk Walk-in</h2>
            <p style="color:#64748b;margin-bottom:16px;">Gunakan akun tim</p>
            <div class="form-group"><input type="email" id="loginEmail" value="tim@walkin.com"></div>
            <div class="form-group"><input type="password" id="loginPassword" value="frozen2024"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Masuk</button>
            <button class="google-btn" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Login dengan Google</button>
            <p id="loginError" style="color:red;margin-top:10px;"></p>
        </div>
    </div>

    <div id="appScreen" style="display:none;width:100%;">
        <div class="header">
            <h2>🧊 Walk-in <span id="areaTitle">Frozen</span></h2>
            <div class="area-selector">
                <span style="color:white;">Area:</span>
                <select id="areaSelect" onchange="switchArea()">
                    <option value="frozen">❄️ Frozen</option>
                    <option value="chiller">🌡️ Chiller</option>
                </select>
            </div>
            <div class="user-row">
                <span id="currentUserName" style="font-size:0.8rem;color:white;"></span>
                <button class="btn-outline" style="color:white;border-color:white;padding:4px 10px;" onclick="logout()">Keluar</button>
            </div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="dashboard">🗺️ Denah</button>
            <button class="tab-btn" data-tab="in">📥 Masuk</button>
            <button class="tab-btn" data-tab="history">📋 Riwayat</button>
            <button class="tab-btn" data-tab="rekap">📊 Rekap</button>
            <button class="tab-btn" data-tab="manage">⚙️ Atur</button>
        </div>
        <div class="container" id="appContainer"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1K3kQ93LSz1yKpBa2cMCRD045alTm6cs",
            authDomain: "walk-in-web.firebaseapp.com",
            projectId: "walk-in-web",
            storageBucket: "walk-in-web.firebasestorage.app",
            messagingSenderId: "42449089338",
            appId: "1:42449089338:web:a34b589a7c746b8dcc1603"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentArea = 'frozen';
        let appData = {
            frozen: { sections: {}, baskets: {}, transactions: [] },
            chiller: { sections: {}, baskets: {}, transactions: [] }
        };
        let currentTab = 'dashboard';
        let rekapMode = 'bulanan';
        let unsubscribe = null;
        const ADMIN_EMAILS = ['slardar.men@gmail.com'];

        // Default denah sesuai spesifikasi:
        const defaultFrozenSections = {
            'IMP': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null, null], D: [null, null, null, null, null], E: [null, null, null, null, null] },
            'RTL': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null, null] },
            'NPL': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null, null] },
            'RDQ': { A: [null, null, null, null, null] },
            'MTPP': { A: [null, null, null, null, null], B: [null, null, null, null, null] },
            'MI': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null, null] }
        };
        const defaultChillerSections = {
            'IMP': { A: [null, null, null, null, null] },
            'RTL': { A: [null, null, null, null, null] },
            'NPL': { A: [null, null, null, null, null] },
            'MTPP': { A: [null, null, null, null, null] },
            'RDQ': { A: [null, null, null, null, null] },
            'MI': { A: [null, null, null, null, null] },
            'THAWING': { A: [null, null, null, null, null], B: [null, null, null, null, null] }
        };

        function getDefaultSections(area) {
            return area === 'frozen' ? JSON.parse(JSON.stringify(defaultFrozenSections)) : JSON.parse(JSON.stringify(defaultChillerSections));
        }
        function upgradeBarisToSlots(barisData) {
            if (!barisData || !Array.isArray(barisData)) return [null, null, null, null, null];
            const slots = [null, null, null, null, null];
            barisData.forEach((no, i) => { if (i < 5 && no !== null && no !== undefined) slots[i] = no; });
            return slots;
        }
        function convertSectionsToSlotFormat(sections) {
            const out = {};
            for (const [sec, barisObj] of Object.entries(sections)) {
                const converted = {};
                for (const [b, val] of Object.entries(barisObj)) {
                    converted[b] = (Array.isArray(val) && val.length === 5 && val.every(v => v === null || typeof v === 'number')) ? val : upgradeBarisToSlots(val);
                }
                out[sec] = converted;
            }
            return out;
        }

        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            auth.signInWithEmailAndPassword(email, pass).catch(e => document.getElementById('loginError').textContent = 'Gagal: ' + e.message);
        }
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => document.getElementById('loginError').textContent = 'Google login gagal: ' + e.message);
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('currentUserName').textContent = user.email;
                listenToFirestore();
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('appScreen').style.display = 'none';
                if (unsubscribe) unsubscribe();
            }
        });

        function listenToFirestore() {
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection('shared').doc('data').onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    let fData = data.frozen || { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] };
                    let cData = data.chiller || { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };
                    fData.sections = convertSectionsToSlotFormat(fData.sections || {});
                    cData.sections = convertSectionsToSlotFormat(cData.sections || {});
                    appData.frozen = fData; appData.chiller = cData;
                    syncBasketsWithSections('frozen'); syncBasketsWithSections('chiller');
                    if (!data.frozen) saveToFirestore();
                    renderCurrentTab();
                } else {
                    appData.frozen = { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] };
                    appData.chiller = { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };
                    syncBasketsWithSections('frozen'); syncBasketsWithSections('chiller');
                    saveToFirestore();
                    renderCurrentTab();
                }
            });
        }
        function saveToFirestore() {
            db.collection('shared').doc('data').set({ frozen: appData.frozen, chiller: appData.chiller }, { merge: true });
        }
        function syncBasketsWithSections(area) {
            const sections = appData[area].sections;
            const baskets = appData[area].baskets;
            const validNos = new Set();
            for (const barisObj of Object.values(sections))
                for (const slots of Object.values(barisObj))
                    slots.forEach(no => { if (no !== null) validNos.add(no); });
            for (const no of Object.keys(baskets))
                if (!validNos.has(Number(no))) delete baskets[no];
            for (const [sec, barisObj] of Object.entries(sections))
                for (const [baris, slots] of Object.entries(barisObj))
                    slots.forEach((no, idx) => {
                        if (no === null) return;
                        if (!baskets[no]) baskets[no] = { section: sec, baris, slot: idx + 1, items: [] };
                        else { baskets[no].section = sec; baskets[no].baris = baris; baskets[no].slot = idx + 1; }
                    });
        }
        function currentSections() { return appData[currentArea].sections; }
        function currentBaskets() { return appData[currentArea].baskets; }
        function currentTransactions() { return appData[currentArea].transactions; }
        function switchArea() {
            currentArea = document.getElementById('areaSelect').value;
            document.getElementById('areaTitle').textContent = currentArea === 'frozen' ? 'Frozen' : 'Chiller';
            renderCurrentTab();
        }
        function itemCount(no) { return (currentBaskets()[no]?.items || []).length; }
        function hasExpiredItems(no) {
            const items = currentBaskets()[no]?.items || [];
            const now = new Date();
            return items.some(i => (i.expDate && new Date(i.expDate) < now) || (i.estOutDate && new Date(i.estOutDate) < now));
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
        function logTransaction(type, detail) {
            currentTransactions().unshift({ id: Date.now(), timestamp: new Date().toISOString(), type, detail, user: auth.currentUser?.email || 'unknown' });
            if (currentTransactions().length > 500) currentTransactions().pop();
            saveToFirestore();
        }
        function isAdmin() {
            const user = auth.currentUser;
            if (!user) return false;
            return user.providerData.some(p => p.providerId === 'google.com') && ADMIN_EMAILS.includes(user.email);
        }
        async function resetAllData() {
            if (!isAdmin()) { showToast('⚠️ Hanya admin yang bisa mereset data.'); return; }
            if (!confirm('⚠️ PERINGATAN! Semua data keranjang, isi, dan riwayat akan DIHAPUS TOTAL. Lanjutkan?')) return;
            if (!confirm('⚠️ Terakhir: Data akan hilang permanen dari Firestore. Yakin?')) return;
            await db.collection('shared').doc('data').set({
                frozen: { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] },
                chiller: { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] }
            });
            showToast('✅ Semua data berhasil dihapus dari Firestore.');
        }

        const container = document.getElementById('appContainer');
        function renderCurrentTab() {
            try {
                switch (currentTab) {
                    case 'dashboard': renderDashboard(); break;
                    case 'in': renderInputForm(); break;
                    case 'history': renderHistory(); break;
                    case 'rekap': renderRekap(); break;
                    case 'manage': renderManageBaskets(); break;
                }
            } catch (e) { console.error(e); container.innerHTML = '<div class="card"><div class="empty-state">Error. Refresh halaman.</div></div>'; }
        }

        function buildBasketSlot(no, slotIdx) {
            if (no === null) return `<div class="basket-slot slot-empty"></div>`;
            const count = itemCount(no);
            const expired = hasExpiredItems(no);
            let cls = 'basket-slot';
            if (count >= 5) cls += ' orange';
            else if (expired) cls += ' red';
            else if (count > 0) cls += ' green';
            else cls += ' slot-empty';
            const badge = (expired || count >= 5) ? '<span class="slot-alert">!</span>' : '';
            return `<div class="${cls}" onclick="showBasketDetail(${no})" title="Keranjang ${no} — ${count}/5${expired?' ⚠️':''}">
                <span class="slot-num">${no}</span>
                <span class="slot-count">${count}/5</span>
                ${badge}
            </div>`;
        }
        function buildBarisBox(secName, barisIdx, slots) {
            const num = String(barisIdx + 1).padStart(2, '0');
            const lbl = `${secName} ${num}`;
            let slotElements = '';
            for (let i = 0; i < 5; i++) {
                slotElements += buildBasketSlot(slots[i], i);
            }
            return `<div class="baris-box">
                <div class="baris-box-lbl">${lbl}</div>
                <div class="baris-slots">${slotElements}</div>
            </div>`;
        }
        function getSecBoxes(secName) {
            const barisObj = currentSections()[secName] || {};
            return Object.entries(barisObj).map(([b, slots], idx) => buildBarisBox(secName, idx, slots)).join('');
        }

        // ─── DETAIL KERANJANG + PINDAH + KELUAR ───
        function showBasketDetail(no, moveItemIdx = null) {
            const basket = currentBaskets()[no];
            const count = itemCount(no);
            const now = new Date();
            let itemsHtml = basket && basket.items.length ?
                basket.items.map((item, idx) => {
                    let cls = '', lbl = '';
                    if (item.expDate && new Date(item.expDate) < now) { cls = 'expired'; lbl = ' ⚠️ EXP'; }
                    else if (item.estOutDate && new Date(item.estOutDate) < now) { cls = 'expired'; lbl = ' ⚠️ EST LEWAT'; }
                    const moveFormHtml = (moveItemIdx === idx) ? renderMoveForm(no, idx) : '';
                    return `<div class="item-row ${cls}">
                        <div>
                            <strong>${item.nama}</strong> (${item.qty})${lbl}
                            <br><small>${item.jenis||''} | Masuk: ${item.tglMasuk?new Date(item.tglMasuk).toLocaleDateString('id-ID'):'-'}
                            ${item.expDate?' | Exp: '+new Date(item.expDate).toLocaleDateString('id-ID'):''}
                            ${item.estOutDate?' | Est.Keluar: '+new Date(item.estOutDate).toLocaleDateString('id-ID'):''}</small>
                        </div>
                        <div style="display:flex; gap:4px;">
                            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); showBasketDetail(${no}, ${idx})">Pindah</button>
                            <button class="btn btn-outline btn-sm" onclick="keluarkanItem(${no}, ${idx})">Keluar</button>
                        </div>
                        ${moveFormHtml}
                    </div>`;
                }).join('') : '<div class="empty-state">Keranjang kosong</div>';

            container.innerHTML = `<div class="card">
                <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                    <h3>Keranjang ${no}${basket?' — Baris '+basket.baris+' Slot '+basket.slot+' ('+basket.section+')':''}</h3>
                    <button class="btn btn-outline btn-sm" onclick="renderDashboard()">← Denah</button>
                </div>
                <p style="margin-bottom:12px;">Total item: ${count}/5</p>
                ${itemsHtml}
            </div>`;
        }
        function renderMoveForm(fromNo, fromIdx) {
            const sections = Object.keys(currentSections());
            const sectionOpts = sections.map(s => `<option value="${s}">${s}</option>`).join('');
            return `<div class="move-form" onclick="event.stopPropagation();">
                <select id="moveSection" onchange="updateMoveBaris()">${sectionOpts}</select>
                <select id="moveBaris" onchange="updateMoveKeranjang()"><option>-- Baris --</option></select>
                <select id="moveKeranjang"><option>-- Keranjang --</option></select>
                <button class="btn btn-sm btn-primary" onclick="pindahkanItem(${fromNo}, ${fromIdx})">Pindahkan</button>
            </div>`;
        }
        function updateMoveBaris() {
            const sec = document.getElementById('moveSection')?.value;
            const barisSel = document.getElementById('moveBaris');
            if (!barisSel) return;
            barisSel.innerHTML = '<option value="">-- Baris --</option>';
            if (!sec) return;
            const barisObj = currentSections()[sec] || {};
            Object.keys(barisObj).forEach((baris, idx) => {
                barisSel.innerHTML += `<option value="${baris}">${sec} ${String(idx+1).padStart(2,'0')}</option>`;
            });
            updateMoveKeranjang();
        }
        function updateMoveKeranjang() {
            const sec = document.getElementById('moveSection')?.value;
            const baris = document.getElementById('moveBaris')?.value;
            const kerSel = document.getElementById('moveKeranjang');
            if (!kerSel) return;
            kerSel.innerHTML = '<option value="">-- Keranjang --</option>';
            if (!sec || !baris) return;
            const slots = currentSections()[sec][baris];
            if (slots) {
                slots.forEach((no, idx) => {
                    if (no === null) return;
                    const c = itemCount(no);
                    kerSel.innerHTML += `<option value="${no}" ${c>=5?'disabled':''}>Keranjang ${no} (Slot ${idx+1}) ${c}/5</option>`;
                });
            }
        }
        function pindahkanItem(fromNo, fromIdx) {
            const toNo = parseInt(document.getElementById('moveKeranjang')?.value);
            if (!toNo) return showToast('Pilih keranjang tujuan.');
            if (toNo === fromNo) return showToast('Tidak bisa pindah ke keranjang yang sama.');
            if (itemCount(toNo) >= 5) return showToast('Keranjang tujuan sudah penuh.');
            const fromBasket = currentBaskets()[fromNo];
            if (!fromBasket || !fromBasket.items[fromIdx]) return;
            const item = fromBasket.items[fromIdx];
            fromBasket.items.splice(fromIdx, 1);
            if (!currentBaskets()[toNo]) currentBaskets()[toNo] = { section: currentBaskets()[toNo]?.section || '', items: [] };
            currentBaskets()[toNo].items.push(item);
            logTransaction('move', { nama: item.nama, qty: item.qty, jenis: item.jenis, dari: fromNo, ke: toNo });
            saveToFirestore();
            showToast('✅ Barang dipindahkan.');
            showBasketDetail(fromNo);
        }
        function keluarkanItem(no, idx) {
            const basket = currentBaskets()[no]; if (!basket) return;
            const item = basket.items[idx];
            if (confirm(`Keluarkan "${item.nama}" dari keranjang ${no}?`)) {
                basket.items.splice(idx, 1);
                logTransaction('out', { nama: item.nama, qty: item.qty, jenis: item.jenis, keranjang: no, section: basket.section });
                saveToFirestore(); showToast('✅ Barang dikeluarkan'); showBasketDetail(no);
            }
        }

        // ─── INPUT BARANG (SLOT 1-5, WAJIB EXP & EST) ───
        function renderInputForm() {
            const sectionOpt = Object.keys(currentSections()).map(s => `<option value="${s}">${s}</option>`).join('');
            container.innerHTML = `<div class="card"><h3>📥 Barang Masuk</h3>
                <form id="inForm" onsubmit="submitIn(event)">
                    <div class="form-group"><label>Nama Barang</label><input type="text" id="inNama" list="namaList" required><datalist id="namaList"></datalist></div>

                    <div class="form-group"><label>Jenis</label><select id="inJenis"><option value="IIP">IIP</option><option value="RM">RM</option><option value="TH">TH</option></select></div>
                    <div class="form-group"><label>Tanggal Exp (wajib)</label><input type="date" id="inExpDate" required></div>
                    <div class="form-group"><label>Estimasi Keluar (wajib)</label><input type="date" id="inEstOutDate" required></div>
                    <div class="form-group"><label>Section</label><select id="inSection" onchange="updateBarisSelect()">${sectionOpt}</select></div>
                    <div class="form-group"><label>Baris</label><select id="inBaris" onchange="updateSlotSelect()"><option value="">-- Pilih --</option></select></div>
                    <div class="form-group"><label>Slot (1-5)</label><select id="inSlot" onchange="handleSlotChange()"><option value="">-- Pilih Slot --</option></select></div>
                    <div class="form-group"><label>Nomor Keranjang Baru (isi jika slot kosong)</label><input type="number" id="inKeranjangManual" placeholder="Nomor keranjang baru" min="1"></div>
                    <button type="submit" class="btn btn-primary" style="width:100%">💾 Simpan</button>
                </form></div>`;
            updateBarisSelect();
            updateNamaDatalist();
            // Awal, disable input manual
            document.getElementById('inKeranjangManual').disabled = true;
        }
        function updateBarisSelect() {
            const section = document.getElementById('inSection')?.value;
            const barisSelect = document.getElementById('inBaris');
            if (!barisSelect) return;
            barisSelect.innerHTML = '<option value="">-- Pilih --</option>';
            if (section) {
                const barisObj = currentSections()[section] || {};
                Object.keys(barisObj).forEach((baris, idx) => {
                    barisSelect.innerHTML += `<option value="${baris}">${section} ${String(idx+1).padStart(2,'0')}</option>`;
                });
                if (Object.keys(barisObj).length > 0) {
                    barisSelect.value = Object.keys(barisObj)[0];
                    updateSlotSelect();
                }
            } else {
                document.getElementById('inSlot').innerHTML = '<option value="">-- Pilih Slot --</option>';
                document.getElementById('inKeranjangManual').disabled = true;
            }
        }
        function updateSlotSelect() {
            const section = document.getElementById('inSection')?.value;
            const baris = document.getElementById('inBaris')?.value;
            const select = document.getElementById('inSlot');
            if (!select) return;
            select.innerHTML = '<option value="">-- Pilih Slot --</option>';
            if (!section || !baris) return;
            const slots = currentSections()[section]?.[baris];
            if (!slots) return;
            for (let i = 0; i < 5; i++) {
                const no = slots[i];
                const slotNum = i + 1;
                let label = `Slot ${slotNum}`;
                let disabled = false;
                if (no !== null) {
                    const count = itemCount(no);
                    label += `: ${no} (${count}/5)`;
                    if (count >= 5) {
                        label += ' - PENUH';
                        disabled = true;
                    }
                } else {
                    label += ' (kosong)';
                }
                select.innerHTML += `<option value="${slotNum}" ${disabled?'disabled':''}>${label}</option>`;
            }
            // Reset manual input dan panggil handleSlotChange jika ada slot terpilih
            handleSlotChange();
        }
        function handleSlotChange() {
            const slot = parseInt(document.getElementById('inSlot')?.value);
            const manualInput = document.getElementById('inKeranjangManual');
            if (!manualInput) return;
            if (!slot || isNaN(slot)) {
                manualInput.disabled = true;
                manualInput.value = '';
                manualInput.placeholder = 'Pilih slot dulu';
                return;
            }
            const section = document.getElementById('inSection')?.value;
            const baris = document.getElementById('inBaris')?.value;
            const slots = currentSections()[section]?.[baris];
            if (!slots) return;
            const no = slots[slot - 1];
            if (no !== null && no !== undefined) {
                manualInput.disabled = true;
                manualInput.value = '';
                manualInput.placeholder = `Akan menggunakan keranjang ${no}`;
            } else {
                manualInput.disabled = false;
                manualInput.placeholder = 'Nomor keranjang baru (wajib)';
                manualInput.focus();
            }
        }
        function updateNamaDatalist() {
            const set = new Set();
            currentTransactions().forEach(t => { if (t.detail?.nama) set.add(t.detail.nama); });
            const dl = document.getElementById('namaList');
            if (dl) dl.innerHTML = [...set].map(n => `<option value="${n}">`).join('');
        }
        function submitIn(e) {
            e.preventDefault();
            const nama = document.getElementById('inNama').value.trim();
            const qty = document.getElementById('inQty').value.trim();
            const jenis = document.getElementById('inJenis').value;
            const expDate = document.getElementById('inExpDate').value;
            const estOutDate = document.getElementById('inEstOutDate').value;
            const section = document.getElementById('inSection').value;
            const baris = document.getElementById('inBaris').value;
            const slotStr = document.getElementById('inSlot').value;
            const keranjangManual = document.getElementById('inKeranjangManual')?.value.trim();

            if (!nama || !qty) return showToast('Lengkapi data!');
            if (!baris) return showToast('Pilih Baris terlebih dahulu.');
            if (!slotStr) return showToast('Pilih Slot (1-5).');
            if (!expDate) return showToast('Tanggal Exp wajib diisi.');
            if (!estOutDate) return showToast('Estimasi Keluar wajib diisi.');

            const slotIndex = parseInt(slotStr) - 1;
            const slots = currentSections()[section]?.[baris];
            if (!slots) return showToast('Data baris tidak valid.');

            let no = slots[slotIndex];
            if (no === null || no === undefined) {
                if (!keranjangManual || isNaN(parseInt(keranjangManual)) || parseInt(keranjangManual) <= 0) {
                    return showToast('Slot kosong. Harap masukkan Nomor Keranjang Baru.');
                }
                const newNo = parseInt(keranjangManual);
                for (const [sec, barisObj] of Object.entries(currentSections())) {
                    for (const sl of Object.values(barisObj)) {
                        if (sl.includes(newNo)) {
                            return showToast(`Nomor keranjang ${newNo} sudah digunakan di ${sec}.`);
                        }
                    }
                }
                slots[slotIndex] = newNo;
                if (!currentBaskets()[newNo]) currentBaskets()[newNo] = { section, baris, slot: slotIndex + 1, items: [] };
                else { currentBaskets()[newNo].section = section; currentBaskets()[newNo].baris = baris; currentBaskets()[newNo].slot = slotIndex + 1; }
                no = newNo;
            } else {
                if (itemCount(no) >= 5) return showToast(`Keranjang ${no} sudah penuh (5/5).`);
            }

            if (!currentBaskets()[no]) currentBaskets()[no] = { section, baris, slot: slotIndex + 1, items: [] };
            const item = { nama, qty, jenis, tglMasuk: new Date().toISOString() };
            item.expDate = expDate;
            item.estOutDate = estOutDate;
            currentBaskets()[no].items.push(item);
            logTransaction('in', { nama, qty, jenis, keranjang: no, section, baris, expDate, estOutDate });
            saveToFirestore();
            showToast('✅ Barang masuk');
            setTimeout(() => renderInputForm(), 100);
        }

                const detail = t.detail || {};
                const extraInfo = t.type === 'move' ? ` | Dari: ${detail.dari} → Ke: ${detail.ke}` : ` | Keranjang: ${detail.keranjang||'-'} | Section: ${detail.section||'-'}`;
                return `<div class="history-item ${typeClass}">
                    <div style="font-size:1.5rem;flex-shrink:0;">${icon}</div>
                    <div style="flex:1;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
                            <span class="history-badge ${badgeClass}">${t.type==='in'?'MASUK':t.type==='move'?'PINDAH':'KELUAR'}</span>

                        <br><small style="color:#64748b;">${extraInfo} | User: ${t.user}</small>
                    </div>
                </div>`;
            }).join('');
            container.innerHTML = `<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><h3>📋 Riwayat</h3><button class="btn btn-sm btn-outline" onclick="downloadExcel()"><i class="fas fa-download"></i> Excel</button></div>${list||'<div class="empty-state">Belum ada aktivitas</div>'}</div>`;
        }

        document.getElementById('areaSelect').value = currentArea;
    </script>
