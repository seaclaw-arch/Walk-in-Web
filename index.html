        function validateQuickEstOut() {
            const expDate = document.getElementById('inExpDate')?.value;
            const estOutDate = document.getElementById('inEstOutDate')?.value;
            const estOutInput = document.getElementById('inEstOutDate');
            const warning = document.getElementById('estOutWarning');
            if (!expDate || !estOutDate || !warning) return;
            if (new Date(estOutDate) > new Date(expDate)) {
                warning.innerHTML = '❌ Tidak boleh lebih dari Tanggal Exp!';
                warning.style.color = '#ef4444'; estOutInput.style.borderColor = '#ef4444';
            } else {
                warning.innerHTML = '✅ Valid';
                warning.style.color = '#10b981'; estOutInput.style.borderColor = '#10b981';
            }
        }

        function submitQuickAdd(e) {
            e.preventDefault();
            const target = window._quickAddTarget;
            if (!target) return showToast('Data keranjang hilang.');
            if (isBasketFull(target.no)) return showToast(`❌ Keranjang ${target.no} sudah penuh!`);
            const basket = currentBaskets()[target.no];
            if (!basket) return showToast('❌ Keranjang tidak ditemukan.');
            if (basket.section !== target.section || basket.baris !== target.baris || basket.slot !== target.slot)
                return showToast('⚠️ Lokasi keranjang sudah berubah. Refresh.');
            const nama = document.getElementById('inNama').value.trim();
            const qty = document.getElementById('inQty').value.trim();
            const jenis = document.getElementById('inJenis').value;
            const expDate = document.getElementById('inExpDate').value;
            const estOutDate = document.getElementById('inEstOutDate').value;
            if (!nama || !qty) return showToast('Lengkapi data!');
            if (!expDate || !estOutDate) return showToast('Tanggal Exp dan Estimasi Keluar wajib!');
            if (new Date(estOutDate) > new Date(expDate)) return showToast('❌ Est Keluar tidak boleh > Exp!');
            if (jenis === 'TH' && basket.items.some(i => i.jenis !== 'TH')) return showToast('❌ TH tidak bisa dicampur!');
            if (jenis !== 'TH' && basket.items.some(i => i.jenis === 'TH')) return showToast('❌ Tidak bisa dicampur dengan TH!');
            const item = { nama, qty, jenis, tglMasuk: new Date().toISOString() };
            if (expDate) item.expDate = expDate;
            if (estOutDate) item.estOutDate = estOutDate;
            basket.items.push(item);
            logTransaction('in', { nama, qty, jenis, keranjang: target.no, section: target.section, baris: target.baris, expDate, estOutDate });
            saveToFirestore();
            showToast(`✅ ${nama} ditambahkan ke keranjang ${target.no}`);
            setTimeout(() => showBasketDetail(target.no), 300);
        }

        // ==================== EDIT EST OUT ====================
        function editEstOutDate(no, idx) {
            const basket = currentBaskets()[no];
            if (!basket || !basket.items[idx]) return;
            const item = basket.items[idx];
            const expDate = item.expDate ? new Date(item.expDate) : null;
            const currentEst = item.estOutDate ? new Date(item.estOutDate).toISOString().split('T')[0] : '';
            const newDateStr = prompt(`Edit Estimasi Keluar untuk "${item.nama}"\nTanggal Exp: ${expDate ? expDate.toLocaleDateString('id-ID') : '-'}\nMasukkan tanggal (YYYY-MM-DD):`, currentEst);
            if (newDateStr === null) return;
            if (!/^\d{4}-\d{2}-\d{2}$/.test(newDateStr)) return showToast('Format tidak valid.');
            const newDate = new Date(newDateStr);
            if (isNaN(newDate.getTime())) return showToast('Tanggal tidak valid.');
            if (expDate && newDate > expDate) return showToast(`❌ Tidak boleh > Exp (${expDate.toISOString().split('T')[0]}).`);
            item.estOutDate = newDateStr;
            logTransaction('edit', { nama: item.nama, qty: item.qty, jenis: item.jenis, keranjang: no, section: basket.section, oldEstOutDate: currentEst, newEstOutDate: newDateStr });
            saveToFirestore();
            showToast('✅ Estimasi keluar diperbarui.');
            showBasketDetail(no);
        }

        // ==================== MOVE ITEM ====================
        function renderMoveForm(fromNo, fromIdx) {
            const sections = Object.keys(currentSections());
            const sectionOpts = sections.map(s => `<option value="${s}">${s}</option>`).join('');
            const item = currentBaskets()[fromNo]?.items[fromIdx];
            return `<div class="move-form" onclick="event.stopPropagation();">
                <div style="width:100%;">
                    <div style="background:#f5f3ff;border-radius:8px;padding:8px 12px;margin-bottom:8px;"><strong style="color:#5b21b6;">🔄 Pindah: ${item?.nama||''}</strong></div>
                    <select id="moveSection" onchange="updateMoveBaris()" style="width:100%;margin-bottom:6px;"><option value="">-- Section --</option>${sectionOpts}</select>
                    <select id="moveBaris" onchange="updateMoveKeranjang()" style="width:100%;margin-bottom:6px;"><option value="">-- Baris --</option></select>
                    <select id="moveKeranjang" style="width:100%;margin-bottom:6px;"><option value="">-- Pilih Keranjang --</option></select>
                    <input type="number" id="moveKeranjangBaru" placeholder="Atau nomor baru" min="1" style="width:100%;margin-bottom:6px;" oninput="validateMoveKeranjangBaru()">
                    <small id="moveKeranjangWarning" style="display:block;margin-bottom:6px;"></small>
                    <button class="btn btn-sm btn-primary" style="width:100%;" onclick="pindahkanItem(${fromNo},${fromIdx})"><i class="fas fa-exchange-alt"></i> Pindahkan</button>
                    <button class="btn btn-sm btn-outline" style="width:100%;margin-top:4px;" onclick="showBasketDetail(${fromNo})">Batal</button>
                </div>
            </div>`;
        }

        function updateMoveBaris() {
            const sec = document.getElementById('moveSection')?.value;
            const barisSel = document.getElementById('moveBaris');
            if (!barisSel) return;
            barisSel.innerHTML = '<option value="">-- Baris --</option>';
            if (!sec) return;
            const barisObj = currentSections()[sec] || {};
            Object.keys(barisObj).forEach((baris, idx) => {
                barisSel.innerHTML += `<option value="${baris}">${sec} ${String(idx+1).padStart(2,'0')}</option>`;
            });
            updateMoveKeranjang();
        }

        function updateMoveKeranjang() {
            const sec = document.getElementById('moveSection')?.value;
            const baris = document.getElementById('moveBaris')?.value;
            const kerSel = document.getElementById('moveKeranjang');
            if (!kerSel) return;
            kerSel.innerHTML = '<option value="">-- Pilih Keranjang --</option>';
            if (!sec || !baris) return;
            const slots = currentSections()[sec]?.[baris];
            if (slots) {
                slots.forEach((no, idx) => {
                    if (no === null) return;
                    const c = itemCount(no);
                    kerSel.innerHTML += `<option value="${no}" ${c>=getBasketCapacity(no)?'disabled':''}>Keranjang ${no} (${c}/${getBasketCapacity(no)})</option>`;
                });
            }
        }

        function validateMoveKeranjangBaru() {
            const input = document.getElementById('moveKeranjangBaru');
            const warning = document.getElementById('moveKeranjangWarning');
            const value = parseInt(input?.value);
            if (!input || !warning) return;
            if (!value || value <= 0) { warning.innerHTML = ''; input.style.borderColor = '#cbd5e1'; return; }
            for (const area of ['frozen','chiller']) {
                for (const [sec, barisObj] of Object.entries(appData[area].sections)) {
                    for (const sl of Object.values(barisObj)) {
                        if (sl.includes(value)) {
                            warning.innerHTML = `❌ Nomor ${value} sudah digunakan`;
                            warning.style.color = '#ef4444'; input.style.borderColor = '#ef4444';
                            return;
                        }
                    }
                }
            }
            warning.innerHTML = `✅ Nomor ${value} tersedia`;
            warning.style.color = '#10b981'; input.style.borderColor = '#10b981';
        }

        function pindahkanItem(fromNo, fromIdx) {
            const fromBasket = currentBaskets()[fromNo];
            if (!fromBasket || !fromBasket.items[fromIdx]) return;
            const item = fromBasket.items[fromIdx];
            if (item.expDate && !cekFEFO(fromNo, fromIdx)) return;
            const toSection = document.getElementById('moveSection')?.value;
            const toBaris = document.getElementById('moveBaris')?.value;
            let toNo = parseInt(document.getElementById('moveKeranjang')?.value);
            const toNoInput = document.getElementById('moveKeranjangBaru')?.value;
            if (!toNo && toNoInput) {
                toNo = parseInt(toNoInput);
                if (!toNo || toNo <= 0) return showToast('Masukkan nomor keranjang.');
                for (const area of ['frozen','chiller']) {
                    for (const [sec, barisObj] of Object.entries(appData[area].sections)) {
                        for (const sl of Object.values(barisObj)) {
                            if (sl.includes(toNo)) return showToast(`❌ Nomor ${toNo} sudah digunakan.`);
                        }
                    }
                }
                if (toSection && toBaris) {
                    const toSlots = currentSections()[toSection]?.[toBaris];
                    if (toSlots) { const emptyIdx = toSlots.findIndex(s => s === null); if (emptyIdx !== -1) toSlots[emptyIdx] = toNo; }
                }
            }
            if (!toNo) return showToast('Pilih keranjang tujuan.');
            if (toNo === fromNo) return showToast('Tidak bisa ke keranjang yang sama.');
            if (isBasketFull(toNo)) return showToast('Keranjang tujuan penuh.');
            fromBasket.items.splice(fromIdx, 1);
            if (fromBasket.items.length === 0) removeEmptyBasketNumber(fromNo);
            if (!currentBaskets()[toNo]) currentBaskets()[toNo] = { section: toSection || '', baris: toBaris || '', items: [] };
            currentBaskets()[toNo].items.push(item);
            logTransaction('move', { nama: item.nama, qty: item.qty, jenis: item.jenis, dari: fromNo, ke: toNo, section: toSection });
            saveToFirestore();
            showToast('✅ Barang dipindahkan ke ' + toNo);
            showBasketDetail(fromNo);
        }

        function removeEmptyBasketNumber(keranjangNo) {
            for (const area of ['frozen','chiller']) {
                const sections = appData[area].sections;
                const baskets = appData[area].baskets;
                for (const [sec, barisObj] of Object.entries(sections)) {
                    for (const [baris, slots] of Object.entries(barisObj)) {
                        const idx = slots.indexOf(keranjangNo);
                        if (idx !== -1) { slots[idx] = null; if (baskets[keranjangNo]) delete baskets[keranjangNo]; return; }
                    }
                }
            }
        }

        // ==================== KELUARKAN ITEM ====================
        function keluarkanItem(no, idx) {
            const basket = currentBaskets()[no];
            if (!basket) return;
            const item = basket.items[idx];
            if (item.expDate && !cekFEFO(no, idx)) return;
            const qtyNumber = parseFloat(item.qty) || parseInt(item.qty) || 0;
            if (!isNaN(qtyNumber) && qtyNumber > 1) {
                showPartialOutDialog(no, idx, item, qtyNumber);
            } else {
                if (confirm(`Keluarkan "${item.nama}" dari keranjang ${no}?`)) executeFullOut(no, idx, item);
            }
        }

        function showPartialOutDialog(no, idx, item, totalQty) {
            const dialogHtml = `
            <div id="partialOutOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:center;justify-content:center;" onclick="closePartialOutDialog()">
                <div class="card" style="width:90%;max-width:400px;" onclick="event.stopPropagation();">
                    <h3>📤 Keluarkan Sebagian</h3>
                    <div style="background:#f0f4ff;border-radius:8px;padding:12px;margin-bottom:16px;"><strong>${item.nama}</strong><br>Total: <strong>${totalQty}</strong></div>
                    <input type="number" id="partialOutQty" min="1" max="${totalQty}" placeholder="Jumlah" style="font-size:1.2rem;text-align:center;width:100%;margin-bottom:8px;" onkeypress="if(event.key==='Enter')executePartialOut(${no},${idx},'${item.nama.replace(/'/g,"\\'")}',${totalQty},'${item.jenis||''}')">
                    <small id="partialOutWarning" style="display:block;margin-bottom:8px;"></small>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-outline" style="flex:1;" onclick="closePartialOutDialog()">Batal</button>
                        <button class="btn" style="flex:1;background:#ef4444;color:white;" onclick="executePartialOut(${no},${idx},'${item.nama.replace(/'/g,"\\'")}',${totalQty},'${item.jenis||''}')">Keluarkan</button>
                    </div>
                </div>
            </div>`;
            const dc = document.createElement('div'); dc.id = 'partialOutDialog'; dc.innerHTML = dialogHtml; document.body.appendChild(dc);
            setTimeout(() => document.getElementById('partialOutQty')?.focus(), 100);
        }

        function executePartialOut(no, idx, nama, totalQty, jenis) {
            const qtyOut = parseInt(document.getElementById('partialOutQty')?.value);
            if (!qtyOut || qtyOut <= 0) return showToast('❌ Jumlah tidak valid!');
            if (qtyOut > totalQty) return showToast(`❌ Maksimal ${totalQty}!`);
            const basket = currentBaskets()[no];
            if (!basket || !basket.items[idx]) return;
            const sisa = totalQty - qtyOut;
            if (sisa <= 0) { executeFullOut(no, idx, basket.items[idx]); closePartialOutDialog(); return; }
            basket.items[idx].qty = sisa.toString();
            logTransaction('out', { nama, qty: `${qtyOut} dari ${totalQty} (sisa ${sisa})`, jenis, keranjang: no, section: basket.section, partial: true });
            saveToFirestore();
            closePartialOutDialog();
            showToast(`✅ ${qtyOut} ${nama} dikeluarkan. Sisa: ${sisa}`);
            showBasketDetail(no);
        }

        function executeFullOut(no, idx, item) {
            const basket = currentBaskets()[no];
            if (!basket) return;
            basket.items.splice(idx, 1);
            if (basket.items.length === 0) removeEmptyBasketNumber(no);
            logTransaction('out', { nama: item.nama, qty: item.qty, jenis: item.jenis, keranjang: no, section: basket.section });
            saveToFirestore();
            showToast(`✅ ${item.nama} dikeluarkan`);
            showBasketDetail(no);
        }

        function closePartialOutDialog() {
            document.getElementById('partialOutDialog')?.remove();
            document.getElementById('partialOutOverlay')?.remove();
        }

        // ==================== MOVE BASKET ====================
        function showMoveBasketForm(fromNo) {
            const basket = currentBaskets()[fromNo];
            if (!basket) return;
            const sectionOpts = Object.keys(currentSections()).map(s => `<option value="${s}">${s}</option>`).join('');
            container.innerHTML = `<div class="card">
                <div style="display:flex;justify-content:space-between;margin-bottom:16px;">
                    <h3><i class="fas fa-truck" style="color:#8b5cf6;"></i> Pindah Keranjang ${fromNo}</h3>
                    <button class="btn btn-outline btn-sm" onclick="showBasketDetail(${fromNo})">← Kembali</button>
                </div>
                <p>📍 Saat ini: <strong>${basket.section}</strong> Baris <strong>${basket.baris}</strong> Slot <strong>${basket.slot}</strong> (${basket.items.length} item)</p>
                <div class="form-group"><label>Section Tujuan</label><select id="moveBasketSection" onchange="updateMoveBasketBaris()"><option value="">-- Pilih --</option>${sectionOpts}</select></div>
                <div class="form-group"><label>Baris Tujuan</label><select id="moveBasketBaris" onchange="updateMoveBasketSlot()"><option value="">-- Pilih --</option></select></div>
                <div class="form-group"><label>Slot Tujuan</label><select id="moveBasketSlot"><option value="">-- Pilih --</option></select></div>
                <div id="moveBasketInfo" style="margin-bottom:16px;"></div>
                <button class="btn" style="width:100%;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white;" onclick="executeMoveBasket(${fromNo})"><i class="fas fa-truck"></i> Pindahkan</button>
            </div>`;
        }

        function updateMoveBasketBaris() {
            const sec = document.getElementById('moveBasketSection')?.value;
            const barisSel = document.getElementById('moveBasketBaris');
            if (!barisSel) return;
            barisSel.innerHTML = '<option value="">-- Pilih --</option>';
            if (!sec) return;
            Object.keys(currentSections()[sec] || {}).forEach((b, i) => {
                barisSel.innerHTML += `<option value="${b}">${sec} ${String(i+1).padStart(2,'0')}</option>`;
            });
            document.getElementById('moveBasketSlot').innerHTML = '<option value="">-- Pilih --</option>';
        }

        function updateMoveBasketSlot() {
            const sec = document.getElementById('moveBasketSection')?.value;
            const baris = document.getElementById('moveBasketBaris')?.value;
            const slotSel = document.getElementById('moveBasketSlot');
            if (!slotSel) return;
            slotSel.innerHTML = '<option value="">-- Pilih --</option>';
            if (!sec || !baris) return;
            const slots = currentSections()[sec]?.[baris] || [];
            for (let i = 0; i < 5; i++) {
                if (slots[i] === null) slotSel.innerHTML += `<option value="${i+1}">Slot ${i+1} (kosong) ✅</option>`;
                else slotSel.innerHTML += `<option value="${i+1}" disabled>Slot ${i+1}: ${slots[i]} ❌</option>`;
            }
        }

        function executeMoveBasket(fromNo) {
            const toSection = document.getElementById('moveBasketSection')?.value;
            const toBaris = document.getElementById('moveBasketBaris')?.value;
            const toSlot = parseInt(document.getElementById('moveBasketSlot')?.value);
            if (!toSection || !toBaris || !toSlot) return showToast('Lengkapi semua!');
            const fromBasket = currentBaskets()[fromNo];
            if (!fromBasket) return;
            if (fromBasket.section === toSection && fromBasket.baris === toBaris && fromBasket.slot === toSlot) return showToast('Lokasi sama!');
            const toSlots = currentSections()[toSection]?.[toBaris];
            if (!toSlots) return;
            if (toSlots[toSlot-1] !== null) return showToast('Slot sudah terisi!');
            const fromSection = fromBasket.section, fromBaris = fromBasket.baris, fromSlot = fromBasket.slot;
            const fromSlots = currentSections()[fromSection]?.[fromBaris];
            if (fromSlots) fromSlots[fromSlot-1] = null;
            toSlots[toSlot-1] = fromNo;
            fromBasket.section = toSection; fromBasket.baris = toBaris; fromBasket.slot = toSlot;
            logTransaction('move', { nama: `[KERANJANG ${fromNo}]`, qty: `${fromBasket.items.length} item`, jenis: 'KERANJANG', dari: `${fromSection} ${fromBaris} Slot ${fromSlot}`, ke: `${toSection} ${toBaris} Slot ${toSlot}`, keranjang: fromNo, section: toSection });
            saveToFirestore();
            showToast(`✅ Keranjang ${fromNo} dipindahkan!`);
            setTimeout(() => showBasketDetail(fromNo), 500);
        }

        // ==================== INPUT FORM ====================
        function renderInputForm() {
            const sectionOpt = Object.keys(currentSections()).map(s => `<option value="${s}">${s}</option>`).join('');
            container.innerHTML = `<div class="card"><h3>📥 Barang Masuk</h3>
                <form id="inForm" onsubmit="submitIn(event)">
                    <div class="form-group"><label>Nama Barang</label><input type="text" id="inNama" list="namaList" required><datalist id="namaList"></datalist></div>
                    <div class="form-group"><label>Jumlah</label><input type="text" id="inQty" placeholder="Contoh: 1 Pack" required></div>
                    <div class="form-group"><label>Jenis</label><select id="inJenis"><option value="IIP">IIP</option><option value="RM">RM</option><option value="TH">TH</option></select></div>
                    <div class="form-group"><label>Tanggal Exp (wajib)</label><input type="date" id="inExpDate" required onchange="validateEstOutDate()"></div>
                    <div class="form-group"><label>Estimasi Keluar (wajib)</label><input type="date" id="inEstOutDate" required onchange="validateEstOutDate()"><small style="color:#64748b;">⚠️ Tidak boleh lebih dari Tanggal Exp</small></div>
                    <div class="form-group"><label>Section</label><select id="inSection" onchange="updateBarisSelect()">${sectionOpt}</select></div>
                    <div class="form-group"><label>Baris</label><select id="inBaris" onchange="updateSlotSelect()"><option value="">-- Pilih --</option></select></div>
                    <div class="form-group"><label>Slot (1-5)</label><select id="inSlot" onchange="handleSlotChange()"><option value="">-- Pilih Slot --</option></select></div>
                    <div class="form-group"><label>Nomor Keranjang Baru</label><input type="number" id="inKeranjangManual" placeholder="⚠️ Pilih slot dulu" min="1"><small>Isi jika slot kosong</small></div>
                    <button type="submit" class="btn btn-primary" style="width:100%">💾 Simpan</button>
                </form></div>`;
            updateBarisSelect();
            updateNamaDatalist();
        }

        function handleSlotChange() {
            const slot = parseInt(document.getElementById('inSlot')?.value);
            const manualInput = document.getElementById('inKeranjangManual');
            const manualInputGroup = manualInput?.closest('.form-group');
            if (!manualInput) return;
            const existingWarning = document.getElementById('keranjangWarning');
            if (existingWarning) existingWarning.remove();
            manualInput.classList.remove('input-warning', 'input-success');
            if (!slot || isNaN(slot)) { manualInput.disabled = true; manualInput.placeholder = "Pilih slot dulu"; return; }
            const section = document.getElementById('inSection')?.value;
            const baris = document.getElementById('inBaris')?.value;
            const slots = currentSections()[section]?.[baris];
            if (!slots) return;
            const no = slots[slot - 1];
            if (no !== null && no !== undefined) {
                manualInput.disabled = true; manualInput.value = '';
                manualInput.placeholder = `Menggunakan keranjang ${no}`;
                manualInput.classList.add('input-success');
                const count = itemCount(no);
                const infoDiv = document.createElement('div'); infoDiv.id = 'keranjangWarning'; infoDiv.className = 'success-message';
                infoDiv.innerHTML = `<i class="fas fa-check-circle"></i> Keranjang ${no} tersedia (${count}/${getBasketCapacity(no)} item)`;
                manualInputGroup?.appendChild(infoDiv);
            } else {
                manualInput.disabled = false; manualInput.placeholder = "⚠️ Masukkan nomor keranjang baru (wajib)";
                manualInput.classList.add('input-warning'); manualInput.focus();
                manualInput.oninput = function() { validateKeranjangNumber(this.value); };
            }
        }

        function validateKeranjangNumber(value) {
            const manualInput = document.getElementById('inKeranjangManual');
            const manualInputGroup = manualInput?.closest('.form-group');
            const existingWarning = document.getElementById('keranjangWarning');
            if (existingWarning) existingWarning.remove();
            if (!value || isNaN(parseInt(value)) || parseInt(value) <= 0) {
                manualInput.classList.add('input-warning'); manualInput.classList.remove('input-success'); return;
            }
            const newNo = parseInt(value);
            let duplicateInfo = null;
            for (const area of ['frozen','chiller']) {
                const sections = appData[area].sections;
                for (const [sec, barisObj] of Object.entries(sections)) {
                    for (const [baris, slots] of Object.entries(barisObj)) {
                        if (slots.includes(newNo)) { duplicateInfo = { area, section: sec, baris, slot: slots.indexOf(newNo)+1 }; break; }
                    }
                    if (duplicateInfo) break;
                }
                if (duplicateInfo) break;
            }
            if (duplicateInfo) {
                manualInput.classList.add('input-warning'); manualInput.classList.remove('input-success');
                const warningDiv = document.createElement('div'); warningDiv.id = 'keranjangWarning'; warningDiv.className = 'warning-message';
                warningDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ❌ Nomor ${newNo} sudah digunakan di ${duplicateInfo.area==='frozen'?'❄️ Frozen':'🌡️ Chiller'} (${duplicateInfo.section} Baris ${duplicateInfo.baris} Slot ${duplicateInfo.slot})`;
                manualInputGroup?.appendChild(warningDiv);
            } else {
                manualInput.classList.add('input-success'); manualInput.classList.remove('input-warning');
                const successDiv = document.createElement('div'); successDiv.id = 'keranjangWarning'; successDiv.className = 'success-message';
                successDiv.innerHTML = `<i class="fas fa-check-circle"></i> ✅ Nomor ${newNo} tersedia`;
                manualInputGroup?.appendChild(successDiv);
            }
        }

        function validateEstOutDate() {
            const expDate = document.getElementById('inExpDate')?.value;
            const estOutDate = document.getElementById('inEstOutDate')?.value;
            const estOutInput = document.getElementById('inEstOutDate');
            const estOutGroup = estOutInput?.closest('.form-group');
            const existingWarning = document.getElementById('estOutWarning');
            if (existingWarning) existingWarning.remove();
            estOutInput?.classList.remove('input-warning','input-success');
            if (!expDate || !estOutDate) return;
            const expDateObj = new Date(expDate), estOutDateObj = new Date(estOutDate);
            if (estOutDateObj > expDateObj) {
                estOutInput?.classList.add('input-warning');
                const warningDiv = document.createElement('div'); warningDiv.id = 'estOutWarning'; warningDiv.className = 'warning-message';
                warningDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ❌ Estimasi Keluar (${estOutDate}) tidak boleh lebih dari Tanggal Exp (${expDate})`;
                estOutGroup?.appendChild(warningDiv);
            } else if (estOutDateObj.getTime() === expDateObj.getTime()) {
                estOutInput?.classList.add('input-success');
                const warningDiv = document.createElement('div'); warningDiv.id = 'estOutWarning'; warningDiv.className = 'success-message';
                warningDiv.innerHTML = `<i class="fas fa-info-circle"></i> ⚠️ Estimasi Keluar sama dengan Tanggal Exp`;
                estOutGroup?.appendChild(warningDiv);
            } else {
                estOutInput?.classList.add('input-success');
                const successDiv = document.createElement('div'); successDiv.id = 'estOutWarning'; successDiv.className = 'success-message';
                successDiv.innerHTML = `<i class="fas fa-check-circle"></i> ✅ Estimasi Keluar valid (sebelum Exp)`;
                estOutGroup?.appendChild(successDiv);
            }
        }

        function updateBarisSelect() {
            const section = document.getElementById('inSection')?.value;
            const barisSelect = document.getElementById('inBaris');
            if (!barisSelect) return;
            barisSelect.innerHTML = '<option value="">-- Pilih --</option>';
            if (section) {
                const barisObj = currentSections()[section] || {};
                Object.keys(barisObj).forEach((baris, idx) => {
                    barisSelect.innerHTML += `<option value="${baris}">${section} ${String(idx+1).padStart(2,'0')}</option>`;
                });
                if (Object.keys(barisObj).length > 0) { barisSelect.value = Object.keys(barisObj)[0]; updateSlotSelect(); }
            } else {
                const slotSelect = document.getElementById('inSlot');
                if (slotSelect) slotSelect.innerHTML = '<option value="">-- Pilih Slot --</option>';
            }
        }

        function updateSlotSelect() {
            const section = document.getElementById('inSection')?.value;
            const baris = document.getElementById('inBaris')?.value;
            const select = document.getElementById('inSlot');
            if (!select) return;
            select.innerHTML = '<option value="">-- Pilih Slot --</option>';
            if (!section || !baris) return;
            const slots = currentSections()[section]?.[baris];
            if (!slots) return;
            for (let i = 0; i < 5; i++) {
                const no = slots[i], slotNumber = i+1;
                if (no !== null) {
                    const count = itemCount(no);
                    select.innerHTML += `<option value="${slotNumber}" ${isBasketFull(no)?'disabled':''}>Slot ${slotNumber}: ${no} (${count}/${getBasketCapacity(no)})${isBasketFull(no)?' - PENUH':''}</option>`;
                } else {
                    select.innerHTML += `<option value="${slotNumber}">Slot ${slotNumber} (kosong)</option>`;
                }
            }
        }

        function updateNamaDatalist() {
            const set = new Set();
            currentTransactions().forEach(t => { if (t.detail?.nama) set.add(t.detail.nama); });
            const dl = document.getElementById('namaList');
            if (dl) dl.innerHTML = [...set].map(n => `<option value="${n}">`).join('');
        }

        function submitIn(e) {
            e.preventDefault();
            const nama = document.getElementById('inNama').value.trim();
            const qty = document.getElementById('inQty').value.trim();
            const jenis = document.getElementById('inJenis').value;
            const expDate = document.getElementById('inExpDate').value;
            const estOutDate = document.getElementById('inEstOutDate').value;
            const section = document.getElementById('inSection').value;
            const baris = document.getElementById('inBaris').value;
            const slotStr = document.getElementById('inSlot').value;
            const keranjangManual = document.getElementById('inKeranjangManual')?.value.trim();
            if (!nama || !qty || !baris || !slotStr || !expDate || !estOutDate) return showToast('Lengkapi data!');
            if (new Date(estOutDate) > new Date(expDate)) return showToast('❌ Est Keluar tidak boleh > Exp!');
            const slotIdx = parseInt(slotStr) - 1;
            const slots = currentSections()[section]?.[baris];
            if (!slots) return showToast('Data baris tidak valid.');
            let no = slots[slotIdx];
            if (no === null || no === undefined) {
                if (!keranjangManual || isNaN(parseInt(keranjangManual)) || parseInt(keranjangManual) <= 0)
                    return showToast('❌ Masukkan Nomor Keranjang Baru!');
                const newNo = parseInt(keranjangManual);
                for (const area of ['frozen','chiller']) {
                    for (const [sec, barisObj] of Object.entries(appData[area].sections)) {
                        for (const sl of Object.values(barisObj)) {
                            if (sl.includes(newNo)) return showToast(`❌ Nomor ${newNo} sudah digunakan di ${area} ${sec}.`);
                        }
                    }
                }
                slots[slotIdx] = newNo;
                if (!currentBaskets()[newNo]) currentBaskets()[newNo] = { section, baris, slot: slotIdx+1, items: [] };
                else { currentBaskets()[newNo].section = section; currentBaskets()[newNo].baris = baris; currentBaskets()[newNo].slot = slotIdx+1; }
                no = newNo;
            } else {
                if (isBasketFull(no)) return showToast(`❌ Keranjang ${no} penuh!`);
            }
            if (!currentBaskets()[no]) currentBaskets()[no] = { section, baris, slot: slotIdx+1, items: [] };
            const item = { nama, qty, jenis, tglMasuk: new Date().toISOString() };
            if (expDate) item.expDate = expDate;
            if (estOutDate) item.estOutDate = estOutDate;
            currentBaskets()[no].items.push(item);
            logTransaction('in', { nama, qty, jenis, keranjang: no, section, baris, expDate, estOutDate });
            saveToFirestore();
            showToast('✅ Barang masuk ke keranjang ' + no);
            setTimeout(() => renderInputForm(), 100);
        }

        // ==================== SEARCH ====================
        function renderSearch() {
            container.innerHTML = `
                <div class="search-container"><h3>🔍 Cari Barang</h3>
                    <div class="filter-row">
                        <input type="date" id="searchDateFrom" onchange="performSearch()" placeholder="Exp dari">
                        <input type="date" id="searchDateTo" onchange="performSearch()" placeholder="Exp sampai">
                        <select id="searchStatus" onchange="performSearch()">
                            <option value="">Semua Status</option>
                            <option value="expired">⚠️ Expired</option>
                            <option value="active">✅ Aktif</option>
                            <option value="out">📤 Sudah Keluar</option>
                        </select>
                    </div>
                    <div class="search-input-wrapper">
                        <input type="text" id="searchInput" placeholder="Cari nama barang..." oninput="performSearch()" autocomplete="off">
                        <span class="search-icon"><i class="fas fa-search"></i></span>
                    </div>
                    <div id="searchResults"><div class="empty-state">Ketik untuk mencari barang di semua area</div></div>
                </div>`;
            setTimeout(() => { const si = document.getElementById('searchInput'); if (si) si.focus(); }, 100);
        }

        function performSearch() {
            const query = document.getElementById('searchInput')?.value.trim().toLowerCase();
            const resultsContainer = document.getElementById('searchResults');
            const statusFilter = document.getElementById('searchStatus')?.value;
            const dateFrom = document.getElementById('searchDateFrom')?.value;
            const dateTo = document.getElementById('searchDateTo')?.value;
            if (!query || query.length < 2) {
                resultsContainer.innerHTML = '<div class="empty-state">Ketik minimal 2 karakter untuk mencari</div>';
                return;
            }
            const allResults = [];
            collectSearchResults('frozen', query, allResults);
            collectSearchResults('chiller', query, allResults);
            let filtered = allResults;
            if (statusFilter === 'expired') filtered = filtered.filter(r => r.item.expDate && new Date(r.item.expDate) < new Date());
            else if (statusFilter === 'active') filtered = filtered.filter(r => r.status === 'current');
            else if (statusFilter === 'out') filtered = filtered.filter(r => r.status === 'out');
            if (dateFrom) filtered = filtered.filter(r => r.item.expDate && new Date(r.item.expDate) >= new Date(dateFrom));
            if (dateTo) filtered = filtered.filter(r => r.item.expDate && new Date(r.item.expDate) <= new Date(dateTo));
            if (filtered.length === 0) {
                resultsContainer.innerHTML = `<div class="empty-state"><i class="fas fa-search" style="font-size:2rem;display:block;margin-bottom:8px;"></i>Tidak ditemukan barang dengan nama "${query}"</div>`;
                return;
            }
            const currentItems = filtered.filter(r => r.status === 'current');
            const outItems = filtered.filter(r => r.status === 'out');
            let html = `
                <div class="search-stats">
                    <div class="search-stat"><div class="count">${filtered.length}</div><div class="label">Total</div></div>
                    <div class="search-stat"><div class="count" style="color:#10b981;">${currentItems.length}</div><div class="label">Masih Ada</div></div>
                    <div class="search-stat"><div class="count" style="color:#ef4444;">${outItems.length}</div><div class="label">Keluar</div></div>
                </div>`;
            filtered.forEach(result => {
                const areaBadge = result.area === 'frozen' ? '<span class="area-badge area-frozen">❄️ Frozen</span>' : '<span class="area-badge area-chiller">🌡️ Chiller</span>';
                const statusBadge = result.status === 'current' ? '<span class="search-result-badge badge-current">📦 Masih Ada</span>' : '<span class="search-result-badge badge-out">📤 Sudah Keluar</span>';
                const highlightName = highlightText(result.item.nama, query);
                let locationInfo = result.status === 'current' ?
                    `<div style="margin-top:6px;font-size:0.8rem;color:#64748b;">📍 Section: ${result.section} | Baris: ${result.baris} | Slot: ${result.slot} | Keranjang: ${result.keranjangNo}</div>` :
                    `<div style="margin-top:6px;font-size:0.8rem;color:#64748b;">📤 Keluar dari Keranjang: ${result.keranjangNo} | Section: ${result.section}<br>📅 Keluar: ${new Date(result.timestamp).toLocaleDateString('id-ID')}</div>`;
                html += `<div class="search-result-item ${result.status}">
                    <div class="search-result-header"><div>${areaBadge}${statusBadge}</div><div><small>${result.item.jenis||'-'}</small></div></div>
                    <div><strong>${highlightName}</strong> <span style="color:#64748b;">Qty: ${result.item.qty}</span></div>
                    ${locationInfo}
                    ${result.item.expDate ? `<div style="margin-top:4px;font-size:0.75rem;color:${new Date(result.item.expDate)<new Date()?'#ef4444':'#64748b'};">⏰ Exp: ${new Date(result.item.expDate).toLocaleDateString('id-ID')}${new Date(result.item.expDate)<new Date()?' ⚠️ EXPIRED':''}</div>` : ''}
                    ${result.item.estOutDate ? `<div style="margin-top:2px;font-size:0.75rem;color:${new Date(result.item.estOutDate)<new Date()?'#ef4444':'#64748b'};">📅 Est. Keluar: ${new Date(result.item.estOutDate).toLocaleDateString('id-ID')}${new Date(result.item.estOutDate)<new Date()?' ⚠️ LEWAT':''}</div>` : ''}
                    ${result.status === 'current' ? `<button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="navigateToBasket(${result.keranjangNo},'${result.area}')">📍 Lihat Keranjang</button>` : ''}
                </div>`;
            });
            resultsContainer.innerHTML = html;
        }

        function collectSearchResults(area, query, results) {
            const baskets = appData[area].baskets;
            const transactions = appData[area].transactions;
            for (const [keranjangNo, basket] of Object.entries(baskets)) {
                if (basket.items && basket.items.length > 0) {
                    basket.items.forEach(item => {
                        if (item.nama && item.nama.toLowerCase().includes(query)) {
                            results.push({ area, status:'current', item, keranjangNo:parseInt(keranjangNo), section:basket.section, baris:basket.baris, slot:basket.slot });
                        }
                    });
                }
            }
            const seenOutItems = new Set();
            transactions.forEach(trans => {
                if (trans.type === 'out' && trans.detail && trans.detail.nama && trans.detail.nama.toLowerCase().includes(query)) {
                    const key = `${trans.detail.nama}_${trans.detail.qty}_${trans.timestamp}`;
                    if (!seenOutItems.has(key)) {
                        seenOutItems.add(key);
                        results.push({ area, status:'out', item:{ nama:trans.detail.nama, qty:trans.detail.qty, jenis:trans.detail.jenis||'-', expDate:trans.detail.expDate, estOutDate:trans.detail.estOutDate }, keranjangNo:trans.detail.keranjang||'-', section:trans.detail.section||'-', timestamp:trans.timestamp });
                    }
                }
            });
        }

        function highlightText(text, query) {
            if (!text || !query) return text || '';
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
            return text.replace(regex, '<span class="search-highlight">$1</span>');
        }

        function navigateToBasket(keranjangNo, area) {
            if (currentArea !== area) {
                currentArea = area;
                document.getElementById('areaSelect').value = area;
                document.getElementById('areaTitle').textContent = area==='frozen'?'Frozen':'Chiller';
            }
            currentTab = 'dashboard';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const dashboardTab = document.querySelector('.tab-btn[data-tab="dashboard"]');
            if (dashboardTab) dashboardTab.classList.add('active');
            renderDashboard();
            setTimeout(() => { showBasketDetail(keranjangNo); }, 200);
        }

        // ==================== HISTORY ====================
        function renderHistory() {
            const list = currentTransactions().slice(0, 100).map(t => {
                let typeClass = '', badgeClass = '', icon = '', typeLabel = '';
                if (t.type === 'in') { typeClass='type-in'; badgeClass='badge-in'; icon='📥'; typeLabel='MASUK'; }
                else if (t.type === 'move') { typeClass='type-move'; badgeClass='badge-move'; icon='🔄'; typeLabel = t.detail?.jenis==='KERANJANG'?'PINDAH KERANJANG':'PINDAH BARANG'; }
                else if (t.type === 'edit') { typeClass='type-edit'; badgeClass='badge-edit'; icon='✏️'; typeLabel='EDIT EST'; }
                else { typeClass='type-out'; badgeClass='badge-out'; icon='📤'; typeLabel='KELUAR'; }
                const detail = t.detail || {};
                return `<div class="history-item ${typeClass}">
                    <div style="font-size:1.5rem;">${icon}</div>
                    <div style="flex:1;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
                            <span class="history-badge ${badgeClass}">${typeLabel}</span>
                            <small>${new Date(t.timestamp).toLocaleString('id-ID')}</small>
                        </div>
                        <strong>${detail.nama||'-'}</strong> — ${detail.qty||'-'} (${detail.jenis||'-'})
                        ${t.type==='move'?` | ${detail.dari} → ${detail.ke}`:t.type==='edit'?` | Est: ${detail.oldEstOutDate} → ${detail.newEstOutDate}`:` | Keranjang: ${detail.keranjang||'-'}`}
                        ${detail.partial?'<br><small style="color:#f59e0b;">⚠️ Keluar sebagian</small>':''}
                    </div>
                </div>`;
            }).join('');
            container.innerHTML = `<div class="card">
                <div style="display:flex;justify-content:space-between;margin-bottom:12px;"><h3>📋 Riwayat</h3><button class="btn btn-sm btn-outline" onclick="downloadExcel()"><i class="fas fa-download"></i> Excel</button></div>
                <div style="display:flex;gap:12px;margin-bottom:12px;font-size:0.75rem;">
                    <span><span class="history-badge badge-move">PINDAH BARANG</span> = Pindah 1 item</span>
                    <span><span class="history-badge" style="background:#ede9fe;color:#5b21b6;">PINDAH KERANJANG</span> = Pindah semua isi</span>
                </div>
                ${list||'<div class="empty-state">Belum ada aktivitas</div>'}
            </div>`;
        }

        // ==================== REKAP ====================
        function renderRekap() {
            const BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
            const trx = currentTransactions();
            const nowYear = new Date().getFullYear();
            const yearsSet = new Set(trx.map(t => new Date(t.timestamp).getFullYear()));
            const years = [...yearsSet].sort((a,b)=>b-a);
            const selYear = parseInt(document.getElementById('rekapYearFilter')?.value || nowYear);
            let totalIn = 0, totalOut = 0;
            trx.forEach(t => t.type==='in'?totalIn++:totalOut++);
            const statBoxes = `<div class="stat-grid"><div class="stat-box"><div class="val">${totalIn}</div><div class="lbl">Total Masuk</div></div><div class="stat-box out"><div class="val">${totalOut}</div><div class="lbl">Total Keluar</div></div></div>`;
            const modeTabs = `<div class="rekap-tabs"><button class="rekap-tab ${rekapMode==='bulanan'?'active':''}" onclick="rekapMode='bulanan';renderRekap()">📅 Bulanan</button><button class="rekap-tab ${rekapMode==='tahunan'?'active':''}" onclick="rekapMode='tahunan';renderRekap()">📆 Tahunan</button></div>`;
            if (rekapMode === 'bulanan') {
                const monthData = {};
                trx.forEach(t => {
                    const d = new Date(t.timestamp);
                    if (d.getFullYear() !== selYear) return;
                    const m = d.getMonth();
                    if (!monthData[m]) monthData[m] = { in:0, out:0, bySection:{} };
                    monthData[m][t.type]++;
                    const sec = t.detail.section || '-';
                    if (!monthData[m].bySection[sec]) monthData[m].bySection[sec] = { in:0, out:0 };
                    monthData[m].bySection[sec][t.type]++;
                });
                let rows = '';
                for (let m=0; m<12; m++) {
                    const md = monthData[m];
                    if (!md) continue;
                    const badges = Object.entries(md.bySection).map(([s,v]) => `<span class="section-badge">${s}: +${v.in} -${v.out}</span>`).join('');
                    rows += `<tr><td><strong>${BULAN[m]} ${selYear}</strong></td><td style="color:var(--primary);">+${md.in}</td><td style="color:var(--danger);">-${md.out}</td><td>${md.in-md.out>=0?'+':''}${md.in-md.out}</td><td>${badges}</td></tr>`;
                }
                if (!rows) rows = `<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:20px;">Tidak ada data tahun ${selYear}</td></tr>`;
                const yearOpts = years.map(y => `<option value="${y}" ${y===selYear?'selected':''}>${y}</option>`).join('') || `<option value="${nowYear}">${nowYear}</option>`;
                container.innerHTML = `<div class="card"><h3>📊 Rekap — ${currentArea.toUpperCase()}</h3>${statBoxes}${modeTabs}<div class="filter-row"><label>Tahun: <select id="rekapYearFilter" onchange="renderRekap()">${yearOpts}</select></label><button class="btn btn-sm btn-outline" onclick="downloadRekapExcel()"><i class="fas fa-download"></i> Excel</button></div><div style="overflow-x:auto;"><table class="rekap-table"><thead><tr><th>Bulan</th><th>Masuk</th><th>Keluar</th><th>Selisih</th><th>Per Section</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
            } else {
                const yearData = {};
                trx.forEach(t => {
                    const y = new Date(t.timestamp).getFullYear();
                    if (!yearData[y]) yearData[y] = { in:0, out:0, bySection:{} };
                    yearData[y][t.type]++;
                    const sec = t.detail.section || '-';
                    if (!yearData[y].bySection[sec]) yearData[y].bySection[sec] = { in:0, out:0 };
                    yearData[y].bySection[sec][t.type]++;
                });
                let rows = '';
                [...Object.keys(yearData)].sort((a,b)=>b-a).forEach(y => {
                    const yd = yearData[y];
                    const badges = Object.entries(yd.bySection).map(([s,v]) => `<span class="section-badge">${s}: +${v.in} -${v.out}</span>`).join('');
                    rows += `<tr><td><strong>${y}</strong></td><td style="color:var(--primary);">+${yd.in}</td><td style="color:var(--danger);">-${yd.out}</td><td>${yd.in-yd.out>=0?'+':''}${yd.in-yd.out}</td><td>${badges}</td></tr>`;
                });
                if (!rows) rows = `<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:20px;">Belum ada data</td></tr>`;
                container.innerHTML = `<div class="card"><h3>📊 Rekap — ${currentArea.toUpperCase()}</h3>${statBoxes}${modeTabs}<div class="filter-row"><button class="btn btn-sm btn-outline" onclick="downloadRekapExcel()"><i class="fas fa-download"></i> Excel</button></div><div style="overflow-x:auto;"><table class="rekap-table"><thead><tr><th>Tahun</th><th>Masuk</th><th>Keluar</th><th>Selisih</th><th>Per Section</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
            }
        }

        function downloadExcel() {
            const allTrx = [...appData.frozen.transactions.map(t=>({...t,area:'Frozen'})), ...appData.chiller.transactions.map(t=>({...t,area:'Chiller'}))];
            allTrx.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            if (!allTrx.length) return showToast('Tidak ada data');
            let h = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><h2>Riwayat Lengkap</h2><table border="1"><tr style="background:#2563eb;color:white;"><th>Area</th><th>Tanggal</th><th>Jenis</th><th>Item</th><th>Jumlah</th><th>Jenis Brg</th><th>Keranjang</th><th>Section</th><th>User</th><th>Exp</th><th>Est Out</th></tr>`;
            allTrx.forEach(t => {
                const d = t.detail;
                h += `<tr><td>${t.area}</td><td>${new Date(t.timestamp).toLocaleString('id-ID')}</td><td>${t.type==='in'?'Masuk':t.type==='move'?'Pindah':t.type==='edit'?'Edit Estimasi':'Keluar'}</td><td>${d.nama||''}</td><td>${d.qty||''}</td><td>${d.jenis||''}</td><td>${d.keranjang||d.dari||''}</td><td>${d.section||''}</td><td>${t.user}</td><td>${d.expDate||''}</td><td>${d.newEstOutDate||d.estOutDate||''}</td></tr>`;
            });
            h += '</table></body></html>';
            _dlBlob(h, `riwayat_lengkap_${new Date().toISOString().split('T')[0]}.xls`);
        }

        function downloadRekapExcel() {
            const trx = currentTransactions();
            if (!trx.length) return showToast('Tidak ada data');
            let h = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><h2>Rekap — ${currentArea.toUpperCase()}</h2><table border="1"><tr style="background:#2563eb;color:white;"><th>Periode</th><th>Masuk</th><th>Keluar</th><th>Selisih</th></tr>`;
            const BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
            const monthData = {};
            trx.forEach(t => {
                const d = new Date(t.timestamp);
                const key = rekapMode==='bulanan'?`${BULAN[d.getMonth()]} ${d.getFullYear()}`:`${d.getFullYear()}`;
                if (!monthData[key]) monthData[key] = { in:0, out:0 };
                monthData[key][t.type]++;
            });
            Object.entries(monthData).forEach(([key, v]) => {
                h += `<tr><td>${key}</td><td>+${v.in}</td><td>-${v.out}</td><td>${v.in-v.out>=0?'+':''}${v.in-v.out}</td></tr>`;
            });
            h += '</table></body></html>';
            _dlBlob(h, `rekap_${currentArea}_${new Date().toISOString().split('T')[0]}.xls`);
        }

        function _dlBlob(html, filename) {
            const blob = new Blob([html], { type:'application/vnd.ms-excel;charset=utf-8;' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
        }

        // ==================== MANAGE ====================
        function renderManageBaskets() {
            if (!isAdmin()) {
                container.innerHTML = '<div class="card"><h3>⚙️ Atur Nomor Keranjang</h3><p style="color:#ef4444;font-weight:600;">🔒 Hanya admin.</p></div>';
                return;
            }
            let html = '<div class="card"><h3>⚙️ Atur Slot Keranjang</h3>';
            for (const [section, barisObj] of Object.entries(currentSections())) {
                html += `<div style="margin-bottom:20px;"><strong>📍 ${section}</strong>`;
                for (const [baris, slots] of Object.entries(barisObj)) {
                    html += `<div style="margin-left:8px;margin-bottom:10px;"><span class="baris-label">📌 Baris ${baris}</span>`;
                    for (let i = 0; i < 5; i++) {
                        const no = slots[i];
                        if (no) {
                            const cnt = itemCount(no);
                            html += `<div style="display:inline-flex;align-items:center;gap:6px;margin:4px;"><span class="chip">Slot ${i+1}: ${no} (${cnt}/${getBasketCapacity(no)}) <span style="cursor:pointer;color:red;margin-left:4px;" onclick="clearSlot('${section}','${baris}',${i})">✕</span></span></div>`;
                        } else {
                            html += `<div style="display:inline-flex;align-items:center;gap:6px;margin:4px;"><span class="chip" style="background:#f1f5f9;border:1px dashed #cbd5e1;">Slot ${i+1}: kosong</span><input type="number" id="inp_${section}_${baris}_${i}" placeholder="No" style="width:80px;padding:4px;"><button class="btn btn-sm btn-primary" onclick="fillSlot('${section}','${baris}',${i})">Isi</button></div>`;
                        }
                    }
                    html += `</div>`;
                }
                html += `<div><button class="btn btn-sm btn-outline" onclick="addBaris('${section}')">➕ Tambah Baris Baru</button></div></div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        window.clearSlot = function(section, baris, idx) {
            if (!isAdmin()) return;
            const slots = currentSections()[section]?.[baris];
            if (!slots || !slots[idx]) return;
            const no = slots[idx];
            if (confirm(`Hapus keranjang ${no} dari Slot ${idx+1}? Isi keranjang akan tetap ada.`)) {
                slots[idx] = null;
                saveToFirestore();
                showToast('Slot dikosongkan.');
                renderManageBaskets();
            }
        };

        window.fillSlot = function(section, baris, idx) {
            if (!isAdmin()) return;
            const inp = document.getElementById(`inp_${section}_${baris}_${idx}`);
            const val = parseInt(inp?.value);
            if (!val) return showToast('Masukkan nomor.');
            for (const [sec, barisObj] of Object.entries(currentSections())) {
                for (const sl of Object.values(barisObj)) {
                    if (sl.includes(val)) return showToast(`Nomor ${val} sudah digunakan di ${sec}.`);
                }
            }
            currentSections()[section][baris][idx] = val;
            saveToFirestore();
            showToast('Slot diisi.');
            renderManageBaskets();
        };

        function addBaris(section) {
            if (!isAdmin()) return;
            const sections = currentSections();
            const barisObj = sections[section];
            const nextBaris = String.fromCharCode(65 + Object.keys(barisObj).length);
            barisObj[nextBaris] = [null,null,null,null,null];
            saveToFirestore();
            showToast(`Baris ${nextBaris} ditambahkan.`);
            renderManageBaskets();
        }

        // ==================== INIT ====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                renderCurrentTab();
            });
        });
        document.getElementById('areaSelect').value = currentArea;
    </script>
</body>
</html>
