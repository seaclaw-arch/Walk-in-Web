<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Walk-in Frozen & Chiller | v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #fff;
            --text: #1e293b;
            --primary: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --orange: #f97316;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 20px;
            --move-color: #8b5cf6;
            --in-color: #10b981;
            --out-color: #ef4444;
            --search-color: #06b6d4;
            --preset-1: #8b5cf6;
            --preset-2: #06b6d4;
            --preset-3: #f59e0b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #e0e7ff, #f0f4ff);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            width: 100%;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .area-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .area-selector select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-weight: 600;
        }
        .user-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-bar {
            display: flex;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 6px 12px;
            gap: 6px;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1 0 auto;
            padding: 10px 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: #64748b;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.82rem;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .container {
            width: 100%;
            max-width: 950px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 16px;
            box-shadow: var(--shadow);
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 4px;
        }
        input,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #f8fafc;
        }
        .btn {
            padding: 12px 18px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.75rem;
        }
        .btn-xs {
            padding: 3px 8px;
            font-size: 0.65rem;
            border-radius: 8px;
        }
        .btn-warning {
            background: var(--warning);
            color: white;
        }
        .btn-success {
            background: var(--success);
            color: white;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 12px;
            margin-bottom: 6px;
        }
        .item-row.expired {
            background: #fee2e2;
            border: 1px solid #ef4444;
        }
        .empty-state {
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
            z-index: 200;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .google-btn {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
            width: 100%;
        }

        /* SEARCH */
        .search-container {
            position: relative;
            margin-bottom: 16px;
        }
        .search-container input {
            padding-left: 42px;
            font-size: 1rem;
            border: 2px solid #cbd5e1;
            transition: border-color 0.3s;
        }
        .search-container input:focus {
            border-color: var(--search-color);
            outline: none;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .search-result-item {
            background: #f0f9ff;
            border-left: 6px solid var(--search-color);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-result-item:hover {
            background: #e0f2fe;
            transform: translateX(4px);
        }
        .search-result-item .item-name {
            font-weight: 700;
            font-size: 1rem;
            color: #0f172a;
        }
        .search-result-item .item-detail {
            font-size: 0.85rem;
            color: #475569;
            margin-top: 4px;
        }
        .search-result-item .item-location {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #dbeafe;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1d4ed8;
            margin-top: 6px;
        }
        .search-result-item .item-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 8px;
        }
        .status-expired {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-warning {
            background: #fef3c7;
            color: #92400e;
        }
        .status-safe {
            background: #d1fae5;
            color: #065f46;
        }
        .search-highlight {
            background: #fef08a;
            padding: 1px 3px;
            border-radius: 3px;
        }
        .search-result-count {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* DENAH */
        .fp-room {
            border: 3px solid #1e293b;
            border-radius: 10px;
            padding: 10px;
            overflow-x: auto;
            position: relative;
            min-height: 200px;
        }
        .fp-room-title {
            font-weight: 800;
            font-size: 0.95rem;
            color: #1e293b;
            margin-bottom: 10px;
            text-align: center;
        }
        .fp-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 8px 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        /* EDIT MODE */
        .edit-mode .baris-box {
            cursor: move;
            position: relative;
            transition: box-shadow 0.2s;
        }
        .edit-mode .baris-box:hover {
            box-shadow: 0 0 0 3px var(--primary);
            z-index: 10;
        }
        .edit-mode .baris-box.dragging {
            opacity: 0.7;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
            z-index: 100;
        }
        .edit-mode .spacer-h,
        .edit-mode .spacer-v,
        .edit-mode .empty-box {
            cursor: move;
            position: relative;
            transition: background 0.2s, box-shadow 0.2s;
            border: 2px dashed #cbd5e1;
        }
        .edit-mode .spacer-h:hover,
        .edit-mode .spacer-v:hover,
        .edit-mode .empty-box:hover {
            background: rgba(37, 99, 235, 0.1) !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 2px var(--primary);
            z-index: 10;
        }
        .edit-mode .spacer-h.dragging,
        .edit-mode .spacer-v.dragging,
        .edit-mode .empty-box.dragging {
            opacity: 0.6;
            background: rgba(37, 99, 235, 0.2) !important;
            border-color: var(--primary) !important;
            z-index: 100;
        }

        /* DELETE BUTTON ON SPACER/EMPTY BOX */
        .delete-element-btn {
            display: none;
            position: absolute;
            top: -10px;
            right: -10px;
            width: 22px;
            height: 22px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.6rem;
            font-weight: bold;
            z-index: 30;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .edit-mode .spacer-h:hover .delete-element-btn,
        .edit-mode .spacer-v:hover .delete-element-btn,
        .edit-mode .empty-box:hover .delete-element-btn {
            display: flex;
        }
        .delete-element-btn:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        /* RESIZE HANDLES */
        .resize-handle {
            display: none;
            position: absolute;
            background: var(--primary);
            border-radius: 3px;
            z-index: 20;
        }
        .edit-mode .resize-handle {
            display: block;
        }
        .resize-handle-top {
            width: 100%;
            height: 8px;
            top: -4px;
            left: 0;
            cursor: ns-resize;
        }
        .resize-handle-right {
            width: 8px;
            height: 100%;
            right: -4px;
            top: 0;
            cursor: ew-resize;
        }
        .resize-handle-bottom {
            width: 100%;
            height: 8px;
            bottom: -4px;
            left: 0;
            cursor: ns-resize;
        }
        .resize-handle-left {
            width: 8px;
            height: 100%;
            left: -4px;
            top: 0;
            cursor: ew-resize;
        }
        .resize-handle-top-left {
            width: 12px;
            height: 12px;
            top: -6px;
            left: -6px;
            cursor: nwse-resize;
            border-radius: 2px;
        }
        .resize-handle-top-right {
            width: 12px;
            height: 12px;
            top: -6px;
            right: -6px;
            cursor: nesw-resize;
            border-radius: 2px;
        }
        .resize-handle-bottom-left {
            width: 12px;
            height: 12px;
            bottom: -6px;
            left: -6px;
            cursor: nesw-resize;
            border-radius: 2px;
        }
        .resize-handle-bottom-right {
            width: 12px;
            height: 12px;
            bottom: -6px;
            right: -6px;
            cursor: nwse-resize;
            border-radius: 2px;
        }

        .drop-zone {
            border: 2px dashed #6366f1 !important;
            background: rgba(99, 102, 241, 0.15) !important;
        }

        /* EMPTY BOX */
        .empty-box {
            width: 110px;
            height: 175px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.7rem;
            flex-shrink: 0;
            position: relative;
            transition: width 0.15s, height 0.15s;
        }

        /* TOOLBAR */
        .edit-toolbar {
            display: none;
            background: #1e293b;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .edit-toolbar.active {
            display: flex;
        }
        .edit-toolbar button {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .edit-toolbar button:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .edit-toolbar button.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* PRESET PANEL */
        .preset-panel {
            display: none;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            gap: 10px;
        }
        .preset-panel.active {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .preset-card {
            flex: 1;
            min-width: 180px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            position: relative;
        }
        .preset-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }
        .preset-card.active-preset {
            border-color: var(--success);
            background: #f0fdf4;
        }
        .preset-card.preset-1 {
            border-left: 4px solid var(--preset-1);
        }
        .preset-card.preset-2 {
            border-left: 4px solid var(--preset-2);
        }
        .preset-card.preset-3 {
            border-left: 4px solid var(--preset-3);
        }
        .preset-card .preset-name {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .preset-card .preset-info {
            font-size: 0.7rem;
            color: #64748b;
        }
        .preset-card .preset-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--success);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }
        .preset-card .preset-delete {
            position: absolute;
            top: 4px;
            right: 4px;
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 2px 5px;
            border-radius: 4px;
        }
        .preset-card .preset-delete:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        /* SAVE MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-box h3 {
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        .modal-box .preset-options {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .modal-box .preset-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .modal-box .preset-option:hover {
            border-color: var(--primary);
        }
        .modal-box .preset-option.selected {
            border-color: var(--primary);
            background: #eff6ff;
        }
        .modal-box .preset-option.opt-1 {
            border-left: 4px solid var(--preset-1);
        }
        .modal-box .preset-option.opt-2 {
            border-left: 4px solid var(--preset-2);
        }
        .modal-box .preset-option.opt-3 {
            border-left: 4px solid var(--preset-3);
        }

        .baris-box {
            width: 110px;
            height: 175px;
            background: #fde68a;
            border: 2.5px solid #d97706;
            border-radius: 10px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
            transition: width 0.15s, height 0.15s;
        }
        .baris-box-lbl {
            font-size: 0.6rem;
            font-weight: 800;
            color: #92400e;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
        }
        .baris-slots {
            display: flex;
            flex-direction: column-reverse;
            gap: 1px;
            flex: 1;
            min-height: 0;
        }
        .basket-slot {
            flex: 1;
            min-height: 0;
            border-radius: 5px;
            background: #fff;
            border: 1.5px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
            overflow: hidden;
        }
        .basket-slot:active {
            transform: scale(0.95);
        }
        .basket-slot.green {
            border-color: var(--success);
            background: #ecfdf5;
        }
        .basket-slot.orange {
            border-color: var(--orange);
            background: #fff7ed;
            animation: softPulse 1.8s infinite;
        }
        .basket-slot.red {
            border-color: var(--danger);
            background: #fef2f2;
            animation: strongPulse 0.9s infinite;
        }
        .basket-slot.slot-empty {
            background: #f8fafc;
            border: 1.5px dashed #d1d5db;
            cursor: default;
        }
        .slot-num {
            font-weight: 800;
            font-size: 0.6rem;
            line-height: 1;
            color: #1e293b;
        }
        .slot-count {
            font-size: 0.5rem;
            color: #64748b;
        }
        .slot-alert {
            position: absolute;
            top: -3px;
            right: -3px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 11px;
            height: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.4rem;
            font-weight: bold;
            z-index: 5;
        }

        .baris-box.stock-box {
            background: #e0e7ff;
            border-color: #6366f1;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        .baris-box.stock-box .baris-box-lbl {
            color: #4338ca;
            font-size: 0.58rem;
            white-space: normal;
            text-align: center;
            line-height: 1.3;
            margin: 0;
        }
        .stock-icon {
            font-size: 1.8rem;
        }

        .spacer-h {
            min-height: 35px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8d3df;
            font-size: 0.7rem;
            width: 100%;
            transition: min-height 0.15s, min-width 0.15s;
            position: relative;
        }
        .spacer-v {
            background: rgba(255, 255, 255, 0.4);
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8d3df;
            font-size: 0.7rem;
            flex: 1;
            min-width: 60px;
            transition: min-height 0.15s, min-width 0.15s;
            position: relative;
        }

        .frz-plan,
        .chl-plan {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 850px;
        }
        .frz-row,
        .chl-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            min-height: 40px;
        }
        .frz-left-stack,
        .chl-left-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .frz-right-stack,
        .chl-right-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .boxes-row {
            display: flex;
            gap: 8px;
        }
        .boxes-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .chl-top {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .chl-space {
            min-height: 80px;
        }
        .chl-bot {
            display: flex;
            gap: 8px;

            }

</head>
<body>
    <div id="loginScreen" class="container" style="max-width:400px;margin-top:40px;">
        <div class="card" style="text-align:center">
            <h2>🔐 Masuk Walk-in</h2>
            <p style="color:#64748b;margin-bottom:16px;">Gunakan akun tim</p>
            <div class="form-group"><input type="email" id="loginEmail" placeholder="Masukkan email"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Masukkan password"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Masuk</button>
            <button class="google-btn" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Login dengan Google</button>
            <p id="loginError" style="color:red;margin-top:10px;"></p>
        </div>
    </div>

    <div id="appScreen" style="display:none;width:100%;">
        <div class="header">
            <h2>🧊 Walk-in <span id="areaTitle">Frozen</span></h2>
            <div class="area-selector">
                <span style="color:white;">Area:</span>
                <select id="areaSelect" onchange="switchArea()">
                    <option value="frozen">❄️ Frozen</option>
                    <option value="chiller">🌡️ Chiller</option>
                </select>
            </div>
            <div class="user-row">
                <span id="currentUserName" style="font-size:0.8rem;color:white;"></span>
                <button class="btn-outline" style="color:white;border-color:white;padding:4px 10px;" onclick="logout()">Keluar</button>
            </div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="dashboard">🗺️ Denah</button>
            <button class="tab-btn" data-tab="search">🔍 Cari</button>
            <button class="tab-btn" data-tab="in">📥 Masuk</button>
            <button class="tab-btn" data-tab="history">📋 Riwayat</button>
            <button class="tab-btn" data-tab="rekap">📊 Rekap</button>
            <button class="tab-btn" data-tab="manage">⚙️ Atur</button>
        </div>
        <div class="container" id="appContainer"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- SAVE MODAL -->
    <div class="modal-overlay" id="saveModal">
        <div class="modal-box">
            <h3>💾 Simpan Layout sebagai Preset</h3>
            <p style="font-size:0.85rem;color:#64748b;margin-bottom:12px;">Pilih slot preset:</p>
            <div class="preset-options" id="presetOptions">
                <div class="preset-option opt-1" data-preset="1" onclick="selectPresetSlot(1)">🟣 <strong>Preset 1</strong><br><small id="preset1Info">Kosong</small></div>
                <div class="preset-option opt-2" data-preset="2" onclick="selectPresetSlot(2)">🔵 <strong>Preset 2</strong><br><small id="preset2Info">Kosong</small></div>
                <div class="preset-option opt-3" data-preset="3" onclick="selectPresetSlot(3)">🟡 <strong>Preset 3</strong><br><small id="preset3Info">Kosong</small></div>
            </div>
            <div class="form-group"><label>Nama Preset</label><input type="text" id="presetName" placeholder="Contoh: Layout Tim A"></div>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-primary" onclick="confirmSavePreset()" style="flex:1;">💾 Simpan</button>
                <button class="btn btn-outline" onclick="closeSaveModal()">Batal</button>
            </div>
        </div>
    </div>

    <script>
        // ============ FIREBASE CONFIG ============
        const firebaseConfig = {
            apiKey: "AIzaSyA1K3kQ93LSz1yKpBa2cMCRD045alTm6cs",
            authDomain: "walk-in-web.firebaseapp.com",
            projectId: "walk-in-web",
            storageBucket: "walk-in-web.firebasestorage.app",
            messagingSenderId: "42449089338",
            appId: "1:42449089338:web:a34b589a7c746b8dcc1603"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============ ADMIN ============
        const _ENCODED_ADMIN_EMAILS = ['c2xhcmRhci5tZW5AZ21haWwuY29t'];

        function _getAdminEmails() {
            return _ENCODED_ADMIN_EMAILS.map(e => { try { return atob(e); } catch (x) { return ''; } }).filter(e => e);
        }
        const ADMIN_EMAILS = _getAdminEmails();

        // ============ STATE ============
        let currentArea = 'frozen';
        let appData = { frozen: { sections: {}, baskets: {}, transactions: [] }, chiller: { sections: {}, baskets: {},
                transactions: [] } };
        let currentTab = 'dashboard';
        let rekapMode = 'bulanan';
        let unsubscribe = null;
        let editMode = false;
        let dragState = null;
        let selectedPresetSlot = null;
        let layoutPresets = { frozen: { 1: null, 2: null, 3: null }, chiller: { 1: null, 2: null, 3: null } };
        let activePreset = { frozen: null, chiller: null };

        const defaultFrozenSections = {
            'IMP': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null,
                    null
                ], D: [null, null, null, null, null], E: [null, null, null, null, null] },
            'RTL': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null,
                null] },
            'NPL': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null,
                null] },
            'RDQ': { A: [null, null, null, null, null] },
            'MTPP': { A: [null, null, null, null, null], B: [null, null, null, null, null] },
            'MI': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null,
                null] }
        };
        const defaultChillerSections = {
            'IMP': { A: [null, null, null, null, null] },
            'RTL': { A: [null, null, null, null, null] },
            'NPL': { A: [null, null, null, null, null] },
            'MTPP': { A: [null, null, null, null, null] },
            'RDQ': { A: [null, null, null, null, null] },
            'MI': { A: [null, null, null, null, null] },
            'THAWING': { A: [null, null, null, null, null], B: [null, null, null, null, null] }
        };

        function getDefaultSections(a) { return a === 'frozen' ? JSON.parse(JSON.stringify(defaultFrozenSections)) :
                JSON.parse(JSON.stringify(defaultChillerSections)); }

        function upgradeBarisToSlots(b) {
            if (!b || !Array.isArray(b)) return [null, null, null, null, null];
            const s = [null, null, null, null, null];
            b.forEach((n, i) => { if (i < 5 && n !== null && n !== undefined) s[i] = n; });
            return s;
        }

        function convertSectionsToSlotFormat(sec) {
            const out = {};
            for (const [sn, bo] of Object.entries(sec)) {
                const co = {};
                for (const [bn, val] of Object.entries(bo)) {
                    co[bn] = (Array.isArray(val) && val.length === 5 && val.every(v => v === null || typeof v ===
                        'number')) ? val : upgradeBarisToSlots(val);
                }
                out[sn] = co;
            }
            return out;
        }

        // ============ AUTH ============
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            if (!email || !pass) { document.getElementById('loginError').textContent =
                'Email dan password harus diisi.'; return; }
            auth.signInWithEmailAndPassword(email, pass).catch(e => document.getElementById('loginError').textContent =
                'Gagal: ' + e.message);
        }

        function loginWithGoogle() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => document.getElementById(
                'loginError').textContent = 'Google login gagal: ' + e.message);
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('currentUserName').textContent = user.email;
                listenToFirestore();
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('appScreen').style.display = 'none';
                if (unsubscribe) unsubscribe();
            }
        });

        // ============ DATA ============
        function listenToFirestore() {
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection('shared').doc('data').onSnapshot(doc => {
                if (doc.exists) {
                    const d = doc.data();
                    let fd = d.frozen || { sections: getDefaultSections('frozen'), baskets: {},
                    transactions: [] };
                    let cd = d.chiller || { sections: getDefaultSections('chiller'), baskets: {},
                    transactions: [] };
                    fd.sections = convertSectionsToSlotFormat(fd.sections || {});
                    cd.sections = convertSectionsToSlotFormat(cd.sections || {});
                    appData.frozen = fd;
                    appData.chiller = cd;
                    if (d.layoutPresets) layoutPresets = d.layoutPresets;
                    if (d.activePreset) activePreset = d.activePreset;
                    syncBasketsWithSections('frozen');
                    syncBasketsWithSections('chiller');
                    if (!d.frozen) saveToFirestore();
                    renderCurrentTab();
                } else {
                    appData.frozen = { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] };
                    appData.chiller = { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };
                    syncBasketsWithSections('frozen');
                    syncBasketsWithSections('chiller');
                    saveToFirestore();
                    renderCurrentTab();
                }
            });
        }

        function saveToFirestore() {
            db.collection('shared').doc('data').set({
                frozen: appData.frozen,
                chiller: appData.chiller,
                layoutPresets: layoutPresets,
                activePreset: activePreset
            }, { merge: true });
        }

        function syncBasketsWithSections(area) {
            const sec = appData[area].sections;
            const baskets = appData[area].baskets;
            const valid = new Set();
            for (const bo of Object.values(sec))
                for (const sl of Object.values(bo))
                    sl.forEach(n => { if (n !== null) valid.add(n); });
            for (const n of Object.keys(baskets))
                if (!valid.has(Number(n))) delete baskets[n];
            for (const [sn, bo] of Object.entries(sec))
                for (const [bn, sl] of Object.entries(bo))
                    sl.forEach((n, i) => {
                        if (n === null) return;
                        if (!baskets[n]) baskets[n] = { section: sn, baris: bn, slot: i + 1, items: [] };
                        else { baskets[n].section = sn;
                            baskets[n].baris = bn;
                            baskets[n].slot = i + 1; }
                    });
        }

        function currentSections() { return appData[currentArea].sections; }

        function currentBaskets() { return appData[currentArea].baskets; }

        function currentTransactions() { return appData[currentArea].transactions; }

        function switchArea() {
            currentArea = document.getElementById('areaSelect').value;
            document.getElementById('areaTitle').textContent = currentArea === 'frozen' ? 'Frozen' : 'Chiller';
            renderCurrentTab();
        }

        function itemCount(no) { return (currentBaskets()[no]?.items || []).length; }

        function hasExpiredItems(no) {
            const items = currentBaskets()[no]?.items || [];
            const now = new Date();
            return items.some(i => (i.expDate && new Date(i.expDate) < now) || (i.estOutDate && new Date(i.estOutDate) <
                now));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function logTransaction(type, detail) {
            currentTransactions().unshift({ id: Date.now(), timestamp: new Date().toISOString(), type, detail, user: auth
                    .currentUser?.email || 'unknown' });
            if (currentTransactions().length > 500) currentTransactions().pop();
            saveToFirestore();
        }

        function isAdmin() {
            const u = auth.currentUser;
            return u && u.providerData.some(p => p.providerId === 'google.com') && ADMIN_EMAILS.includes(u.email);
        }

        async function resetAllData() {
            if (!isAdmin()) { showToast('⚠️ Hanya admin.'); return; }
            if (!confirm('⚠️ Hapus total semua data?')) return;
            await db.collection('shared').doc('data').set({
                frozen: { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] },
                chiller: { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] },
                layoutPresets: { frozen: { 1: null, 2: null, 3: null }, chiller: { 1: null, 2: null, 3: null } },
                activePreset: { frozen: null, chiller: null }
            });
            layoutPresets = { frozen: { 1: null, 2: null, 3: null }, chiller: { 1: null, 2: null, 3: null } };
            activePreset = { frozen: null, chiller: null };
            showToast('✅ Data dihapus.');
        }

        const container = document.getElementById('appContainer');

        function renderCurrentTab() {
            try { switch (currentTab) {
                    case 'dashboard': renderDashboard(); break;
                    case 'search': renderSearch(); break;
                    case 'in': renderInputForm(); break;
                    case 'history': renderHistory(); break;
                    case 'rekap': renderRekap(); break;
                    case 'manage': renderManageBaskets(); break;
                } } catch (e) { container.innerHTML =
                    '<div class="card"><div class="empty-state">Error.</div></div>'; }
        }

        // ============ BUILD ============
        function buildBasketSlot(no) {
            if (no === null) return `<div class="basket-slot slot-empty"></div>`;
            const c = itemCount(no);
            const exp = hasExpiredItems(no);
            let cls = 'basket-slot';
            if (c >= 5) cls += ' orange';
            else if (exp) cls += ' red';
            else if (c > 0) cls += ' green';
            const badge = (exp || c >= 5) ? '<span class="slot-alert">!</span>' : '';
            return `<div class="${cls}" onclick="${editMode?'':'showBasketDetail('+no+')'}" title="Keranjang ${no} — ${c}/5">
            <span class="slot-num">${no}</span><span class="slot-count">${c}/5</span>${badge}</div>`;
        }

        function buildBarisBox(sec, idx, slots) {
            const lbl = `${sec} ${String(idx + 1).padStart(2, '0')}`;
            let s = '';
            for (let i = 0; i < 5; i++) s += buildBasketSlot(slots[i]);
            const handles = editMode ? `
            <div class="resize-handle resize-handle-top"></div>
            <div class="resize-handle resize-handle-right"></div>
            <div class="resize-handle resize-handle-bottom"></div>
            <div class="resize-handle resize-handle-left"></div>
            <div class="resize-handle resize-handle-top-left"></div>
            <div class="resize-handle resize-handle-top-right"></div>
            <div class="resize-handle resize-handle-bottom-left"></div>
            <div class="resize-handle resize-handle-bottom-right"></div>` : '';
            return `<div class="baris-box" data-section="${sec}" data-index="${idx}" draggable="${editMode}">
            <div class="baris-box-lbl">${lbl}</div>
            <div class="baris-slots">${s}</div>
            ${handles}
        </div>`;
        }

        function getSecBoxes(sec) {
            const bo = currentSections()[sec] || {};
            return Object.entries(bo).map(([b, sl], i) => buildBarisBox(sec, i, sl)).join('');
        }

        function buildEmptyBox() {
            const handles = editMode ? `
            <button class="delete-element-btn" onclick="event.stopPropagation();deleteElement(this)" title="Hapus box kosong">✕</button>
            <div class="resize-handle resize-handle-top"></div>
            <div class="resize-handle resize-handle-right"></div>
            <div class="resize-handle resize-handle-bottom"></div>
            <div class="resize-handle resize-handle-left"></div>
            <div class="resize-handle resize-handle-top-left"></div>
            <div class="resize-handle resize-handle-top-right"></div>
            <div class="resize-handle resize-handle-bottom-left"></div>
            <div class="resize-handle resize-handle-bottom-right"></div>` : '';
            return `<div class="empty-box" draggable="${editMode}">
            Area<br>Kosong
            ${handles}
        </div>`;
        }

        function buildSpacerH(text = '— Area Kosong —') {
            const delBtn = editMode ? `<button class="delete-element-btn" onclick="event.stopPropagation();deleteElement(this)" title="Hapus spacer">✕</button>` : '';
            const handles = editMode ? `
            <div class="resize-handle resize-handle-top"></div>
            <div class="resize-handle resize-handle-bottom"></div>
            <div class="resize-handle resize-handle-left"></div>
            <div class="resize-handle resize-handle-right"></div>` : '';
            return `<div class="spacer-h" draggable="${editMode}">${text}${delBtn}${handles}</div>`;
        }

        function buildSpacerV(text = 'Area<br>Kosong') {
            const delBtn = editMode ? `<button class="delete-element-btn" onclick="event.stopPropagation();deleteElement(this)" title="Hapus spacer">✕</button>` : '';
            const handles = editMode ? `
            <div class="resize-handle resize-handle-top"></div>
            <div class="resize-handle resize-handle-bottom"></div>
            <div class="resize-handle resize-handle-left"></div>
            <div class="resize-handle resize-handle-right"></div>` : '';
            return `<div class="spacer-v" draggable="${editMode}">${text}${delBtn}${handles}</div>`;
        }

        // ============ DELETE ELEMENT ============
        function deleteElement(btn) {
            if (!isAdmin() || !editMode) return;
            const element = btn.closest('.spacer-h, .spacer-v, .empty-box');
            if (!element) return;
            if (!confirm('Hapus elemen ini?')) return;
            element.remove();
            showToast('🗑️ Elemen dihapus. Simpan sebagai Preset untuk menyimpan permanen.');
        }

        // ============ DENAH ============
        function renderFrozenPlan() {
            const adminBtn = isAdmin() ? `<button class="reset-btn" onclick="resetAllData()"><i class="fas fa-exclamation-triangle"></i> 🗑️ Hapus Semua</button>` : '';
            const presetPanel = (isAdmin() && editMode) ? renderPresetPanel() : '';
            const editToolbar = isAdmin() ? `
            <div class="edit-toolbar ${editMode ? 'active' : ''}">
                <span style="font-weight:700;">✏️ Mode Edit</span>
                <button onclick="toggleEditMode()" class="${editMode ? 'active' : ''}">${editMode ? '✅ Aktif' : 'Nonaktif'}</button>
                <button onclick="openSaveModal()">💾 Simpan Preset</button>
                <button onclick="addEmptyBox()">➕ Tambah Box Kosong</button>
                <button onclick="addSpacerHorizontal()">➕ Tambah Spacer H</button>
                <button onclick="addSpacerVertical()">➕ Tambah Spacer V</button>
            </div>` : '';

        function loadPreset(slot) {

            const preset = layoutPresets[currentArea][slot];
            if (!preset) { showToast('⚠️ Preset kosong.'); return; }

        function deletePreset(slot) {
            if (!isAdmin()) return;
            if (!confirm(`Hapus Preset ${slot}?`)) return;
            layoutPresets[currentArea][slot] = null;
            if (activePreset[currentArea] === slot) activePreset[currentArea] = null;
            saveToFirestore();
            renderDashboard();
            showToast(`🗑️ Preset ${slot} dihapus.`);

        function captureCurrentLayout() {
            const layout = { boxes: {}, spacers: [], emptyBoxes: [] };
            document.querySelectorAll('.baris-box').forEach(box => {
                const key = box.dataset.section + '_' + box.dataset.index;
                layout.boxes[key] = { width: box.style.width || box.offsetWidth + 'px', height: box.style.height || box.offsetHeight + 'px' };
            });
            document.querySelectorAll('.spacer-h, .spacer-v').forEach((spacer, i) => {
                layout.spacers.push({ index: i, className: spacer.className, minHeight: spacer.style.minHeight || '', minWidth: spacer.style.minWidth || '', flex: spacer.style.flex || '' });
            });
            document.querySelectorAll('.empty-box').forEach((box, i) => {
                layout.emptyBoxes.push({ index: i, width: box.style.width || box.offsetWidth + 'px', height: box.style.height || box.offsetHeight + 'px' });
            });
            return layout;
        }

        function applyLayout(layoutData) {
            if (!layoutData) return;
            setTimeout(() => {
                if (layoutData.boxes) {
                    for (const [key, size] of Object.entries(layoutData.boxes)) {
                        const [section, index] = key.split('_');
                        const box = document.querySelector(`.baris-box[data-section="${section}"][data-index="${index}"]`);
                        if (box) { if (size.width) box.style.width = size.width; if (size.height) box.style.height = size.height; }
                    }
                }
                if (layoutData.spacers) {
                    const spacers = document.querySelectorAll('.spacer-h, .spacer-v');
                    layoutData.spacers.forEach(s => {
                        if (spacers[s.index]) {
                            if (s.minHeight) spacers[s.index].style.minHeight = s.minHeight;
                            if (s.minWidth) spacers[s.index].style.minWidth = s.minWidth;
                            if (s.flex) spacers[s.index].style.flex = s.flex;
                        }
                    });
                }
                if (layoutData.emptyBoxes) {
                    const boxes = document.querySelectorAll('.empty-box');
                    layoutData.emptyBoxes.forEach(s => {
                        if (boxes[s.index]) {
                            if (s.width) boxes[s.index].style.width = s.width;
                            if (s.height) boxes[s.index].style.height = s.height;
                        }
                    });
                }
            }, 200);
        }

        // ============ EDIT MODE ============
        function toggleEditMode() {
            if (!isAdmin()) { showToast('⚠️ Hanya admin.'); return; }
            editMode = !editMode;
            renderDashboard();
            showToast(editMode ? '🔧 Edit mode AKTIF' : '✅ Edit mode NONAKTIF');

        function initEditMode() {
            initBoxDrag();
            initBoxResize();
            initAllSpacerDrag();
            initAllSpacerResize();
            initAllEmptyBoxDrag();
            initAllEmptyBoxResize();
        }

        // DRAG BOX
        function initBoxDrag() {
            document.querySelectorAll('.baris-box').forEach(box => {
                box.addEventListener('dragstart', function(e) {
                    if (!editMode) return;
                    dragState = { element: this, type: 'box' };
                    this.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', 'box');
                });
                box.addEventListener('dragend', function() { this.classList.remove('dragging');
                    dragState = null;
                    clearDropZones(); });
            });
            initDropZones();
        }

        // DRAG SPACER
        function initAllSpacerDrag() {
            document.querySelectorAll('.spacer-h, .spacer-v').forEach(s => initSpacerDrag(s));
        }

        function initSpacerDrag(spacer) {
            spacer.setAttribute('draggable', editMode);
            spacer.addEventListener('dragstart', function(e) {
                if (!editMode) { e.preventDefault(); return; }
                dragState = { element: this, type: 'spacer' };
                this.classList.add('dragging');
                e.dataTransfer.setData('text/plain', 'spacer');
            });
            spacer.addEventListener('dragend', function() { this.classList.remove('dragging');
                dragState = null;
                clearDropZones(); });
        }

        // DRAG EMPTY BOX
        function initAllEmptyBoxDrag() {
            document.querySelectorAll('.empty-box').forEach(box => initEmptyBoxDrag(box));
        }

        function initEmptyBoxDrag(box) {
            box.setAttribute('draggable', editMode);
            box.addEventListener('dragstart', function(e) {
                if (!editMode) { e.preventDefault(); return; }
                dragState = { element: this, type: 'empty-box' };
                this.classList.add('dragging');
                e.dataTransfer.setData('text/plain', 'empty-box');
            });
            box.addEventListener('dragend', function() { this.classList.remove('dragging');
                dragState = null;
                clearDropZones(); });
        }

        function initDropZones() {
            const zones = document.querySelectorAll('.boxes-row, .frz-row, .chl-row, .chl-top, .chl-bot, .frz-left-stack, .frz-right-stack, .chl-left-stack, .chl-right-stack, .spacer-v, .spacer-h, #frzPlan, #chlPlan');
            zones.forEach(zone => {
                zone.addEventListener('dragover', function(e) {
                    if (!editMode || !dragState) return;
                    e.preventDefault();
                    this.classList.add('drop-zone');
                });
                zone.addEventListener('dragleave', function() { this.classList.remove('drop-zone'); });
                zone.addEventListener('drop', function(e) {
                    if (!editMode || !dragState) return;
                    e.preventDefault();
                    this.classList.remove('drop-zone');
                    if (dragState.element && this !== dragState.element && !this.contains(dragState.element)) {
                        if (this.classList.contains('boxes-row') || this.classList.contains('frz-row') || this.classList.contains('chl-row') || this.classList.contains('chl-top') || this.classList.contains('chl-bot')) {
                            this.appendChild(dragState.element);
                        } else {
                            this.after(dragState.element);
                        }
                        showToast('✅ Elemen dipindahkan.');
                    }
                });
            });
        }

        function clearDropZones() {
            document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drop-zone'));
        }

        // RESIZE BOX
        function initBoxResize() {
            document.querySelectorAll('.baris-box').forEach(box => initBoxResizeSingle(box));
        }

        function initBoxResizeSingle(box) {
            const directions = ['top', 'right', 'bottom', 'left', 'top-left', 'top-right', 'bottom-left', 'bottom-right'];
            directions.forEach(dir => {
                const handle = box.querySelector(`.resize-handle-${dir}`);
                if (handle) {
                    handle.addEventListener('mousedown', function(e) {
                        if (!editMode) return;
                        e.preventDefault();
                        e.stopPropagation();
                        startResize(e, box, dir);
                    });
                }
            });
        }

        function initAllEmptyBoxResize() {
            document.querySelectorAll('.empty-box').forEach(box => initBoxResizeSingle(box));
        }

        function startResize(e, box, direction) {
            const startX = e.clientX;
            const startY = e.clientY;
            const startWidth = box.offsetWidth;
            const startHeight = box.offsetHeight;

            function onMouseMove(e) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                if (direction.includes('right')) box.style.width = Math.max(50, Math.min(400, startWidth + dx)) + 'px';
                if (direction.includes('left')) box.style.width = Math.max(50, Math.min(400, startWidth - dx)) + 'px';
                if (direction.includes('bottom')) box.style.height = Math.max(50, Math.min(400, startHeight + dy)) + 'px';
                if (direction.includes('top')) box.style.height = Math.max(50, Math.min(400, startHeight - dy)) + 'px';
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                showToast('✅ Ukuran diubah.');
            }
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        // RESIZE SPACER
        function initAllSpacerResize() {
            document.querySelectorAll('.spacer-h, .spacer-v').forEach(s => initSpacerResize(s));
        }

        function initSpacerResize(spacer) {
            if (!spacer.querySelector('.resize-handle-top')) {
                spacer.innerHTML += `<div class="resize-handle resize-handle-top"></div><div class="resize-handle resize-handle-bottom"></div><div class="resize-handle resize-handle-left"></div><div class="resize-handle resize-handle-right"></div>`;
            }
            ['top', 'bottom', 'left', 'right'].forEach(dir => {
                const handle = spacer.querySelector(`.resize-handle-${dir}`);
                if (handle) {
                    handle.addEventListener('mousedown', function(e) {
                        if (!editMode) return;
                        e.preventDefault();
                        e.stopPropagation();
                        spacerResize(e, spacer, dir);
                    });
                }
            });
        }

        function spacerResize(e, spacer, direction) {
            const startX = e.clientX;
            const startY = e.clientY;
            const startWidth = spacer.offsetWidth;
            const startHeight = spacer.offsetHeight;

            function onMouseMove(e) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                if (direction === 'bottom') spacer.style.minHeight = Math.max(15, Math.min(300, startHeight + dy)) + 'px';
                if (direction === 'top') spacer.style.minHeight = Math.max(15, Math.min(300, startHeight - dy)) + 'px';
                if (direction === 'right') { spacer.style.minWidth = Math.max(20, Math.min(500, startWidth + dx)) + 'px';
                    spacer.style.flex = 'none'; }
                if (direction === 'left') { spacer.style.minWidth = Math.max(20, Math.min(500, startWidth - dx)) + 'px';
                    spacer.style.flex = 'none'; }
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                showToast('✅ Spacer diubah.');
            }
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        // ============ SEARCH, DETAIL, INPUT, HISTORY, REKAP, MANAGE (tetap sama) ============
        function renderSearch(keyword = '') {
            const allBaskets = [];
            for (const a of ['frozen', 'chiller']) {
                for (const [no, b] of Object.entries(appData[a].baskets)) {
                    allBaskets.push({ area: a, no: parseInt(no), section: b.section, baris: b.baris, slot: b.slot,
                        items: b.items || [] });
                }
            }
            const now = new Date();
            let allItems = [];
            allBaskets.forEach(b => b.items.forEach(it => allItems.push({ ...it, area: b.area, no: b.no, section: b.section,
                baris: b.baris, slot: b.slot })));
            let filtered = allItems;
            if (keyword.trim()) {
                const kw = keyword.toLowerCase().trim();
                filtered = allItems.filter(i => i.nama.toLowerCase().includes(kw) || (i.jenis && i.jenis.toLowerCase()
                    .includes(kw)));
            }
            filtered.sort((a, b) => a.area.localeCompare(b.area) || a.section.localeCompare(b.section) || a.baris.localeCompare(
                b.baris) || a.slot - b.slot);

            function hl(t, kw) {
                if (!kw.trim()) return t;
                return t.replace(new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
                    '<span class="search-highlight">$1</span>');
            }
            let html = '';
            if (filtered.length === 0 && keyword.trim()) html =
            '<div class="empty-state">🔍 Tidak ditemukan.</div>';
            else filtered.forEach(it => {
                const exp = it.expDate ? new Date(it.expDate) : null;
                const est = it.estOutDate ? new Date(it.estOutDate) : null;
                let st = '',
                    sc = '';
                if (exp && exp < now) { st = '⚠️ EXPIRED';
                    sc = 'status-expired'; } else if (est && est < now) { st = '⏰ EST LEWAT';
                    sc = 'status-warning'; } else if (exp || est) { const d = exp ? Math.ceil((exp - now) /
                        86400000) : Math.ceil((est - now) / 86400000);
                    st = `✅ ${d} hari`;
                    sc = d <= 7 ? 'status-warning' : 'status-safe'; }
                html +=
                    `<div class="search-result-item" onclick="navigateToBasket(${it.no},'${it.area}')"><div class="item-name">${hl(it.nama,keyword)}</div><div class="item-detail">${it.qty} | ${it.jenis||'-'} | Masuk: ${it.tglMasuk?new Date(it.tglMasuk).toLocaleDateString('id-ID'):'-'}</div><div class="item-location"><i class="fas fa-map-marker-alt"></i> ${it.area==='frozen'?'❄️':'🌡️'} → ${it.section} ${it.baris} → Slot ${it.slot} → #${it.no} ${st?`<span class="item-status ${sc}">${st}</span>`:''}</div></div>`;
            });
            container.innerHTML =
                `<div class="card"><h3>🔍 Cari Barang</h3><div class="search-container"><i class="fas fa-search search-icon"></i><input id="searchInput" placeholder="Cari nama/jenis..." value="${keyword}" oninput="renderSearch(this.value)" autofocus></div>${keyword.trim()?`<div class="search-result-count">📊 <strong>${filtered.length}</strong> item</div>`:''}<div>${html}</div></div>`;
        }

        function navigateToBasket(no, area) {
            if (area !== currentArea) { currentArea = area;
                document.getElementById('areaSelect').value = area;
                document.getElementById('areaTitle').textContent = area === 'frozen' ? 'Frozen' : 'Chiller'; }
            showBasketDetail(no);
        }

        function showBasketDetail(no, moveIdx = null) {
            const b = currentBaskets()[no];
            const cnt = itemCount(no);
            const now = new Date();
            let items = b?.items.length ? b.items.map((it, idx) => {
                let cls = '',
                    lbl = '';
                if (it.expDate && new Date(it.expDate) < now) { cls = 'expired';
                    lbl = ' ⚠️ EXP'; } else if (it.estOutDate && new Date(it.estOutDate) < now) { cls =
                    'expired';
                    lbl = ' ⚠️ EST LEWAT'; }
                const mf = moveIdx === idx ? renderMoveForm(no, idx) : '';
                return `<div class="item-row ${cls}"><div><strong>${it.nama}</strong> (${it.qty})${lbl}<br><small>${it.jenis||''} | Masuk: ${it.tglMasuk?new Date(it.tglMasuk).toLocaleDateString('id-ID'):'-'} ${it.expDate?' | Exp: '+new Date(it.expDate).toLocaleDateString('id-ID'):''} ${it.estOutDate?' | Est: '+new Date(it.estOutDate).toLocaleDateString('id-ID'):''}</small></div><div style="display:flex;gap:4px;"><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();showBasketDetail(${no},${idx})">Pindah</button><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();editEstOutDate(${no},${idx})"><i class="fas fa-edit"></i></button><button class="btn btn-outline btn-sm" onclick="keluarkanItem(${no},${idx})">Keluar</button></div>${mf}</div>`;
            }).join('') :
