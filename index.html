<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Walk-in Frozen & Chiller | v2.0 - Fixed Edit Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #fff;
            --text: #1e293b;
            --primary: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --orange: #f97316;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 20px;
            --move-color: #8b5cf6;
            --in-color: #10b981;
            --out-color: #ef4444;
            --search-color: #06b6d4;
            --preset-1: #8b5cf6;
            --preset-2: #06b6d4;
            --preset-3: #f59e0b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #e0e7ff, #f0f4ff);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            width: 100%;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .area-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .area-selector select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-weight: 600;
        }
        .user-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-bar {
            display: flex;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 6px 12px;
            gap: 6px;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1 0 auto;
            padding: 10px 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: #64748b;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.82rem;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .container {
            width: 100%;
            max-width: 950px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 16px;
            box-shadow: var(--shadow);
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 4px;
        }
        input,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #f8fafc;
        }
        .btn {
            padding: 12px 18px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.75rem;
        }
        .btn-xs {
            padding: 4px 8px;
            font-size: 0.65rem;
            border-radius: 8px;
        }
        .btn-warning {
            background: var(--warning);
            color: white;
        }
        .btn-success {
            background: var(--success);
            color: white;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 12px;
            margin-bottom: 6px;
        }
        .item-row.expired {
            background: #fee2e2;
            border: 1px solid #ef4444;
        }
        .empty-state {
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
            z-index: 200;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .google-btn {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
            width: 100%;
        }

        /* SEARCH */
        .search-container {
            position: relative;
            margin-bottom: 16px;
        }
        .search-container input {
            padding-left: 42px;
            font-size: 1rem;
            border: 2px solid #cbd5e1;
            transition: border-color 0.3s;
        }
        .search-container input:focus {
            border-color: var(--search-color);
            outline: none;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .search-result-item {
            background: #f0f9ff;
            border-left: 6px solid var(--search-color);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-result-item:hover {
            background: #e0f2fe;
            transform: translateX(4px);
        }
        .search-result-item .item-name {
            font-weight: 700;
            font-size: 1rem;
            color: #0f172a;
        }
        .search-result-item .item-detail {
            font-size: 0.85rem;
            color: #475569;
            margin-top: 4px;
        }
        .search-result-item .item-location {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #dbeafe;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1d4ed8;
            margin-top: 6px;
        }
        .search-result-item .item-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 8px;
        }
        .status-expired {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-warning {
            background: #fef3c7;
            color: #92400e;
        }
        .status-safe {
            background: #d1fae5;
            color: #065f46;
        }
        .search-highlight {
            background: #fef08a;
            padding: 1px 3px;
            border-radius: 3px;
        }
        .search-result-count {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* DENAH */
        .fp-room {
            border: 3px solid #1e293b;
            border-radius: 10px;
            padding: 10px;
            overflow-x: auto;
            position: relative;
            min-height: 200px;
        }
        .fp-room-title {
            font-weight: 800;
            font-size: 0.95rem;
            color: #1e293b;
            margin-bottom: 10px;
            text-align: center;
        }
        .fp-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 8px 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        /* EDIT MODE */
        .edit-mode .baris-box {
            cursor: move;
            position: relative;
            transition: box-shadow 0.2s;
        }
        .edit-mode .baris-box:hover {
            box-shadow: 0 0 0 3px var(--primary);
            z-index: 10;
        }
        .edit-mode .baris-box.dragging {
            opacity: 0.7;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
            z-index: 100;
        }
        .edit-mode .spacer-h,
        .edit-mode .spacer-v,
        .edit-mode .empty-box {
            cursor: move;
            position: relative;
            transition: background 0.2s, box-shadow 0.2s;
            border: 2px dashed #cbd5e1;
        }
        .edit-mode .spacer-h:hover,
        .edit-mode .spacer-v:hover,
        .edit-mode .empty-box:hover {
            background: rgba(37, 99, 235, 0.1) !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 2px var(--primary);
            z-index: 10;
        }

        .delete-element-btn {
            display: none;
            position: absolute;
            top: -12px;
            right: -12px;
            width: 24px;
            height: 24px;
            background: var(--danger);
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.6rem;
            font-weight: bold;
            z-index: 35;
            align-items: center;
            justify-content: center;
            line-height: 1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .edit-mode .spacer-h:hover .delete-element-btn,
        .edit-mode .spacer-v:hover .delete-element-btn,
        .edit-mode .empty-box:hover .delete-element-btn {
            display: flex;
        }
        .delete-element-btn:hover {
            background: #dc2626;
            transform: scale(1.15);
        }

        .drop-zone {
            border: 2px dashed #6366f1 !important;
            background: rgba(99, 102, 241, 0.15) !important;
        }

        .empty-box {
            width: 110px;
            height: 175px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.7rem;
            flex-shrink: 0;
            position: relative;
            transition: width 0.15s, height 0.15s;
        }

        /* EDIT TOOLBAR */
        .edit-toolbar {
            display: none;
            background: #1e293b;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .edit-toolbar.active {
            display: flex;
        }
        .edit-toolbar .toolbar-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .edit-toolbar .toolbar-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 4px;
        }
        .edit-toolbar button {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .edit-toolbar button:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .edit-toolbar button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        .edit-toolbar button.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        .edit-toolbar .undo-redo-btn {
            font-size: 1rem;
            padding: 6px 10px;
            min-width: 36px;
            justify-content: center;
        }

        /* PRESET PANEL */
        .preset-panel {
            display: none;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            gap: 10px;
        }
        .preset-panel.active {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .preset-card {
            flex: 1;
            min-width: 180px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            position: relative;
        }
        .preset-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }
        .preset-card.active-preset {
            border-color: var(--success);
            background: #f0fdf4;
        }
        .preset-card.preset-1 {
            border-left: 4px solid var(--preset-1);
        }
        .preset-card.preset-2 {
            border-left: 4px solid var(--preset-2);
        }
        .preset-card.preset-3 {
            border-left: 4px solid var(--preset-3);
        }
        .preset-card .preset-name {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .preset-card .preset-info {
            font-size: 0.7rem;
            color: #64748b;
        }
        .preset-card .preset-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--success);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }
        .preset-card .preset-delete {
            position: absolute;
            top: 4px;
            right: 4px;
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 2px 5px;
            border-radius: 4px;
        }
        .preset-card .preset-delete:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        /* SAVE MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-box h3 {
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        .modal-box .preset-options {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .modal-box .preset-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .modal-box .preset-option:hover {
            border-color: var(--primary);
        }
        .modal-box .preset-option.selected {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .baris-box {
            width: 110px;
            height: 175px;
            background: #fde68a;
            border: 2.5px solid #d97706;
            border-radius: 10px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
            transition: width 0.15s, height 0.15s;
        }
        .baris-box-lbl {
            font-size: 0.6rem;
            font-weight: 800;
            color: #92400e;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
        }
        .baris-slots {
            display: flex;
            flex-direction: column-reverse;
            gap: 1px;
            flex: 1;
            min-height: 0;
        }
        .basket-slot {
            flex: 1;
            min-height: 0;
            border-radius: 5px;
            background: #fff;
            border: 1.5px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
            overflow: hidden;
        }
        .basket-slot:active {
            transform: scale(0.95);
        }
        .basket-slot.green {
            border-color: var(--success);
            background: #ecfdf5;
        }
        .basket-slot.orange {
            border-color: var(--orange);
            background: #fff7ed;
            animation: softPulse 1.8s infinite;
        }
        .basket-slot.red {
            border-color: var(--danger);
            background: #fef2f2;
            animation: strongPulse 0.9s infinite;
        }
        .basket-slot.slot-empty {
            background: #f8fafc;
            border: 1.5px dashed #d1d5db;
            cursor: default;
        }
        .slot-num {
            font-weight: 800;
            font-size: 0.6rem;
            line-height: 1;
            color: #1e293b;
        }
        .slot-count {
            font-size: 0.5rem;
            color: #64748b;
        }
        .slot-alert {
            position: absolute;
            top: -3px;
            right: -3px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 11px;
            height: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.4rem;
            font-weight: bold;
            z-index: 5;
        }

        .baris-box.stock-box {
            background: #e0e7ff;
            border-color: #6366f1;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        .baris-box.stock-box .baris-box-lbl {
            color: #4338ca;
            font-size: 0.58rem;
            white-space: normal;
            text-align: center;
            line-height: 1.3;
            margin: 0;
        }
        .stock-icon {
            font-size: 1.8rem;
        }

        .spacer-h {
            min-height: 35px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8d3df;
            font-size: 0.7rem;
            width: 100%;
            transition: min-height 0.15s, min-width 0.15s;
            position: relative;
        }
        .spacer-v {
            background: rgba(255, 255, 255, 0.4);
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8d3df;
            font-size: 0.7rem;
            flex: 1;
            min-width: 60px;
            transition: min-height 0.15s, min-width 0.15s;
            position: relative;
        }

        .frz-plan,
        .chl-plan {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 850px;
        }
        .frz-row,
        .chl-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            min-height: 40px;
        }
        .frz-left-stack,
        .chl-left-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .frz-right-stack,
        .chl-right-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .boxes-row {
            display: flex;
            gap: 8px;
        }
        .boxes-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .chl-top {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .chl-space {
            min-height: 80px;
        }
        .chl-bot {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .move-form {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 8px;
            margin-top: 6px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .move-form select {
            width: auto;
            padding: 6px;
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .history-item.type-in {
            background: #ecfdf5;
            border-left: 6px solid var(--in-color);
        }
        .history-item.type-out {
            background: #fef2f2;
            border-left: 6px solid var(--out-color);
        }
        .history-item.type-move {
            background: #f5f3ff;
            border-left: 6px solid var(--move-color);
        }
        .history-item.type-edit {
            background: #fffbeb;
            border-left: 6px solid var(--warning);
        }
        .history-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }
        .badge-in {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-out {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-move {
            background: #ede9fe;
            color: #5b21b6;
        }
        .badge-edit {
            background: #fef3c7;

<body>
    <div id="loginScreen" class="container" style="max-width:400px;margin-top:40px;">
        <div class="card" style="text-align:center">
            <h2>🔐 Masuk Walk-in</h2>
            <p style="color:#64748b;margin-bottom:16px;">Gunakan akun tim</p>
            <div class="form-group"><input type="email" id="loginEmail" placeholder="Masukkan email"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Masukkan password"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Masuk</button>
            <button class="google-btn" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Login dengan Google</button>
            <p id="loginError" style="color:red;margin-top:10px;"></p>
        </div>
    </div>

    <div id="appScreen" style="display:none;width:100%;">
        <div class="header">
            <h2>🧊 Walk-in <span id="areaTitle">Frozen</span></h2>
            <div class="area-selector">
                <span style="color:white;">Area:</span>
                <select id="areaSelect" onchange="switchArea()">
                    <option value="frozen">❄️ Frozen</option>

            <div class="user-row">
                <span id="currentUserName" style="font-size:0.8rem;color:white;"></span>

            </div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="dashboard">🗺️ Denah</button>
            <button class="tab-btn" data-tab="search">🔍 Cari</button>
            <button class="tab-btn" data-tab="in">📥 Masuk</button>
            <button class="tab-btn" data-tab="history">📋 Riwayat</button>
            <button class="tab-btn" data-tab="rekap">📊 Rekap</button>
            <button class="tab-btn" data-tab="manage">⚙️ Atur</button>

        <div class="container" id="appContainer"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- SAVE MODAL -->
    <div class="modal-overlay" id="saveModal">
        <div class="modal-box">
            <h3>💾 Simpan Layout sebagai Preset</h3>
            <p style="font-size:0.85rem;color:#64748b;margin-bottom:12px;">Pilih slot preset:</p>
            <div class="preset-options" id="presetOptions">
                <div class="preset-option opt-1" data-preset="1" onclick="selectPresetSlot(1)">🟣 <strong>Preset 1</strong><br><small id="preset1Info">Kosong</small></div>
                <div class="preset-option opt-2" data-preset="2" onclick="selectPresetSlot(2)">🔵 <strong>Preset 2</strong><br><small id="preset2Info">Kosong</small></div>
                <div class="preset-option opt-3" data-preset="3" onclick="selectPresetSlot(3)">🟡 <strong>Preset 3</strong><br><small id="preset3Info">Kosong</small></div>
            </div>
            <div class="form-group"><label>Nama Preset</label><input type="text" id="presetName" placeholder="Contoh: Layout Tim A"></div>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-primary" onclick="confirmSavePreset()" style="flex:1;">💾 Simpan</button>
                <button class="btn btn-outline" onclick="closeSaveModal()">Batal</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyA1K3kQ93LSz1yKpBa2cMCRD045alTm6cs",
            authDomain: "walk-in-web.firebaseapp.com",
            projectId: "walk-in-web",
            storageBucket: "walk-in-web.firebasestorage.app",
            messagingSenderId: "42449089338",
            appId: "1:42449089338:web:a34b589a7c746b8dcc1603"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== ADMIN ====================
        const _ENCODED_ADMIN_EMAILS = ['c2xhcmRhci5tZW5AZ21haWwuY29t'];
        function _getAdminEmails() { return _ENCODED_ADMIN_EMAILS.map(e => { try { return atob(e); } catch (x) { return ''; } }).filter(e => e); }
        const ADMIN_EMAILS = _getAdminEmails();

        // ==================== STATE ====================
        let currentArea = 'frozen';
        let appData = { frozen: { sections: {}, baskets: {}, transactions: [] }, chiller: { sections: {}, baskets: {}, transactions: [] } };
        let currentTab = 'dashboard';
        let rekapMode = 'bulanan';
        let unsubscribe = null;
        let editMode = false;
        let dragState = null;
        let selectedPresetSlot = null;
        let layoutPresets = { frozen: { 1: null, 2: null, 3: null }, chiller: { 1: null, 2: null, 3: null } };
        let activePreset = { frozen: null, chiller: null };
        
        // ==================== FIX EDIT MODE ====================
        let preventRender = false;
        let pendingRender = false;
        let isSaving = false;
        let renderTimeout = null;

        // ==================== UNDO/REDO ====================
        let undoStack = [];
        let redoStack = [];
        const MAX_UNDO = 50;

        function saveUndoState() {
            if (!editMode) return;
            const denah = document.getElementById('frzPlan') || document.getElementById('chlPlan');
            if (!denah) return;
            
            const snapshot = {
                html: denah.innerHTML,
                sections: JSON.parse(JSON.stringify(currentSections()))
            };
            
            undoStack.push(snapshot);
            if (undoStack.length > MAX_UNDO) undoStack.shift();
            redoStack = [];
            updateUndoRedoButtons();
        }

        function undo() { 
            const denah = document.getElementById('frzPlan') || document.getElementById('chlPlan');
            if (!denah || undoStack.length === 0) return;
            
            redoStack.push({
                html: denah.innerHTML,
                sections: JSON.parse(JSON.stringify(currentSections()))
            });
            
            const snapshot = undoStack.pop();
            denah.innerHTML = snapshot.html;
            appData[currentArea].sections = snapshot.sections;
            syncBasketsWithSections(currentArea);
            
            updateUndoRedoButtons();
            if (editMode) initEditMode();
            showToast('↩️ Undo berhasil');
        }

        function redo() { 
            const denah = document.getElementById('frzPlan') || document.getElementById('chlPlan');
            if (!denah || redoStack.length === 0) return;
            
            undoStack.push({
                html: denah.innerHTML,
                sections: JSON.parse(JSON.stringify(currentSections()))
            });
            
            const snapshot = redoStack.pop();
            denah.innerHTML = snapshot.html;
            appData[currentArea].sections = snapshot.sections;
            syncBasketsWithSections(currentArea);
            
            updateUndoRedoButtons();
            if (editMode) initEditMode();
            showToast('↪️ Redo berhasil');
        }

        function updateUndoRedoButtons() {
            const undoBtn = document.getElementById('btnUndo');
            const redoBtn = document.getElementById('btnRedo');
            if (undoBtn) { 
                undoBtn.disabled = undoStack.length === 0;
                undoBtn.title = `Undo (${undoStack.length} langkah)`; 
            }
            if (redoBtn) { 
                redoBtn.disabled = redoStack.length === 0;
                redoBtn.title = `Redo (${redoStack.length} langkah)`; 
            }
        }

        function showSavingIndicator(show) {
            const indicator = document.getElementById('savingIndicator');
            if (indicator) {
                if (show) {
                    indicator.classList.add('show');
                } else {
                    indicator.classList.remove('show');
                }
            }
        }

        // ==================== DEFAULT SECTIONS ====================
        const defaultFrozenSections = {
            'IMP': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null, null], D: [null, null, null, null, null], E: [null, null, null, null, null] },
            'RTL': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null, null] },
            'NPL': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null, null] },
            'RDQ': { A: [null, null, null, null, null] },
            'MTPP': { A: [null, null, null, null, null], B: [null, null, null, null, null] },
            'MI': { A: [null, null, null, null, null], B: [null, null, null, null, null], C: [null, null, null, null, null] }
        };
        const defaultChillerSections = {
            'IMP': { A: [null, null, null, null, null] },
            'RTL': { A: [null, null, null, null, null] },
            'NPL': { A: [null, null, null, null, null] },
            'MTPP': { A: [null, null, null, null, null] },
            'RDQ': { A: [null, null, null, null, null] },
            'MI': { A: [null, null, null, null, null] },
            'THAWING': { A: [null, null, null, null, null], B: [null, null, null, null, null] }
        };

        function getDefaultSections(a) { return a === 'frozen' ? JSON.parse(JSON.stringify(defaultFrozenSections)) : JSON.parse(JSON.stringify(defaultChillerSections)); }
        function upgradeBarisToSlots(b) { if (!b || !Array.isArray(b)) return [null, null, null, null, null]; const s = [null, null, null, null, null];
            b.forEach((n, i) => { if (i < 5 && n !== null && n !== undefined) s[i] = n; }); return s; }
        function convertSectionsToSlotFormat(sec) { const out = {}; for (const [sn, bo] of Object.entries(sec)) { const co = {}; for (const [bn, val] of Object.entries(bo)) { co[bn] = (Array.isArray(val) && val.length === 5 && val.every(v => v === null || typeof v === 'number')) ? val : upgradeBarisToSlots(val); } out[sn] = co; } return out; }

        // ==================== AUTH ====================
        function login() { const email = document.getElementById('loginEmail').value.trim(); const pass = document.getElementById('loginPassword').value.trim(); if (!email || !pass) { document.getElementById('loginError').textContent = 'Email dan password harus diisi.'; return; } auth.signInWithEmailAndPassword(email, pass).catch(e => document.getElementById('loginError').textContent = 'Gagal: ' + e.message); }
        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => document.getElementById('loginError').textContent = 'Google login gagal: ' + e.message); }
        function logout() { auth.signOut(); }
        auth.onAuthStateChanged(user => { if (user) { document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('currentUserName').textContent = user.email;
                listenToFirestore(); } else { document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('appScreen').style.display = 'none'; if (unsubscribe) unsubscribe(); } });

        // ==================== DATA ====================
        function listenToFirestore() { 
            if (unsubscribe) unsubscribe();
            
            unsubscribe = db.collection('shared').doc('data').onSnapshot(doc => { 
                if (preventRender || editMode) {
                    pendingRender = true;
                    return;
                }
                
                if (doc.exists) { 
                    const d = doc.data(); 
                    let fd = d.frozen || { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] }; 
                    let cd = d.chiller || { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };
                    
                    fd.sections = convertSectionsToSlotFormat(fd.sections || {});
                    cd.sections = convertSectionsToSlotFormat(cd.sections || {});
                    
                    appData.frozen = fd;
                    appData.chiller = cd; 
                    
                    if (d.layoutPresets) layoutPresets = d.layoutPresets; 
                    if (d.activePreset) activePreset = d.activePreset;
                    
                    syncBasketsWithSections('frozen');
                    syncBasketsWithSections('chiller'); 
                    
                    if (!d.frozen) saveToFirestore();
                    
                    if (!editMode) {
                        safeRender();
                    } else {
                        pendingRender = true;
                    }
                } else { 
                    appData.frozen = { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] };
                    appData.chiller = { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };
                    syncBasketsWithSections('frozen');
                    syncBasketsWithSections('chiller');
                    saveToFirestore();
                    
                    if (!editMode) {
                        safeRender();
                    } else {
                        pendingRender = true;
                    }
                } 
            }); 
        }
        
        function safeRender() {
            if (renderTimeout) clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => {
                if (!editMode && !preventRender) {
                    renderCurrentTab();
                }
            }, 50);
        }

        function saveToFirestore() { 
            return db.collection('shared').doc('data').set({ 
                frozen: appData.frozen, 
                chiller: appData.chiller, 
                layoutPresets: layoutPresets, 
                activePreset: activePreset,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }); 
        }

        async function saveCurrentLayoutToFirestore() {
            if (!isAdmin()) {
                showToast('⚠️ Hanya admin yang bisa menyimpan layout');
                return;
            }
            
            if (isSaving) return;
            isSaving = true;
            showSavingIndicator(true);
            
            try {
                const layoutData = captureCurrentLayout();
                const updateData = {};
                updateData[`${currentArea}.layout`] = layoutData;
                
                await db.collection('shared').doc('data').update(updateData);
                showToast('✅ Layout berhasil disimpan ke database');
                console.log('Layout saved to Firestore');
            } catch (err) {
                console.error('Error saving layout:', err);
                showToast('⚠️ Gagal menyimpan layout: ' + err.message);
            } finally {
                isSaving = false;
                setTimeout(() => showSavingIndicator(false), 500);
            }
        }

        function updateSectionsFromDOM() {
            const boxes = document.querySelectorAll('.baris-box');
            const newSections = getDefaultSections(currentArea);
            
            boxes.forEach(box => {
                const section = box.dataset.section;
                const index = parseInt(box.dataset.index);
                
                if (section && !isNaN(index)) {
                    const barisNames = Object.keys(currentSections()[section] || {});
                    if (barisNames[index]) {
                        const slots = box.querySelectorAll('.basket-slot');
                        const barisName = barisNames[index];
                        
                        slots.forEach((slot, slotIdx) => {
                            const slotNum = slot.querySelector('.slot-num');
                            if (slotNum && slotNum.textContent && !isNaN(parseInt(slotNum.textContent))) {
                                const no = parseInt(slotNum.textContent);
                                if (!isNaN(no)) {
                                    if (!newSections[section]) newSections[section] = {};
                                    if (!newSections[section][barisName]) newSections[section][barisName] = [null, null, null, null, null];
                                    newSections[section][barisName][slotIdx] = no;
                                }
                            }
                        });
                    }
                }
            });
            
            appData[currentArea].sections = newSections;
            syncBasketsWithSections(currentArea);
            saveToFirestore();
        }

        function syncBasketsWithSections(area) { 
            const sec = appData[area].sections; 
            const baskets = appData[area].baskets; 
            const valid = new Set(); 
            for (const bo of Object.values(sec)) for (const sl of Object.values(bo)) sl.forEach(n => { if (n !== null) valid.add(n); }); 
            for (const n of Object.keys(baskets)) if (!valid.has(Number(n))) delete baskets[n]; 
            for (const [sn, bo] of Object.entries(sec)) for (const [bn, sl] of Object.entries(bo)) sl.forEach((n, i) => { if (n === null) return; if (!baskets[n]) baskets[n] = { section: sn, baris: bn, slot: i + 1, items: [] }; else { baskets[n].section = sn;
                            baskets[n].baris = bn;
                            baskets[n].slot = i + 1; } }); }

        function currentSections() { return appData[currentArea].sections; }
        function currentBaskets() { return appData[currentArea].baskets; }
        function currentTransactions() { return appData[currentArea].transactions; }
        
        function switchArea() { 
            if (editMode) {
                showToast('⚠️ Keluar dari edit mode terlebih dahulu');
                return;
            }
            currentArea = document.getElementById('areaSelect').value;
            document.getElementById('areaTitle').textContent = currentArea === 'frozen' ? 'Frozen' : 'Chiller';
            renderCurrentTab(); 
        }
        
        function itemCount(no) { return (currentBaskets()[no]?.items || []).length; }
        function hasExpiredItems(no) { const items = currentBaskets()[no]?.items || []; const now = new Date(); return items.some(i => (i.expDate && new Date(i.expDate) < now) || (i.estOutDate && new Date(i.estOutDate) < now)); }
        
        function showToast(msg) { const t = document.getElementById('toast');
            t.innerHTML = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500); }
            
        function logTransaction(type, detail) { currentTransactions().unshift({ id: Date.now(), timestamp: new Date().toISOString(), type, detail, user: auth.currentUser?.email || 'unknown' }); if (currentTransactions().length > 500) currentTransactions().pop();
            saveToFirestore(); }
            
        function isAdmin() { const u = auth.currentUser; return u && u.providerData.some(p => p.providerId === 'google.com') && ADMIN_EMAILS.includes(u.email); }
        
        async function resetAllData() { if (!isAdmin()) { showToast('⚠️ Hanya admin.'); return; } if (!confirm('⚠️ Hapus total semua data?')) return; 
            await db.collection('shared').doc('data').set({ frozen: { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] }, chiller: { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] }, layoutPresets: { frozen: { 1: null, 2: null, 3: null }, chiller: { 1: null, 2: null, 3: null } }, activePreset: { frozen: null, chiller: null } });
            layoutPresets = { frozen: { 1: null, 2: null, 3: null }, chiller: { 1: null, 2: null, 3: null } };
            activePreset = { frozen: null, chiller: null };
            undoStack = [];
            redoStack = [];
            showToast('✅ Data dihapus.'); }

        const container = document.getElementById('appContainer');
        function renderCurrentTab() { try { 
            if (editMode && currentTab !== 'dashboard') {
                showToast('⚠️ Selesaikan edit mode terlebih dahulu');
                return;
            }
            switch (currentTab) { 
                case 'dashboard': renderDashboard(); break; 
                case 'search': renderSearch(); break; 
                case 'in': renderInputForm(); break; 
                case 'history': renderHistory(); break; 
                case 'rekap': renderRekap(); break; 
                case 'manage': renderManageBaskets(); break; 
            } 
        } catch (e) { console.error(e); container.innerHTML = '<div class="card"><div class="empty-state">Error: ' + e.message + '</div></div>'; } }

        // ==================== BUILD ====================
        function buildBasketSlot(no) { if (no === null) return `<div class="basket-slot slot-empty"></div>`; const c = itemCount(no); const exp = hasExpiredItems(no); let cls = 'basket-slot'; if (c >= 5) cls += ' orange'; else if (exp) cls += ' red'; else if (c > 0) cls += ' green'; const badge = (exp || c >= 5) ? '<span class="slot-alert">!</span>' : ''; return `<div class="${cls}" onclick="${editMode?'':'showBasketDetail('+no+')'}" title="Keranjang ${no} — ${c}/5"><span class="slot-num">${no}</span><span class="slot-count">${c}/5</span>${badge}</div>`; }

                    rows += `<tr><td><strong>${y}</strong></td><td style="color:var(--primary);">+${yd[y].in}</td><td style="color:var(--danger);">-${yd[y].out}</td><td>${yd[y].in-yd[y].out>=0?'+':''}${yd[y].in-yd[y].out}</td><td>${bd}</td></tr>`; }); if (!rows) rows = '<tr><td colspan="5">Belum ada data.</td></tr>';
                container.innerHTML = `<div class="card"><h3>📊 Rekap — ${currentArea.toUpperCase()}</h3>${sb}${mt}<button class="btn btn-sm btn-outline" onclick="downloadRekapExcel()"><i class="fas fa-download"></i> Excel</button><table class="rekap-table"><thead><tr><th>Tahun</th><th>Masuk</th><th>Keluar</th><th>Selisih</th><th>Per Section</th></tr></thead><tbody>${rows}</tbody></table></div>`; } }
            
        function downloadExcel() { const trx = currentTransactions(); if (!trx.length) return showToast('Tidak ada.'); let h = '<html><head><meta charset="UTF-8"></head><body><table border="1"><tr><th>Tgl</th><th>Jenis</th><th>Item</th><th>Qty</th><th>Jenis</th><th>Keranjang</th><th>Section</th><th>User</th><th>Exp</th><th>Est</th></tr>';
            trx.forEach(t => { const d = t.detail;
                h += `<tr><td>${new Date(t.timestamp).toLocaleString('id-ID')}</td><td>${t.type}</td><td>${d.nama||''}</td><td>${d.qty||''}</td><td>${d.jenis||''}</td><td>${d.keranjang||d.dari||''}</td><td>${d.section||''}</td><td>${t.user}</td><td>${d.expDate||''}</td><td>${d.newEstOutDate||d.estOutDate||''}</td></tr>`; });
            h += '</table></body></html>';
            _dlBlob(h, `riwayat_${currentArea}_${new Date().toISOString().split('T')[0]}.xls`); }
            
        function downloadRekapExcel() { const B = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des']; const trx = currentTransactions(); if (!trx.length) return showToast('Tidak ada.'); let h = '<html><head><meta charset="UTF-8"></head><body><table border="1"><tr><th>Bulan/Tahun</th><th>Masuk</th><th>Keluar</th><th>Selisih</th></tr>'; const yd = {};
            trx.forEach(t => { const d = new Date(t.timestamp); const k = rekapMode === 'bulanan' ? B[d.getMonth()] + ' ' + d.getFullYear() : d.getFullYear(); if (!yd[k]) yd[k] = { in: 0, out: 0 };
                yd[k][t.type]++; }); for (const [k, v] of Object.entries(yd)) h += `<tr><td>${k}</td><td>+${v.in}</td><td>-${v.out}</td><td>${v.in-v.out>=0?'+':''}${v.in-v.out}</td></tr>`;
            h += '</table></body></html>';
            _dlBlob(h, `rekap_${currentArea}_${new Date().toISOString().split('T')[0]}.xls`); }
            
        function _dlBlob(html, fn) { const b = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' }); const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = fn;
            a.click(); }
            
        function renderManageBaskets() { 
            if (editMode) { showToast('⚠️ Keluar dari edit mode terlebih dahulu'); return; }
            if (!isAdmin()) { container.innerHTML = '<div class="card"><h3>⚙️ Atur</h3><p style="color:red;">🔒 Hanya admin.</p></div>'; return; } 
            let h = '<div class="card"><h3>⚙️ Atur Slot</h3>'; 
            for (const [sec, bo] of Object.entries(currentSections())) { h += `<div style="margin-bottom:20px;"><strong>📍 ${sec}</strong>`; 
                for (const [bar, slots] of Object.entries(bo)) { h += `<div style="margin-left:8px;"><span class="baris-label">📌 ${bar}</span>`; 
                    for (let i = 0; i < 5; i++) { const no = slots[i]; 
                        if (no) h += `<div style="display:inline-flex;gap:6px;margin:4px;"><span class="chip">Slot ${i+1}: ${no} (${itemCount(no)}/5) <span style="cursor:pointer;color:red;" onclick="clearSlot('${sec}','${bar}',${i})">✕</span></span></div>`; 
                        else h += `<div style="display:inline-flex;gap:6px;margin:4px;"><span class="chip" style="background:#f1f5f9;border:1px dashed #cbd5e1;">Slot ${i+1}: kosong</span><input type="number" id="inp_${sec}_${bar}_${i}" placeholder="No" style="width:80px;padding:4px;"><button class="btn btn-sm btn-primary" onclick="fillSlot('${sec}','${bar}',${i})">Isi</button></div>`; } 
                    h += '</div>'; } 
                h += `<div><button class="btn btn-sm btn-outline" onclick="addBaris('${sec}')">➕ Tambah Baris</button></div></div>`; } 
            h += '</div>';
            container.innerHTML = h; }
            
        window.clearSlot = function(s, b, i) { if (!isAdmin()) return; const no = currentSections()[s][b][i]; if (no && itemCount(no) > 0) return showToast('Masih berisi.'); if (!confirm('Kosongkan?')) return; if (no) delete currentBaskets()[no];
            currentSections()[s][b][i] = null;
            saveToFirestore();
            renderManageBaskets(); };
            
        window.fillSlot = function(s, b, i) { if (!isAdmin()) return; const no = parseInt(document.getElementById(`inp_${s}_${b}_${i}`).value); if (isNaN(no) || no <= 0) return showToast('Invalid.'); for (const [sec, bo] of Object.entries(currentSections())) for (const sl of Object.values(bo)) if (sl.includes(no)) return showToast(`No ${no} sudah dipakai.`);
            currentSections()[s][b][i] = no;
            currentBaskets()[no] = { section: s, baris: b, slot: i + 1, items: [] };
            saveToFirestore();
            renderManageBaskets();
            showToast('✅ Ditempatkan.'); };
            
        window.addBaris = function(s) { if (!isAdmin()) return; const bo = currentSections()[s];
            bo[String.fromCharCode(65 + Object.keys(bo).length)] = [null, null, null, null, null];
            saveToFirestore();
            renderManageBaskets(); };

        // ==================== INIT ====================
        document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', function() {
            if (editMode && this.dataset.tab !== 'dashboard') {
                showToast('⚠️ Selesaikan edit mode terlebih dahulu');
                return;
            }
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentTab = this.dataset.tab;
            renderCurrentTab(); }); });
            
        document.getElementById('areaSelect').value = currentArea;
        document.getElementById('saveModal').addEventListener('click', function(e) { if (e.target === this) closeSaveModal(); });

        // Keyboard shortcut untuk Undo/Redo
        document.addEventListener('keydown', function(e) {
            if (!editMode) return;
            if (e.ctrlKey && e.key === 'z') { e.preventDefault();
                undo(); }
            if (e.ctrlKey && e.key === 'y') { e.preventDefault();
                redo(); }
            if (e.ctrlKey && e.shiftKey && e.key === 'Z') { e.preventDefault();
                redo(); }
        });
    </script>
</body>
</html>
