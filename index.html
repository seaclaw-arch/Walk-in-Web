<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Walk-in Frozen & Chiller | v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* === SAMA SEPERTI SEBELUMNYA === */
        :root {
            --bg: #f0f4f8;
            --card: #fff;
            --text: #1e293b;
            --primary: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --orange: #f97316;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 20px;
            --move-color: #8b5cf6;
            --in-color: #10b981;
            --out-color: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI', system-ui;
            background: linear-gradient(135deg, #e0e7ff, #f0f4ff);
            color: var(--text);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .header {
            background: rgba(15,23,42,0.9); backdrop-filter: blur(10px);
            width:100%; padding:14px 20px; display:flex; justify-content:space-between;
            align-items:center; color:white; position:sticky; top:0; z-index:100;
            gap:12px; flex-wrap:wrap;
        }
        .header h2 { font-size:1.2rem; font-weight:700; }
        .area-selector { display:flex; align-items:center; gap:8px; }
        .area-selector select {
            padding:8px 12px; border-radius:12px; border:1px solid #cbd5e1; font-weight:600;
        }
        .user-row { display:flex; align-items:center; gap:6px; }
        .tab-bar {
            display:flex; width:100%; background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px); padding:6px 12px; gap:6px; overflow-x:auto;
        }
        .tab-btn {
            flex:1 0 auto; padding:10px 12px; border:none; background:transparent;
            font-weight:600; color:#64748b; border-radius:40px; cursor:pointer;
            font-size:0.82rem; white-space:nowrap;
        }
        .tab-btn.active { background:var(--primary); color:white; box-shadow:0 4px 12px rgba(37,99,235,0.3); }
        .container {
            width:100%; max-width:780px; padding:16px; display:flex; flex-direction:column; gap:16px; margin-bottom:20px;
        }
        .card { background:var(--card); border-radius:var(--radius); padding:18px 16px; box-shadow:var(--shadow); }
        .form-group { margin-bottom:14px; }
        label { font-weight:600; font-size:0.8rem; display:block; margin-bottom:4px; }
        input, select {
            width:100%; padding:12px 14px; border:1px solid #cbd5e1; border-radius:14px;
            font-size:0.95rem; background:#f8fafc;
        }
        .btn {
            padding:12px 18px; border-radius:14px; border:none; font-weight:600; cursor:pointer;
            display:inline-flex; align-items:center; gap:6px; font-size:0.9rem;
        }
        .btn-primary { background:var(--primary); color:white; }
        .btn-danger { background:var(--danger); color:white; }
        .btn-outline { background:transparent; border:1px solid #cbd5e1; }
        .btn-sm { padding:6px 12px; font-size:0.75rem; }
        .item-row {
            display:flex; justify-content:space-between; align-items:center;
            padding:10px; background:#f1f5f9; border-radius:12px; margin-bottom:6px;
        }
        .item-row.expired { background:#fee2e2; border:1px solid #ef4444; }
        .empty-state { color:#94a3b8; text-align:center; padding:20px; }
        .toast {
            position:fixed; bottom:20px; left:20px; right:20px; background:#1e293b; color:white;
            padding:14px; border-radius:14px; text-align:center; opacity:0; transform:translateY(20px);
            transition:0.3s; z-index:200;
        }
        .toast.show { opacity:1; transform:translateY(0); }
        .chip {
            background:#e2e8f0; border-radius:20px; padding:6px 12px; font-size:0.85rem;
            display:inline-flex; align-items:center; gap:6px; margin:2px;
        }
        .baris-label {
            font-size:0.75rem; font-weight:700; color:#475569; margin-top:10px; margin-bottom:4px;
            background:#e2e8f0; display:inline-block; padding:2px 10px; border-radius:20px;
        }
        .rekap-tabs { display:flex; gap:8px; margin-bottom:16px; }
        .rekap-tab {
            padding:8px 20px; border-radius:20px; border:1px solid #cbd5e1; background:#f8fafc;
            font-weight:600; cursor:pointer; font-size:0.85rem;
        }
        .rekap-tab.active { background:var(--primary); color:white; border-color:var(--primary); }
        .rekap-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        .rekap-table th { background:#1e3a5f; color:white; padding:10px 8px; text-align:left; }
        .rekap-table td { padding:9px 8px; border-bottom:1px solid #e2e8f0; }
        .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
        .stat-box { background:#f0f4ff; border-radius:14px; padding:14px; text-align:center; }
        .stat-box .val { font-size:1.8rem; font-weight:800; color:var(--primary); }
        .stat-box .lbl { font-size:0.75rem; color:#64748b; }
        .stat-box.out { background:#fff0f0; }
        .stat-box.out .val { color:var(--danger); }
        .section-badge {
            background:#dbeafe; color:#1d4ed8; border-radius:20px; padding:2px 8px;
            font-size:0.75rem; font-weight:600; margin:2px; display:inline-block;
        }
        .filter-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
        .filter-row select { width:auto; padding:8px 12px; font-size:0.85rem; }
        .reset-btn {
            background:#fee2e2; color:#ef4444; border:2px solid #ef4444; padding:10px 20px;
            border-radius:14px; cursor:pointer; font-weight:600; margin-top:20px; width:100%;
        }
        .google-btn {
            background:#fff; color:#333; border:1px solid #ddd; display:flex; align-items:center;
            justify-content:center; gap:8px; padding:12px; border-radius:12px; cursor:pointer;
            font-weight:500; margin-top:10px; width:100%;
        }

        /* Denah - kotak tidak persegi, cukup tinggi untuk 5 slot */
        .fp-room { border:3px solid #1e293b; border-radius:10px; padding:10px; overflow-x:auto; }
        .fp-room-title { font-weight:800; font-size:0.95rem; color:#1e293b; margin-bottom:10px; text-align:center; }
        .fp-legend { display:flex; gap:16px; flex-wrap:wrap; padding:8px 4px; font-size:0.8rem; font-weight:600; margin-top:10px; }

        .baris-box {
            width:110px; height:175px; background:#fde68a; border:2.5px solid #d97706;
            border-radius:10px; padding:5px; display:flex; flex-direction:column; flex-shrink:0;
        }
        .baris-box-lbl {
            font-size:0.6rem; font-weight:800; color:#92400e; text-align:center; line-height:1.2;
            margin-bottom:3px; white-space:nowrap; overflow:hidden;
        }
        .baris-slots { display:flex; flex-direction:column-reverse; gap:1px; flex:1; min-height:0; }
        .basket-slot {
            flex:1; min-height:0; border-radius:5px; background:#fff; border:1.5px solid #cbd5e1;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            cursor:pointer; position:relative; transition:transform 0.1s; overflow:hidden;
        }
        .basket-slot:active { transform:scale(0.95); }
        .basket-slot.green { border-color:var(--success); background:#ecfdf5; }
        .basket-slot.orange {
            border-color:var(--orange); background:#fff7ed; animation:softPulse 1.8s infinite;
        }
        .basket-slot.red {
            border-color:var(--danger); background:#fef2f2; animation:strongPulse 0.9s infinite;
        }
        .basket-slot.slot-empty { background:#f8fafc; border:1.5px dashed #d1d5db; cursor:default; }
        .slot-num { font-weight:800; font-size:0.6rem; line-height:1; color:#1e293b; }
        .slot-count { font-size:0.5rem; color:#64748b; }
        .slot-alert {
            position:absolute; top:-3px; right:-3px; background:var(--danger); color:white;
            border-radius:50%; width:11px; height:11px; display:flex; align-items:center;
            justify-content:center; font-size:0.4rem; font-weight:bold; z-index:5;
        }

        .baris-box.stock-box { background:#e0e7ff; border-color:#6366f1; justify-content:center; align-items:center; gap:4px; width:110px; height:175px; }
        .baris-box.stock-box .baris-box-lbl { color:#4338ca; font-size:0.58rem; white-space:normal; text-align:center; line-height:1.3; margin:0; }
        .stock-icon { font-size:1.8rem; }

        .spacer {
            min-height:40px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db;
            border-radius:8px; display:flex; align-items:center; justify-content:center;
            color:#c8d3df; font-size:0.75rem; flex:1;
        }
        .spacer-box {
            width:110px; height:175px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db;
            border-radius:10px; display:flex; align-items:center; justify-content:center;
            color:#c8d3df; font-size:0.85rem; flex-shrink:0;
        }

        .frz-plan { display:flex; flex-direction:column; gap:8px; min-width:820px; }
        .frz-body { display:flex; gap:0px; align-items:flex-start; }
        .frz-left { display:flex; flex-direction:column; gap:8px; flex:1; }
        .frz-right { display:flex; flex-direction:column; gap:8px; flex-shrink:0; margin-left: -20px; }
        .frz-bot { display:flex; gap:8px; align-items:flex-start; }
        .boxes-row { display:flex; gap:8px; }

        .chl-plan { display:flex; flex-direction:column; gap:8px; min-width:840px; }
        .chl-top { display:flex; gap:8px; align-items:flex-start; }
        .chl-space {
            min-height:80px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db;
            border-radius:8px; display:flex; align-items:center; justify-content:center;
            color:#c8d3df; font-size:0.75rem;
        }
        .chl-bot { display:flex; gap:8px; flex-wrap:wrap; }

        .move-form {
            background:#f8fafc; border:1px solid #cbd5e1; border-radius:10px;
            padding:8px; margin-top:6px; display:flex; gap:6px; align-items:center; flex-wrap:wrap;
        }
        .move-form select { width:auto; padding:6px; }

        /* Riwayat - badge warna */
        .history-item {
            display:flex; align-items:flex-start; gap:10px; padding:12px; border-radius:12px;
            margin-bottom:6px; font-size:0.85rem;
        }
        .history-item.type-in { background:#ecfdf5; border-left:6px solid var(--in-color); }
        .history-item.type-out { background:#fef2f2; border-left:6px solid var(--out-color); }
        .history-item.type-move { background:#f5f3ff; border-left:6px solid var(--move-color); }
        .history-item.type-edit { background:#fffbeb; border-left:6px solid var(--warning); }
        .history-badge {
            display:inline-block; padding:3px 8px; border-radius:12px; font-weight:700;
            font-size:0.7rem; letter-spacing:0.5px;
        }
        .badge-in { background:#d1fae5; color:#065f46; }
        .badge-out { background:#fee2e2; color:#991b1b; }
        .badge-move { background:#ede9fe; color:#5b21b6; }
        .badge-edit { background:#fef3c7; color:#92400e; }

        /* Search Styles */
        .search-container {
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
        }
        .search-input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        .search-input-wrapper input {
            padding-right: 50px;
            font-size: 1rem;
        }
        .search-input-wrapper .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .search-result-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .search-result-item:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(37,99,235,0.1);
        }
        .search-result-item.current {
            border-left: 4px solid var(--success);
            background: #f0fdf4;
        }
        .search-result-item.out {
            border-left: 4px solid var(--danger);
            background: #fef2f2;
            opacity: 0.8;
        }
        .search-result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .search-result-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .badge-current {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-out {
            background: #fee2e2;
            color: #991b1b;
        }
        .search-highlight {
            background: #fef3c7;
            padding: 1px 3px;
            border-radius: 3px;
            font-weight: 600;
        }
        .search-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px;
            background: #f0f4ff;
            border-radius: 12px;
        }
        .search-stat {
            text-align: center;
            flex: 1;
        }
        .search-stat .count {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }
        .search-stat .label {
            font-size: 0.7rem;
            color: #64748b;
        }
        .area-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 4px;
        }
        .area-frozen {
            background: #dbeafe;
            color: #1e40af;
        }
        .area-chiller {
            background: #d1fae5;
            color: #065f46;
        }

        @keyframes softPulse {
            0% { box-shadow:0 0 0 0 rgba(249,115,22,0.3) }
            50% { box-shadow:0 0 0 5px rgba(249,115,22,0.1) }
            100% { box-shadow:0 0 0 0 rgba(249,115,22,0.3) }
        }
        @keyframes strongPulse {
            0% { box-shadow:0 0 0 0 rgba(239,68,68,0.5) }
            50% { box-shadow:0 0 0 7px rgba(239,68,68,0.15) }
            100% { box-shadow:0 0 0 0 rgba(239,68,68,0.5) }
        }
        /* Tambahan CSS untuk peringatan */
.input-warning {
    border-color: #ef4444 !important;
    background: #fef2f2 !important;
    animation: shake 0.5s;
}

.input-success {
    border-color: #10b981 !important;
    background: #f0fdf4 !important;
}

.warning-message {
    color: #ef4444;
    font-size: 0.75rem;
    margin-top: 4px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
}

.success-message {
    color: #10b981;
    font-size: 0.75rem;
    margin-top: 4px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
}

.duplicate-info {
    background: #fef2f2;
    border: 1px solid #ef4444;
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 8px;
    font-size: 0.8rem;
    color: #991b1b;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}
        /* Style untuk tombol aksi di item */
.item-actions {
    display: flex;
    gap: 4px;
    align-items: center;
}

.action-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
}

.action-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.action-btn.move-btn {
    color: #8b5cf6;
    border-color: #cbd5e1;
}

.action-btn.move-btn:hover {
    background: #f5f3ff;
    border-color: #8b5cf6;
}

.action-btn.edit-btn {
    color: #f59e0b;
    border-color: #cbd5e1;
}

.action-btn.edit-btn:hover {
    background: #fffbeb;
    border-color: #f59e0b;
}

.action-btn.out-btn {
    color: #ef4444;
    border-color: #cbd5e1;
}

.action-btn.out-btn:hover {
    background: #fef2f2;
    border-color: #ef4444;
}

/* Tooltip untuk tombol aksi */
.action-btn::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.65rem;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    margin-bottom: 4px;
}

.action-btn:hover::after {
    opacity: 1;
}

/* Style untuk tombol pindah keranjang di header */
.basket-move-btn {
    background: linear-gradient(135deg, #8b5cf6, #7c3aed);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
}

.basket-move-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
}

.basket-move-btn i {
    font-size: 1rem;
}

/* Badge untuk membedakan tipe pemindahan */
.move-type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 700;
    margin-left: 6px;
}

.move-type-badge.basket-move {
    background: #ede9fe;
    color: #5b21b6;
}

.move-type-badge.item-move {
    background: #f5f3ff;
    color: #7c3aed;
}
                .move-type-badge.basket-move {
            background: #ede9fe;
            color: #5b21b6;
        }

        .move-type-badge.item-move {
            background: #f5f3ff;
            color: #7c3aed;
        }

        /* ========== TAMBAHKAN CSS BARU DI SINI ========== */
        
        /* Container untuk ikon-ikon status di pojok kanan atas */
        .slot-status-icons {
            position: absolute;
            top: 2px;
            right: 2px;
            display: flex;
            flex-direction: row-reverse;
            gap: 1px;
            z-index: 5;
        }

        .status-icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.4rem;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* Warna background spesifik */
        .status-icon.full {
            background: rgba(245, 158, 11, 0.9);
            border: 1.5px solid #d97706;
        }

        .status-icon.expired {
            background: rgba(239, 68, 68, 0.9);
            border: 1.5px solid #dc2626;
        }

        .status-icon.est-lewat {
            background: rgba(249, 115, 22, 0.9);
            border: 1.5px solid #ea580c;
        }

        /* Ganti warna oranye menjadi kuning untuk slot penuh */
        .basket-slot.yellow {
            border-color: #f59e0b;
            background: #fffbeb;
            animation: softPulseYellow 1.8s infinite;
        }

        @keyframes softPulseYellow {
            0% { box-shadow:0 0 0 0 rgba(245,158,11,0.3) }
            50% { box-shadow:0 0 0 5px rgba(245,158,11,0.15) }
            100% { box-shadow:0 0 0 0 rgba(245,158,11,0.3) }
        }

        /* ================================================== */
    </style>
    </style>
</head>
<body>
    <div id="loginScreen" class="container" style="max-width:400px;margin-top:40px;">
        <div class="card" style="text-align:center">
            <h2>🔐 Masuk Walk-in</h2>
            <p style="color:#64748b;margin-bottom:16px;">Gunakan akun tim</p>
            <div class="form-group"><input type="email" id="loginEmail" value="tim@walkin.com"></div>
            <div class="form-group"><input type="password" id="loginPassword" value="frozen2024"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Masuk</button>
            <button class="google-btn" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Login dengan Google</button>
            <p id="loginError" style="color:red;margin-top:10px;"></p>
        </div>
    </div>

    <div id="appScreen" style="display:none;width:100%;">
        <div class="header">
            <h2>🧊 Walk-in <span id="areaTitle">Frozen</span></h2>
            <div class="area-selector">
                <span style="color:white;">Area:</span>
                <select id="areaSelect" onchange="switchArea()">
                    <option value="frozen">❄️ Frozen</option>
                    <option value="chiller">🌡️ Chiller</option>
                </select>
            </div>

                if (doc.exists) {

                    let cData = data.chiller || { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };
                    fData.sections = convertSectionsToSlotFormat(fData.sections || {});
                    cData.sections = convertSectionsToSlotFormat(cData.sections || {});
                    appData.frozen = fData;
                    appData.chiller = cData;
                    syncBasketsWithSections('frozen');
                    syncBasketsWithSections('chiller');
                    if (!data.frozen) saveToFirestore();

        function saveToFirestore() {

}

        function syncBasketsWithSections(area) {
            const sections = appData[area].sections;
            const baskets = appData[area].baskets;
            const validNos = new Set();
            for (const barisObj of Object.values(sections))
                for (const slots of Object.values(barisObj))
                    slots.forEach(no => { if (no !== null) validNos.add(no); });
            for (const no of Object.keys(baskets))
                if (!validNos.has(Number(no))) delete baskets[no];
            for (const [sec, barisObj] of Object.entries(sections))
                for (const [baris, slots] of Object.entries(barisObj))
                    slots.forEach((no, idx) => {
                        if (no === null) return;
                        if (!baskets[no]) baskets[no] = { section: sec, baris, slot: idx+1, items: [] };
                        else { baskets[no].section = sec; baskets[no].baris = baris; baskets[no].slot = idx+1; }
                    });
        }

        function performSearch() {
            const query = document.getElementById('searchInput')?.value.trim().toLowerCase();
            const resultsContainer = document.getElementById('searchResults');
            
            if (!query || query.length < 2) {
                resultsContainer.innerHTML = '<div class="empty-state">Ketik minimal 2 karakter untuk mencari</div>';

            const outItems = allResults.filter(r => r.status === 'out');

                    </div>

            // Render hasil

                    ? '<span class="search-result-badge badge-current">📦 Masih Ada</span>'
                    : '<span class="search-result-badge badge-out">📤 Sudah Keluar</span>';

                        ${result.status === 'current' ? `

        function collectSearchResults(area, query, results) {
            const baskets = appData[area].baskets;
            const transactions = appData[area].transactions;
            
            // Cari di keranjang yang masih ada
            for (const [keranjangNo, basket] of Object.entries(baskets)) {
                if (basket.items && basket.items.length > 0) {
                    basket.items.forEach(item => {
                        if (item.nama && item.nama.toLowerCase().includes(query)) {
                            results.push({
                                area: area,
                                status: 'current',
                                item: item,
                                keranjangNo: parseInt(keranjangNo),
                                section: basket.section,
                                baris: basket.baris,
                                slot: basket.slot
                            });
                        }
                    });
                }
            }
            
            // Cari di transaksi keluar
            const seenOutItems = new Set(); // Hindari duplikasi
            transactions.forEach(trans => {
                if (trans.type === 'out' && trans.detail && trans.detail.nama) {
                    if (trans.detail.nama.toLowerCase().includes(query)) {
                        const key = `${trans.detail.nama}_${trans.detail.qty}_${trans.timestamp}`;
                        if (!seenOutItems.has(key)) {
                            seenOutItems.add(key);
                            results.push({
                                area: area,
                                status: 'out',
                                item: {
                                    nama: trans.detail.nama,
                                    qty: trans.detail.qty,
                                    jenis: trans.detail.jenis || '-',
                                    expDate: trans.detail.expDate,
                                    estOutDate: trans.detail.estOutDate
                                },
                                keranjangNo: trans.detail.keranjang || '-',
                                section: trans.detail.section || '-',
                                timestamp: trans.timestamp
                            });
                        }
                    }
                }
            });
        }

        function highlightText(text, query) {
            if (!text || !query) return text || '';
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="search-highlight">$1</span>');
        }

       function buildBasketSlot(no, slotIdx) {
    if (no === null) return `<div class="basket-slot slot-empty"></div>`;
    
    const count = itemCount(no);
    const items = currentBaskets()[no]?.items || [];
    const now = new Date();
    
    // Cek berbagai kondisi
    const isFull = count >= 5;
    const hasExpired = items.some(i => i.expDate && new Date(i.expDate) < now);
    const hasEstLewat = items.some(i => i.estOutDate && new Date(i.estOutDate) < now);
    
    // Tentukan class warna slot
    let cls = 'basket-slot';
    if (hasExpired || hasEstLewat) {
        cls += ' red';  // Prioritas: expired/est lewat = merah
    } else if (isFull) {
        cls += ' yellow';  // Penuh = kuning
    } else if (count > 0) {
        cls += ' green';  // Ada isi = hijau
    } else {
        cls += ' slot-empty';  // Kosong
    }
    
    // Build ikon-ikon status
    let statusIcons = '';
    const icons = [];
    
    // Ikon Penuh - Dilarang
    if (isFull) {
        icons.push(`
            <span class="status-icon full" title="Keranjang Penuh (5/5)">
                <i class="fas fa-ban"></i>
            </span>
        `);
    }
    
    // Ikon Expired - Tengkorak
    if (hasExpired) {
        icons.push(`
            <span class="status-icon expired" title="Ada barang EXPIRED!">
                <i class="fas fa-skull"></i>
            </span>
        `);
    }
    
    // Ikon Est Lewat - Jam Pasir
    if (hasEstLewat) {
        icons.push(`
            <span class="status-icon est-lewat" title="Estimasi keluar LEWAT!">
                <i class="fas fa-hourglass-end"></i>
            </span>
        `);
    }
    
    if (icons.length > 0) {
        statusIcons = `<div class="slot-status-icons">${icons.join('')}</div>`;
    }
    
    // Build tooltip
    let tooltipParts = [`Keranjang ${no} — ${count}/5`];
    if (isFull) tooltipParts.push('🚫 PENUH');
    if (hasExpired) tooltipParts.push('☠️ EXPIRED');
    if (hasEstLewat) tooltipParts.push('⏳ EST LEWAT');
    const tooltip = tooltipParts.join(' | ');
    
    return `<div class="${cls}" onclick="showBasketDetail(${no})" title="${tooltip}">
        ${statusIcons}
        <span class="slot-num">${no}</span>
        <span class="slot-count">${count}/5</span>
    </div>`;
}

       function buildBarisBox(secName, barisKey, slots) {
    // Gunakan key baris asli (A, B, C, D, E) untuk label yang konsisten
    const barisOrder = ['A', 'B', 'C', 'D', 'E'];
    const barisNumber = barisOrder.indexOf(barisKey) + 1;
    const num = String(barisNumber).padStart(2, '0');
    const lbl = `${secName} ${num}`;
    
    let slotElements = '';
    for (let i = 0; i < 5; i++) {
        slotElements += buildBasketSlot(slots[i], i);
    }
    return `<div class="baris-box">
        <div class="baris-box-lbl">${lbl}</div>
        <div class="baris-slots">${slotElements}</div>
    </div>`;
}

       function getSecBoxes(secName) {
    const barisObj = currentSections()[secName] || {};
    // Urutkan berdasarkan key (A, B, C, D, E)
    const sortedKeys = Object.keys(barisObj).sort();
    return sortedKeys.map(key => buildBarisBox(secName, key, barisObj[key])).join('');
}

// Validasi est out untuk quick add
function validateQuickEstOut() {
    const expDate = document.getElementById('inExpDate')?.value;
    const estOutDate = document.getElementById('inEstOutDate')?.value;
    const estOutInput = document.getElementById('inEstOutDate');
    const warning = document.getElementById('estOutWarning');
    
    if (!expDate || !estOutDate || !warning) return;
    
    const expDateObj = new Date(expDate);
    const estOutDateObj = new Date(estOutDate);
    
    if (estOutDateObj > expDateObj) {
        warning.innerHTML = '❌ Tidak boleh lebih dari Tanggal Exp!';
        warning.style.color = '#ef4444';
        estOutInput.style.borderColor = '#ef4444';
    } else {
        warning.innerHTML = '✅ Valid';
        warning.style.color = '#10b981';

// Submit quick add
function submitQuickAdd(e) {
    e.preventDefault();
    const target = window._quickAddTarget;
    if (!target) return showToast('Data keranjang hilang. Silakan coba lagi.');
    
    const nama = document.getElementById('inNama').value.trim();
    const qty = document.getElementById('inQty').value.trim();
    const jenis = document.getElementById('inJenis').value;
    const expDate = document.getElementById('inExpDate').value;
    const estOutDate = document.getElementById('inEstOutDate').value;
    
    if (!nama || !qty) return showToast('Lengkapi data!');
    if (!expDate) return showToast('Tanggal Exp wajib diisi.');
    if (!estOutDate) return showToast('Estimasi Keluar wajib diisi.');
    
    // Validasi est out
    if (new Date(estOutDate) > new Date(expDate)) {
        return showToast('❌ Estimasi Keluar tidak boleh lebih dari Tanggal Exp!');
    }
    
    // Validasi keranjang tidak penuh
    if (itemCount(target.no) >= 5) {
        return showToast('❌ Keranjang sudah penuh (5/5)!');
    }
    
    // Tambahkan item
    if (!currentBaskets()[target.no]) {
        currentBaskets()[target.no] = { 
            section: target.section, 
            baris: target.baris, 
            slot: target.slot, 
            items: [] 
        };
    }
    
    const item = { nama, qty, jenis, tglMasuk: new Date().toISOString() };
    if (expDate) item.expDate = expDate;
    if (estOutDate) item.estOutDate = estOutDate;
    
    currentBaskets()[target.no].items.push(item);
    
    logTransaction('in', { 
        nama, qty, jenis, 
        keranjang: target.no, 
        section: target.section, 
        baris: target.baris, 
        expDate, estOutDate 
    });
    
    saveToFirestore();
    showToast(`✅ ${nama} berhasil ditambahkan ke keranjang ${target.no}`);
    
    // Kembali ke detail keranjang
    setTimeout(() => showBasketDetail(target.no), 300);
}
        
        // Fungsi baru: edit estimasi tanggal keluar
        function editEstOutDate(no, idx) {
            const basket = currentBaskets()[no];
            if (!basket || !basket.items[idx]) return;
            const item = basket.items[idx];
            const expDate = item.expDate ? new Date(item.expDate) : null;
            const currentEst = item.estOutDate ? new Date(item.estOutDate).toISOString().split('T')[0] : '';

            // Tampilkan prompt untuk input tanggal baru
            const newDateStr = prompt(
                `Edit Estimasi Keluar untuk "${item.nama}"\n` +
                `Tanggal Exp: ${expDate ? expDate.toLocaleDateString('id-ID') : 'tidak ada'}\n` +
                `Masukkan tanggal baru (YYYY-MM-DD):`,
                currentEst
            );

            if (newDateStr === null) return; // batal

            // Validasi format
            if (!/^\d{4}-\d{2}-\d{2}$/.test(newDateStr)) {
                showToast('Format tanggal tidak valid.');
                return;
            }
            const newDate = new Date(newDateStr);
            if (isNaN(newDate.getTime())) {
                showToast('Tanggal tidak valid.');
                return;
            }

            // Validasi: tidak boleh lebih dari exp
            if (expDate && newDate > expDate) {
                showToast(`❌ Estimasi keluar (${newDateStr}) tidak boleh lebih dari tanggal exp (${expDate.toISOString().split('T')[0]}).`);
                return;
            }

            // Update data
            item.estOutDate = newDateStr;
            logTransaction('edit', {
                nama: item.nama,
                qty: item.qty,
                jenis: item.jenis,
                keranjang: no,
                section: basket.section,
                oldEstOutDate: currentEst,
                newEstOutDate: newDateStr
            });
            saveToFirestore();
            showToast('✅ Estimasi keluar diperbarui.');
            showBasketDetail(no); // refresh tampilan
        }

            Object.keys(barisObj).forEach((baris, idx) => {

        function updateMoveKeranjang() {
    const sec = document.getElementById('moveSection')?.value;
    const baris = document.getElementById('moveBaris')?.value;
    const kerSel = document.getElementById('moveKeranjang');
    if (!kerSel) return;
    
    kerSel.innerHTML = '<option value="">-- Pilih Keranjang yang Sudah Ada --</option>';
    if (!sec || !baris) return;
    
    const slots = currentSections()[sec]?.[baris];
    if (slots) {
        let hasAvailable = false;
        slots.forEach((no, idx) => {
            if (no === null) return;
            const c = itemCount(no);
            const disabled = c >= 5 ? 'disabled' : '';
            if (c < 5) hasAvailable = true;
            kerSel.innerHTML += `<option value="${no}" ${disabled}>Keranjang ${no} (Slot ${idx+1}) ${c}/5 ${c >= 5 ? '- PENUH' : ''}</option>`;
        });
        
        if (!hasAvailable) {
            kerSel.innerHTML += '<option value="" disabled>Semua keranjang penuh - Buat baru</option>';
        }
    }
}

        function validateMoveKeranjangBaru() {
    const input = document.getElementById('moveKeranjangBaru');
    const warningEl = document.getElementById('moveKeranjangWarning');
    const value = parseInt(input?.value);
    
    if (!input || !warningEl) return;
    
    if (!value || isNaN(value) || value <= 0) {
        warningEl.innerHTML = '';
        input.style.borderColor = '#cbd5e1';
        return;
    }
    
    // Cek apakah nomor sudah digunakan
    for (const area of ['frozen', 'chiller']) {
        const sections = appData[area].sections;
        for (const [sec, barisObj] of Object.entries(sections)) {
            for (const sl of Object.values(barisObj)) {
                if (sl.includes(value)) {
                    warningEl.innerHTML = `❌ Nomor ${value} sudah digunakan`;
                    warningEl.style.color = '#ef4444';
                    input.style.borderColor = '#ef4444';
                    return;
                }
            }
        }
    }
    
    // Nomor tersedia
    warningEl.innerHTML = `✅ Nomor ${value} tersedia`;
    warningEl.style.color = '#10b981';
    input.style.borderColor = '#10b981';
}
        
       function pindahkanItem(fromNo, fromIdx) {
    const toSection = document.getElementById('moveSection')?.value;
    const toBaris = document.getElementById('moveBaris')?.value;
    const toNoInput = document.getElementById('moveKeranjangBaru')?.value;
    
    let toNo = parseInt(document.getElementById('moveKeranjang')?.value);
    
    // Cek jika memilih keranjang baru
    if (!toNo && toNoInput) {
        toNo = parseInt(toNoInput);
        if (!toNo || isNaN(toNo) || toNo <= 0) {
            return showToast('Pilih keranjang tujuan atau masukkan nomor keranjang baru.');
        }
        
        // Cek duplikasi
        for (const area of ['frozen', 'chiller']) {
            for (const [sec, barisObj] of Object.entries(appData[area].sections)) {
                for (const sl of Object.values(barisObj)) {
                    if (sl.includes(toNo)) {
                        return showToast(`❌ Nomor keranjang ${toNo} sudah digunakan. Pilih yang sudah ada atau gunakan nomor lain!`);
                    }
                }
            }
        }
        
        // Tambahkan keranjang baru ke slot yang dipilih
        if (toSection && toBaris) {
            const toSlots = currentSections()[toSection]?.[toBaris];
            if (toSlots) {
                // Cari slot kosong atau gunakan slot yang dipilih
                const emptySlotIndex = toSlots.findIndex(s => s === null);
                if (emptySlotIndex !== -1) {
                    toSlots[emptySlotIndex] = toNo;
                }
            }
        }
    }
    
    if (!toNo) return showToast('Pilih keranjang tujuan.');
    if (toNo === fromNo) return showToast('Tidak bisa pindah ke keranjang yang sama.');
    if (itemCount(toNo) >= 5) return showToast('Keranjang tujuan sudah penuh.');
    
    const fromBasket = currentBaskets()[fromNo];
    if (!fromBasket || !fromBasket.items[fromIdx]) return;
    
    const item = fromBasket.items[fromIdx];
    fromBasket.items.splice(fromIdx, 1);
    
    // ===== FITUR 1: Hapus nomor keranjang jika kosong =====
    if (fromBasket.items.length === 0) {
        removeEmptyBasketNumber(fromNo);
    }
    // ====================================================
    
    if (!currentBaskets()[toNo]) {
        currentBaskets()[toNo] = { section: toSection || '', baris: toBaris || '', items: [] };
    }
    currentBaskets()[toNo].items.push(item);
    
    logTransaction('move', { 
        nama: item.nama, 
        qty: item.qty, 
        jenis: item.jenis, 
        dari: fromNo, 
        ke: toNo,
        section: toSection || currentBaskets()[toNo]?.section
    });
    
    saveToFirestore();
    showToast('✅ Barang dipindahkan ke keranjang ' + toNo);
    showBasketDetail(fromNo);
}

        // Fungsi untuk menghapus nomor keranjang dari slot jika keranjang kosong
function removeEmptyBasketNumber(keranjangNo) {
    // Cari di SEMUA area (frozen & chiller)
    for (const area of ['frozen', 'chiller']) {
        const sections = appData[area].sections;
        const baskets = appData[area].baskets;
        
        for (const [sec, barisObj] of Object.entries(sections)) {
            for (const [baris, slots] of Object.entries(barisObj)) {
                const slotIndex = slots.indexOf(keranjangNo);
                if (slotIndex !== -1) {
                    // Hapus nomor keranjang dari slot
                    slots[slotIndex] = null;
                    
                    // Hapus data basket jika ada
                    if (baskets[keranjangNo]) {
                        delete baskets[keranjangNo];
                    }
                    
                    console.log(`🗑️ Keranjang ${keranjangNo} dihapus dari ${area} - ${sec} Baris ${baris} Slot ${slotIndex + 1}`);
                    return; // Keluar setelah menemukan dan menghapus
                }
            }
        }
    }
}
        
      function keluarkanItem(no, idx) {
    const basket = currentBaskets()[no];
    if (!basket) return;
    const item = basket.items[idx];
    
    // Tampilkan prompt untuk input jumlah yang dikeluarkan
    const qtyText = item.qty;
    const qtyNumber = parseFloat(qtyText) || parseInt(qtyText) || 0;
    
    // Jika qty berupa angka, tampilkan opsi partial
    if (!isNaN(qtyNumber) && qtyNumber > 1) {
        // Tampilkan dialog custom untuk memilih jumlah
        showPartialOutDialog(no, idx, item, qtyNumber);
    } else if (qtyText.includes('/') || qtyText.includes('&') || qtyText.includes(',')) {
        // Jika qty kompleks (misal: "3/5 pack"), tanya full out
        if (confirm(`Keluarkan SEMUA "${item.nama}" (${item.qty}) dari keranjang ${no}?`)) {
            executeFullOut(no, idx, item);
        }
    } else {
        // Jika qty 1 atau text biasa, langsung keluar semua
        if (confirm(`Keluarkan "${item.nama}" (${item.qty}) dari keranjang ${no}?`)) {
            executeFullOut(no, idx, item);
        }
    }
}

// Fungsi validasi input partial out
function validatePartialOutQty(maxQty) {
    const input = document.getElementById('partialOutQty');
    const warning = document.getElementById('partialOutWarning');
    const value = parseInt(input?.value);
    
    if (!input || !warning) return;
    
    if (!value || isNaN(value) || value <= 0) {
        warning.innerHTML = '⚠️ Masukkan jumlah yang valid';
        warning.style.color = '#f59e0b';
        input.style.borderColor = '#f59e0b';
    } else if (value > maxQty) {
        warning.innerHTML = `❌ Maksimal ${maxQty}`;
        warning.style.color = '#ef4444';
        input.style.borderColor = '#ef4444';
        input.value = maxQty;
    } else if (value === maxQty) {
        warning.innerHTML = `⚠️ Ini akan mengeluarkan SEMUA (${maxQty})`;
        warning.style.color = '#f59e0b';
        input.style.borderColor = '#f59e0b';
    } else {
        warning.innerHTML = `✅ Akan tersisa ${maxQty - value}`;
        warning.style.color = '#10b981';
        input.style.borderColor = '#10b981';
    }
}

// Fungsi eksekusi partial out
function executePartialOut(no, idx, nama, totalQty, jenis) {
    const qtyOut = parseInt(document.getElementById('partialOutQty')?.value);
    
    if (!qtyOut || qtyOut <= 0) {
        return showToast('❌ Masukkan jumlah yang valid!');
    }
    
    if (qtyOut > totalQty) {
        return showToast(`❌ Maksimal ${totalQty}!`);
    }
    
    const basket = currentBaskets()[no];
    if (!basket || !basket.items[idx]) return;
    
    const item = basket.items[idx];
    const sisa = totalQty - qtyOut;
    
    if (sisa <= 0) {
        // Jika habis, hapus item
        executeFullOutFromDialog(no, idx);
        closePartialOutDialog();
        return;
    }
    
    // Update qty item menjadi sisa
    item.qty = sisa.toString();
    
    // Log transaksi out partial
    logTransaction('out', {
        nama: nama,
        qty: `${qtyOut} dari ${totalQty} (sisa ${sisa})`,
        jenis: jenis,
        keranjang: no,
        section: basket.section,
        partial: true
    });
    
    saveToFirestore();
    closePartialOutDialog();
    showToast(`✅ ${qtyOut} ${nama} dikeluarkan. Sisa: ${sisa}`);
    showBasketDetail(no);
}

// Fungsi eksekusi full out
function executeFullOut(no, idx, item) {
    const basket = currentBaskets()[no];
    if (!basket) return;
    
    basket.items.splice(idx, 1);
    
    // Hapus nomor keranjang jika kosong
    if (basket.items.length === 0) {
        removeEmptyBasketNumber(no);
    }
    
    logTransaction('out', {
        nama: item.nama,
        qty: item.qty,
        jenis: item.jenis,
        keranjang: no,
        section: basket.section
    });
    
    saveToFirestore();
    showToast(`✅ ${item.nama} dikeluarkan`);
    showBasketDetail(no);
}

// Fungsi full out dari dialog
function executeFullOutFromDialog(no, idx) {
    const basket = currentBaskets()[no];
    if (!basket || !basket.items[idx]) return;
    
    const item = basket.items[idx];
    executeFullOut(no, idx, item);
    closePartialOutDialog();
}

        function executeMoveBasket(fromNo) {
    const toSection = document.getElementById('moveBasketSection')?.value;
    const toBaris = document.getElementById('moveBasketBaris')?.value;
    const toSlot = parseInt(document.getElementById('moveBasketSlot')?.value);
    
    if (!toSection || !toBaris || !toSlot) {
        return showToast('❌ Lengkapi semua pilihan!');
    }
    
    const fromBasket = currentBaskets()[fromNo];
    if (!fromBasket) return showToast('❌ Keranjang asal tidak ditemukan!');
    
    // Validasi: tidak bisa pindah ke tempat yang sama
    if (fromBasket.section === toSection && fromBasket.baris === toBaris && fromBasket.slot === toSlot) {
        return showToast('❌ Tidak bisa pindah ke lokasi yang sama!');
    }
    
    const toSlots = currentSections()[toSection]?.[toBaris];
    if (!toSlots) return showToast('❌ Baris tujuan tidak valid!');
    
    // Validasi: slot tujuan harus kosong
    if (toSlots[toSlot - 1] !== null) {
        return showToast('❌ Slot tujuan sudah terisi keranjang lain! Pilih slot kosong.');
    }
    
    // Cari lokasi lama dan hapus
    const fromSection = fromBasket.section;
    const fromBaris = fromBasket.baris;
    const fromSlot = fromBasket.slot;
    
    const fromSlots = currentSections()[fromSection]?.[fromBaris];
    if (fromSlots) {
        fromSlots[fromSlot - 1] = null; // Hapus dari slot lama
    }
    
    // Pasang di lokasi baru
    toSlots[toSlot - 1] = fromNo;
    
    // Update data basket
    fromBasket.section = toSection;
    fromBasket.baris = toBaris;
    fromBasket.slot = toSlot;
    
    // Log transaksi
    logTransaction('move', {
        nama: `[KERANJANG ${fromNo}]`,
        qty: `${fromBasket.items.length} item`,
        jenis: 'KERANJANG',
        dari: `${fromSection} ${fromBaris} Slot ${fromSlot}`,
        ke: `${toSection} ${toBaris} Slot ${toSlot}`,
        keranjang: fromNo,
        section: toSection
    });
    
    saveToFirestore();
    showToast(`✅ Keranjang ${fromNo} berhasil dipindahkan ke ${toSection} ${toBaris} Slot ${toSlot}!`);
    
    // Kembali ke detail keranjang
    setTimeout(() => showBasketDetail(fromNo), 500);
}

        function handleSlotChange() {

    const baris = document.getElementById('inBaris')?.value;

    if (!slots) return;

    if (no !== null && no !== undefined) {

        manualInput.classList.add('input-warning');

        function validateKeranjangNumber(value) {
            const manualInput = document.getElementById('inKeranjangManual');
            const manualInputGroup = manualInput?.closest('.form-group');
            
            // Hapus pesan sebelumnya
            const existingWarning = document.getElementById('keranjangWarning');
            if (existingWarning) existingWarning.remove();
            
            if (!value || isNaN(parseInt(value)) || parseInt(value) <= 0) {
                manualInput.classList.add('input-warning');
                manualInput.classList.remove('input-success');
                return;
            }
            
            const newNo = parseInt(value);
            
            // Cek apakah nomor sudah digunakan di area mana pun
            let duplicateInfo = null;
            for (const area of ['frozen', 'chiller']) {
                const sections = appData[area].sections;
                for (const [sec, barisObj] of Object.entries(sections)) {
                    for (const [baris, slots] of Object.entries(barisObj)) {
                        if (slots.includes(newNo)) {
                            duplicateInfo = {
                                area: area,
                                section: sec,
                                baris: baris,
                                slot: slots.indexOf(newNo) + 1
                            };
                            break;
                        }
                    }
                    if (duplicateInfo) break;
                }
                if (duplicateInfo) break;
            }

                    (${duplicateInfo.section} Baris ${duplicateInfo.baris} Slot ${duplicateInfo.slot})

        function updateSlotSelect() {
            const section = document.getElementById('inSection')?.value;
            const baris = document.getElementById('inBaris')?.value;
            const select = document.getElementById('inSlot');
            if (!select) return;
            select.innerHTML = '<option value="">-- Pilih Slot --</option>';
            if (!section || !baris) return;

            const slots = currentSections()[section]?.[baris];
            if (!slots) return;

            for (let i = 0; i < 5; i++) {
                const no = slots[i];
                const slotNumber = i + 1;
                let label = `Slot ${slotNumber}`;
                let value = slotNumber;

                if (no !== null) {
                    const count = itemCount(no);
                    label += `: ${no} (${count}/5)`;
                    if (count >= 5) {
                        select.innerHTML += `<option value="${value}" disabled>${label} - PENUH</option>`;
                    } else {
                        select.innerHTML += `<option value="${value}">${label}</option>`;
                    }

                    select.innerHTML += `<option value="${value}">${label}</option>`;

     function submitIn(e) {
    e.preventDefault();
    const nama = document.getElementById('inNama').value.trim();
    const qty = document.getElementById('inQty').value.trim();
    const jenis = document.getElementById('inJenis').value;
    const expDate = document.getElementById('inExpDate').value;
    const estOutDate = document.getElementById('inEstOutDate').value;
    const section = document.getElementById('inSection').value;
    const baris = document.getElementById('inBaris').value;
    const slotStr = document.getElementById('inSlot').value;
    const keranjangManual = document.getElementById('inKeranjangManual')?.value.trim();

    if (!nama || !qty) return showToast('Lengkapi data!');
    if (!baris) return showToast('Pilih Baris terlebih dahulu.');
    if (!slotStr) return showToast('Pilih Slot (1-5).');
    if (!expDate) return showToast('Tanggal Exp wajib diisi.');
    if (!estOutDate) return showToast('Estimasi Keluar wajib diisi.');

    // ========== VALIDASI TAMBAHAN: Est Out tidak boleh > Exp ==========
    if (estOutDate && expDate) {
        const expDateObj = new Date(expDate);
        const estOutDateObj = new Date(estOutDate);
        
        if (estOutDateObj > expDateObj) {
            // Highlight input yang error
            const estOutInput = document.getElementById('inEstOutDate');
            estOutInput?.classList.add('input-warning');
            estOutInput?.focus();
            
            // Tampilkan pesan error di bawah input
            const estOutGroup = estOutInput?.closest('.form-group');
            const existingWarning = document.getElementById('estOutWarning');
            if (existingWarning) existingWarning.remove();
            
            const warningDiv = document.createElement('div');
            warningDiv.id = 'estOutWarning';
            warningDiv.className = 'warning-message';
            warningDiv.innerHTML = `
                <i class="fas fa-exclamation-triangle"></i> 
                ❌ Estimasi Keluar (${estOutDate}) tidak boleh lebih dari Tanggal Exp (${expDate})
            `;
            estOutGroup?.appendChild(warningDiv);
            
            return showToast('❌ Estimasi Keluar tidak boleh lebih dari Tanggal Exp!');
        }
    }
    // =================================================================

    const slotIndex = parseInt(slotStr) - 1;
    const slots = currentSections()[section]?.[baris];
    if (!slots) return showToast('Data baris tidak valid.');

    let no = slots[slotIndex];

    if (no === null || no === undefined) {
        if (!keranjangManual || isNaN(parseInt(keranjangManual)) || parseInt(keranjangManual) <= 0) {
            // Highlight input yang error
            const manualInput = document.getElementById('inKeranjangManual');
            manualInput?.classList.add('input-warning');
            manualInput?.focus();
            return showToast('❌ Slot kosong. Harap masukkan Nomor Keranjang Baru yang valid!');
        }
        const newNo = parseInt(keranjangManual);
        
        // Cek duplikasi di semua area
        for (const area of ['frozen', 'chiller']) {
            for (const [sec, barisObj] of Object.entries(appData[area].sections)) {
                for (const sl of Object.values(barisObj)) {
                    if (sl.includes(newNo)) {
                        const manualInput = document.getElementById('inKeranjangManual');
                        manualInput?.classList.add('input-warning');
                        return showToast(`❌ Nomor keranjang ${newNo} sudah digunakan di ${area === 'frozen' ? 'Frozen' : 'Chiller'} (${sec}). Silakan gunakan nomor lain!`);
                    }
                }
            }
        }
        
        slots[slotIndex] = newNo;
        if (!currentBaskets()[newNo]) {
            currentBaskets()[newNo] = { section, baris, slot: slotIndex + 1, items: [] };
        } else {
            currentBaskets()[newNo].section = section;
            currentBaskets()[newNo].baris = baris;
            currentBaskets()[newNo].slot = slotIndex + 1;
        }
        no = newNo;
    } else {
        if (itemCount(no) >= 5) {
            return showToast(`❌ Keranjang ${no} sudah penuh (5/5). Pilih slot lain!`);
        }
    }

    if (!currentBaskets()[no]) {
        currentBaskets()[no] = { section, baris, slot: slotIndex + 1, items: [] };
    }
    const item = { nama, qty, jenis, tglMasuk: new Date().toISOString() };
    if (expDate) item.expDate = expDate;
    if (estOutDate) item.estOutDate = estOutDate;
    currentBaskets()[no].items.push(item);
    logTransaction('in', { nama, qty, jenis, keranjang: no, section, baris, expDate, estOutDate });
    saveToFirestore();
    showToast('✅ Barang berhasil masuk ke keranjang ' + no);

    setTimeout(() => renderInputForm(), 100);
}

        function renderRekap() {

            const trx = currentTransactions();
            const nowYear = new Date().getFullYear();
            const yearsSet = new Set(trx.map(t => new Date(t.timestamp).getFullYear()));
            const years = [...yearsSet].sort((a,b)=>b-a);
            const selYear = parseInt(document.getElementById('rekapYearFilter')?.value || nowYear);
            let totalIn = 0, totalOut = 0;
            trx.forEach(t => t.type === 'in' ? totalIn++ : totalOut++);
            const statBoxes = `<div class="stat-grid"><div class="stat-box"><div class="val">${totalIn}</div><div class="lbl">Total Masuk</div></div><div class="stat-box out"><div class="val">${totalOut}</div><div class="lbl">Total Keluar</div></div></div>`;
            const modeTabs = `<div class="rekap-tabs"><button class="rekap-tab ${rekapMode==='bulanan'?'active':''}" onclick="rekapMode='bulanan';renderRekap()">📅 Bulanan</button><button class="rekap-tab ${rekapMode==='tahunan'?'active':''}" onclick="rekapMode='tahunan';renderRekap()">📆 Tahunan</button></div>`;
            if (rekapMode === 'bulanan') {
                const monthData = {};
                trx.forEach(t => {
                    const d = new Date(t.timestamp);
                    if (d.getFullYear() !== selYear) return;
                    const m = d.getMonth();
                    if (!monthData[m]) monthData[m] = { in:0, out:0, bySection:{} };
                    monthData[m][t.type]++;
                    const sec = t.detail.section || '-';
                    if (!monthData[m].bySection[sec]) monthData[m].bySection[sec] = { in:0, out:0 };
                    monthData[m].bySection[sec][t.type]++;
                });
                let rows = '';

            } else {

                    const y = new Date(t.timestamp).getFullYear();

                    }

                }

        window.clearSlot = function(section, baris, idx) {
            if (!isAdmin()) return;
            const slots = currentSections()[section]?.[baris];
            if (!slots) return;
            const no = slots[idx];
            if (!no) return;
            if (confirm(`Hapus keranjang ${no} dari Slot ${idx+1}? Isi keranjang akan tetap ada.`)) {
                slots[idx] = null;
                saveToFirestore();
                showToast('Slot dikosongkan.');
                renderManageBaskets();
            }
        };
        window.fillSlot = function(section, baris, idx) {
            if (!isAdmin()) return;
            const inp = document.getElementById(`inp_${section}_${baris}_${idx}`);
            const val = parseInt(inp?.value);
            if (!val) return showToast('Masukkan nomor keranjang.');
            const sections = currentSections();
            for (const [sec, barisObj] of Object.entries(sections)) {
                for (const sl of Object.values(barisObj)) {
                    if (sl.includes(val)) {
                        return showToast(`Nomor keranjang ${val} sudah digunakan di ${sec}.`);
                    }
                }
            }
            sections[section][baris][idx] = val;
            saveToFirestore();
            showToast('Slot diisi.');
            renderManageBaskets();
        };
        function addBaris(section) {
            if (!isAdmin()) return;
            const sections = currentSections();
            const barisObj = sections[section];
            const nextBaris = String.fromCharCode(65 + Object.keys(barisObj).length);
            barisObj[nextBaris] = [null, null, null, null, null];
            saveToFirestore();
            showToast(`Baris ${nextBaris} ditambahkan ke ${section}.`);
            renderManageBaskets();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                renderCurrentTab();
            });
        });
        document.getElementById('areaSelect').value = currentArea;
    </script>
</body>
</html>
