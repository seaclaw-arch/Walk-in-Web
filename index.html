<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Walk-in Frozen & Chiller | Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#f0f4f8; --card:#fff; --text:#1e293b; --primary:#2563eb; --danger:#ef4444; --warning:#f59e0b; --success:#10b981; --shadow:0 4px 12px rgba(0,0,0,0.05); --radius:20px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui; background:linear-gradient(135deg,#e0e7ff,#f0f4ff); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
        .header { background:rgba(15,23,42,0.9); backdrop-filter:blur(10px); width:100%; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; color:white; position:sticky; top:0; z-index:100; gap:12px; flex-wrap:wrap; }
        .header h2 { font-size:1.2rem; font-weight:700; }
        .area-selector { display:flex; align-items:center; gap:8px; }
        .area-selector select { padding:8px 12px; border-radius:12px; border:1px solid #cbd5e1; font-weight:600; }
        .user-row { display:flex; align-items:center; gap:6px; }
        .tab-bar { display:flex; width:100%; background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); padding:6px 12px; gap:8px; overflow-x:auto; }
        .tab-btn { flex:1 0 auto; padding:10px 14px; border:none; background:transparent; font-weight:600; color:#64748b; border-radius:40px; cursor:pointer; font-size:0.85rem; white-space:nowrap; }
        .tab-btn.active { background:var(--primary); color:white; box-shadow:0 4px 12px rgba(37,99,235,0.3); }
        .container { width:100%; max-width:700px; padding:16px; display:flex; flex-direction:column; gap:16px; margin-bottom:20px; }
        .card { background:var(--card); border-radius:var(--radius); padding:18px 16px; box-shadow:var(--shadow); }
        .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
        .basket-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(58px,1fr)); gap:10px; }
        .basket-card { background:#f8fafc; border-radius:18px; padding:8px 4px; display:flex; flex-direction:column; align-items:center; cursor:pointer; border:2px solid transparent; position:relative; }
        .basket-card:active { transform:scale(0.96); }
        .basket-card.green { border-color:var(--success); background:#ecfdf5; }
        .basket-card.yellow { border-color:var(--warning); background:#fffbeb; animation:softPulse 1.8s infinite; }
        .basket-card.red { border-color:var(--danger); background:#fef2f2; animation:strongPulse 0.9s infinite; }
        @keyframes softPulse { 0%{box-shadow:0 0 0 0 rgba(245,158,11,0.3)} 50%{box-shadow:0 0 0 6px rgba(245,158,11,0.1)} 100%{box-shadow:0 0 0 0 rgba(245,158,11,0.3)} }
        @keyframes strongPulse { 0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0.15)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} }
        .basket-number { font-weight:800; font-size:0.9rem; }
        .stack-visual { display:flex; flex-direction:column-reverse; gap:2px; margin:6px 0; }
        .stack-bar { width:28px; height:6px; border-radius:3px; background:#cbd5e1; }
        .stack-bar.filled { background:#2563eb; box-shadow:0 0 4px rgba(37,99,235,0.5); }
        .stack-bar.filled.warning { background:#f59e0b; }
        .stack-bar.filled.danger { background:#ef4444; }
        .stack-label { font-size:0.65rem; font-weight:600; color:#475569; }
        .badge-alert { position:absolute; top:-6px; right:-6px; background:var(--danger); color:white; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:0.6rem; font-weight:bold; animation:strongPulse 0.8s infinite; }
        .form-group { margin-bottom:14px; } label { font-weight:600; font-size:0.8rem; display:block; margin-bottom:4px; }
        input,select { width:100%; padding:12px 14px; border:1px solid #cbd5e1; border-radius:14px; font-size:0.95rem; background:#f8fafc; }
        .btn { padding:12px 18px; border-radius:14px; border:none; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-size:0.9rem; }
        .btn-primary { background:var(--primary); color:white; } .btn-danger { background:var(--danger); color:white; } .btn-outline { background:transparent; border:1px solid #cbd5e1; }
        .btn-sm { padding:8px 14px; font-size:0.8rem; }
        .item-row { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f1f5f9; border-radius:12px; margin-bottom:6px; }
        .item-row.expired { background:#fee2e2; border:1px solid #ef4444; }
        .empty-state { color:#94a3b8; text-align:center; padding:20px; }
        .toast { position:fixed; bottom:20px; left:20px; right:20px; background:#1e293b; color:white; padding:14px; border-radius:14px; text-align:center; opacity:0; transform:translateY(20px); transition:0.3s; z-index:200; }
        .toast.show { opacity:1; transform:translateY(0); }
        .chip-list { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0; }
        .chip { background:#e2e8f0; border-radius:20px; padding:6px 12px; font-size:0.85rem; display:flex; align-items:center; gap:6px; }
        .baris-label { font-size:0.75rem; font-weight:600; color:#64748b; margin-top:8px; margin-bottom:4px; }
    </style>
</head>
<body>
    <div id="loginScreen" class="container" style="max-width:400px; margin-top:40px;">
        <div class="card" style="text-align:center">
            <h2>🔐 Masuk Walk-in</h2>
            <p style="color:#64748b;">Gunakan akun tim</p>
            <div class="form-group"><input type="email" id="loginEmail" value="tim@walkin.com"></div>
            <div class="form-group"><input type="password" id="loginPassword" value="frozen2024"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Masuk</button>
            <p id="loginError" style="color:red; margin-top:10px;"></p>
        </div>
    </div>

    <div id="appScreen" style="display:none; width:100%;">
        <div class="header">
            <h2>🧊 Walk-in <span id="areaTitle">Frozen</span></h2>
            <div class="area-selector">
                <span style="color:white;">Area:</span>
                <select id="areaSelect" onchange="switchArea()">
                    <option value="frozen">❄️ Frozen</option>
                    <option value="chiller">🌡️ Chiller</option>
                </select>
            </div>
            <div class="user-row">
                <span id="currentUserName"></span>
                <button class="btn-outline" style="color:white; border-color:white; padding:4px 10px;" onclick="logout()">Keluar</button>
            </div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="dashboard">🗺️ Denah</button>
            <button class="tab-btn" data-tab="in">📥 Masuk</button>
            <button class="tab-btn" data-tab="out">📤 Keluar</button>
            <button class="tab-btn" data-tab="history">📋 Riwayat</button>
            <button class="tab-btn" data-tab="manage">⚙️ Atur</button>
        </div>
        <div class="container" id="appContainer"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // Konfigurasi Firebase (PERMANEN)
        const firebaseConfig = {
            apiKey: "AIzaSyA1K3kQ93LSz1yKpBa2cMCRD045alTm6cs",
            authDomain: "walk-in-web.firebaseapp.com",
            projectId: "walk-in-web",
            storageBucket: "walk-in-web.firebasestorage.app",
            messagingSenderId: "42449089338",
            appId: "1:42449089338:web:a34b589a7c746b8dcc1603"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // State
        let currentArea = 'frozen';
        let appData = {
            frozen: { sections: {}, baskets: {}, transactions: [] },
            chiller: { sections: {}, baskets: {}, transactions: [] }
        };
        let currentTab = 'dashboard';
        let unsubscribe = null;

        // Default sections dengan struktur BARIS (maks 5 keranjang per baris)
        const defaultFrozenSections = {
            'RTL':  { 'A': [1,2,17,21,23,31,32,33,36] },
            'IMP':  { 'A': [6,7,8,10,18,19,30,38,46,55,62,63,66,68,69,70,71,73] },
            'NPL':  {
                'A': [20,23,24,26,28],
                'B': [29,35,41,42],
                'C': [43,54,58,65,67,75]
            },
            'RDQ':  { 'A': [5,15,19,20,44,48,49,52] },
            'MTPP': { 'A': [11,12,27,34,40,50,53,61,64,74] },
            'MI':   { 'A': [3,13,14,16,25,37,39,47,51,59,63] }
            // QA dihapus
        };

        const defaultChillerSections = {
            'THAWING': { 'A': [] },
            'IMP':     { 'A': [] },
            'RTL':     { 'A': [] },
            'NPL':     { 'A': [] },
            'MTPP':    { 'A': [] },
            'MI':      { 'A': [] },
            'RDQ':     { 'A': [] }   // QA diganti RDQ
        };

        function getDefaultSections(area) {
            return area === 'frozen' ? JSON.parse(JSON.stringify(defaultFrozenSections)) :
                   JSON.parse(JSON.stringify(defaultChillerSections));
        }

        // Konversi data lama (array) ke format baris baru
        function convertSectionsToNewFormat(sections) {
            const converted = {};
            for (const [sec, val] of Object.entries(sections)) {
                if (Array.isArray(val)) {
                    converted[sec] = { 'A': val };
                } else {
                    converted[sec] = val;
                }
            }
            return converted;
        }

        // Auth
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            auth.signInWithEmailAndPassword(email, pass)
                .catch(e => document.getElementById('loginError').textContent = 'Gagal: ' + e.message);
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('currentUserName').textContent = user.email;
                listenToFirestore();
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('appScreen').style.display = 'none';
                if (unsubscribe) unsubscribe();
            }
        });

        function listenToFirestore() {
            unsubscribe = db.collection('shared').doc('data').onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    let frozenData = data.frozen || { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] };
                    let chillerData = data.chiller || { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };

                    // Konversi jika masih format lama
                    if (frozenData.sections) frozenData.sections = convertSectionsToNewFormat(frozenData.sections);
                    if (chillerData.sections) chillerData.sections = convertSectionsToNewFormat(chillerData.sections);

                    appData.frozen = frozenData;
                    appData.chiller = chillerData;

                    syncBasketsWithSections('frozen');
                    syncBasketsWithSections('chiller');
                    if (!data.frozen) saveToFirestore();
                    renderCurrentTab();
                } else {
                    appData.frozen = { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] };
                    appData.chiller = { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };
                    syncBasketsWithSections('frozen');
                    syncBasketsWithSections('chiller');
                    saveToFirestore();
                }
            });
        }

        function saveToFirestore() {
            db.collection('shared').doc('data').set({
                frozen: appData.frozen,
                chiller: appData.chiller
            }, { merge: true });
        }

        function syncBasketsWithSections(area) {
            const sections = appData[area].sections;
            const baskets = appData[area].baskets;
            for (const [sec, barisObj] of Object.entries(sections)) {
                for (const [baris, nums] of Object.entries(barisObj)) {
                    nums.forEach(no => {
                        if (!baskets[no]) baskets[no] = { section: sec, baris: baris, items: [] };
                        else {
                            baskets[no].section = sec;
                            baskets[no].baris = baris;
                        }
                    });
                }
            }
        }

        function currentSections() { return appData[currentArea].sections; }
        function currentBaskets() { return appData[currentArea].baskets; }
        function currentTransactions() { return appData[currentArea].transactions; }

        function switchArea() {
            currentArea = document.getElementById('areaSelect').value;
            document.getElementById('areaTitle').textContent = currentArea === 'frozen' ? 'Frozen' : 'Chiller';
            renderCurrentTab();
        }

        // Helpers
        function stackCount(no) { return (currentBaskets()[no]?.items || []).length; }
        function basketStatus(no) {
            const c = stackCount(no);
            if (c >= 5) return 'red';
            if (c >= 3) return 'yellow';
            return 'green';
        }
        function hasExpiredItems(basketNo) {
            const items = currentBaskets()[basketNo]?.items || [];
            const now = new Date();
            return items.some(item => {
                if (item.expDate && new Date(item.expDate) < now) return true;
                if (item.estOutDate && new Date(item.estOutDate) < now) return true;
                return false;
            });
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
        function getAvailableBasket(section) {
            const barisObj = currentSections()[section] || {};
            for (const nums of Object.values(barisObj)) {
                const available = nums.find(n => stackCount(n) < 5);
                if (available) return available;
            }
            return null;
        }
        function logTransaction(type, detail) {
            currentTransactions().unshift({
                id: Date.now(),
                timestamp: new Date().toISOString(),
                type,
                detail,
                user: auth.currentUser?.email || 'unknown'
            });
            if (currentTransactions().length > 200) currentTransactions().pop();
            saveToFirestore();
        }

        // Render
        const container = document.getElementById('appContainer');
        function renderCurrentTab() {
            switch(currentTab) {
                case 'dashboard': renderDashboard(); break;
                case 'in': renderInputForm(); break;
                case 'out': renderOut(); break;
                case 'history': renderHistory(); break;
                case 'manage': renderManageBaskets(); break;
            }
        }

        function renderDashboard() {
            let html = '';
            for (const [section, barisObj] of Object.entries(currentSections())) {
                let sectionCards = '';
                for (const [baris, nums] of Object.entries(barisObj)) {
                    if (nums.length === 0) continue;
                    const cards = nums.sort((a,b)=>a-b).map(no => {
                        const status = basketStatus(no);
                        const count = stackCount(no);
                        const expired = hasExpiredItems(no);
                        let bars = '';
                        for (let i=0; i<5; i++) {
                            let cls = 'stack-bar';
                            if (i < count) {
                                cls += ' filled';
                                if (count >=5) cls += ' danger';
                                else if (count >=3) cls += ' warning';
                            }
                            bars += `<div class="${cls}"></div>`;
                        }
                        const alertBadge = expired ? '<span class="badge-alert">!</span>' : '';
                        return `<div class="basket-card ${status}" onclick="showBasketDetail(${no})" title="Keranjang ${no} - ${count}/5 ${expired ? '(EXP/EST LEWAT)' : ''}">
                            <span class="basket-number">${no}</span>
                            <div class="stack-visual">${bars}</div>
                            <span class="stack-label">${count}/5</span>
                            ${alertBadge}
                        </div>`;
                    }).join('');
                    const barisLabel = Object.keys(barisObj).length > 1 ? `<div class="baris-label">📌 Baris ${baris}</div>` : '';
                    sectionCards += `${barisLabel}<div class="basket-grid">${cards}</div>`;
                }
                if (sectionCards) {
                    html += `<div class="card">
                        <div class="section-header"><h3>📍 ${section}</h3></div>
                        ${sectionCards}
                    </div>`;
                }
            }
            container.innerHTML = html || '<div class="empty-state">Belum ada keranjang</div>';
        }

        function showBasketDetail(no) {
            const basket = currentBaskets()[no];
            const count = stackCount(no);
            const status = basketStatus(no);
            const now = new Date();
            let itemsHtml = basket && basket.items.length ? basket.items.map((item, idx) => {
                let expiredClass = '';
                let expLabel = '';
                if (item.expDate && new Date(item.expDate) < now) {
                    expiredClass = 'expired';
                    expLabel = ' ⚠️ EXP';
                } else if (item.estOutDate && new Date(item.estOutDate) < now) {
                    expiredClass = 'expired';
                    expLabel = ' ⚠️ EST LEWAT';
                }
                return `
                    <div class="item-row ${expiredClass}">
                        <div>
                            <strong>${item.nama}</strong> (${item.qty}) ${expLabel}
                            <br><small>${item.jenis || ''} | Masuk: ${item.tglMasuk ? new Date(item.tglMasuk).toLocaleDateString('id-ID') : '-'}
                            ${item.expDate ? ' | Exp: '+new Date(item.expDate).toLocaleDateString('id-ID') : ''}
                            ${item.estOutDate ? ' | Est.Keluar: '+new Date(item.estOutDate).toLocaleDateString('id-ID') : ''}
                            </small>
                        </div>
                        <button class="btn btn-outline" onclick="keluarkanItem(${no}, ${idx})">Keluar</button>
                    </div>`;
            }).join('') : '<div class="empty-state">Keranjang kosong</div>';
            container.innerHTML = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <h3>Keranjang ${no} ${basket ? '(Baris '+basket.baris+')' : ''}</h3>
                        <button class="btn btn-outline" onclick="renderDashboard()">← Kembali</button>
                    </div>
                    <p>Status: ${status==='red'?'🔴 Penuh':status==='yellow'?'🟡 Hampir Penuh':'🟢 Tersedia'} | Tumpukan: ${count}/5</p>
                    ${itemsHtml}
                </div>`;
        }

        function keluarkanItem(no, idx) {
            const basket = currentBaskets()[no];
            if (!basket) return;
            const item = basket.items[idx];
            if (confirm(`Keluarkan "${item.nama}" dari keranjang ${no}?`)) {
                basket.items.splice(idx, 1);
                logTransaction('out', { nama: item.nama, qty: item.qty, keranjang: no, section: basket.section });
                saveToFirestore();
                showToast('✅ Barang dikeluarkan');
                showBasketDetail(no);
            }
        }

        function renderInputForm() {
            const sectionOpt = Object.keys(currentSections()).map(s => `<option value="${s}">${s}</option>`).join('');
            container.innerHTML = `
                <div class="card">
                    <h3>📥 Barang Masuk</h3>
                    <form id="inForm" onsubmit="submitIn(event)">
                        <div class="form-group"><label>Nama Barang</label><input type="text" id="inNama" list="namaList" required><datalist id="namaList"></datalist></div>
                        <div class="form-group"><label>Jumlah</label><input type="text" id="inQty" placeholder="3 Pack" required></div>
                        <div class="form-group"><label>Jenis</label><select id="inJenis"><option value="IIP">IIP</option><option value="RM">RM</option><option value="TH">TH</option></select></div>
                        <div class="form-group"><label>Tanggal Exp (opsional)</label><input type="date" id="inExpDate"></div>
                        <div class="form-group"><label>Estimasi Keluar (opsional)</label><input type="date" id="inEstOutDate"></div>
                        <div class="form-group"><label>Section</label><select id="inSection" onchange="updateKeranjangSelect()">${sectionOpt}</select></div>
                        <div class="form-group"><label>No Keranjang</label><select id="inKeranjang"><option value="">-- Otomatis --</option></select></div>
                        <button type="submit" class="btn btn-primary" style="width:100%">Simpan</button>
                    </form>
                </div>`;
            updateKeranjangSelect();
            updateNamaDatalist();
        }

        function updateKeranjangSelect() {
            const section = document.getElementById('inSection')?.value;
            const select = document.getElementById('inKeranjang');
            if(!select) return;
            select.innerHTML = '<option value="">-- Otomatis --</option>';
            if(section) {
                const barisObj = currentSections()[section] || {};
                for (const [baris, nums] of Object.entries(barisObj)) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = `Baris ${baris}`;
                    nums.sort((a,b)=>a-b).forEach(no => {
                        const c = stackCount(no);
                        const option = document.createElement('option');
                        option.value = no;
                        option.textContent = `${no} (${c}/5)${c>=5 ? ' PENUH' : ''}`;
                        if (c >= 5) option.disabled = true;
                        optgroup.appendChild(option);
                    });
                    select.appendChild(optgroup);
                }
            }
        }

        function updateNamaDatalist() {
            const set = new Set();
            currentTransactions().forEach(t => { if(t.detail?.nama) set.add(t.detail.nama); });
            document.getElementById('namaList').innerHTML = [...set].map(n => `<option value="${n}">`).join('');
        }

        function submitIn(e) {
            e.preventDefault();
            const nama = document.getElementById('inNama').value.trim();
            const qty = document.getElementById('inQty').value.trim();
            const jenis = document.getElementById('inJenis').value;
            const expDate = document.getElementById('inExpDate').value;
            const estOutDate = document.getElementById('inEstOutDate').value;
            const section = document.getElementById('inSection').value;
            let keranjang = document.getElementById('inKeranjang').value;

            if(!nama||!qty) return showToast('Lengkapi data!');
            if(!keranjang) {
                const auto = getAvailableBasket(section);
                if(!auto) return showToast(`Semua keranjang di ${section} penuh!`);
                keranjang = auto;
            }
            const no = parseInt(keranjang);
            if(stackCount(no)>=5) return showToast('Keranjang penuh!');
            if(!currentBaskets()[no]) currentBaskets()[no] = { section, items:[] };
            const item = { nama, qty, jenis, tglMasuk: new Date().toISOString() };
            if (expDate) item.expDate = expDate;
            if (estOutDate) item.estOutDate = estOutDate;
            currentBaskets()[no].items.push(item);
            logTransaction('in', { nama, qty, jenis, keranjang:no, section, expDate, estOutDate });
            saveToFirestore();
            showToast('✅ Barang masuk');
            renderInputForm();
        }

        function renderOut() {
            let items = [];
            Object.entries(currentBaskets()).forEach(([no, basket]) => {
                basket.items.forEach((item, idx) => items.push({ no:parseInt(no), section:basket.section, item, idx }));
            });
            if(!items.length) {
                container.innerHTML = '<div class="card"><h3>📤 Barang Keluar</h3><div class="empty-state">Tidak ada barang</div></div>';
                return;
            }
            container.innerHTML = `<div class="card"><h3>📤 Barang Keluar</h3>` +
                items.map(e => `
                    <div class="item-row">
                        <div><strong>${e.item.nama}</strong> (${e.item.qty})<br><small>Keranjang ${e.no} [${e.section}]</small></div>
                        <button class="btn btn-danger" onclick="keluarkanItem(${e.no},${e.idx});renderOut();">Keluar</button>
                    </div>`).join('') + '</div>';
        }

        function renderHistory() {
            const list = currentTransactions().slice(0,50).map(t => {
                const icon = t.type==='in'?'📥':'📤';
                return `<div class="item-row"><div>${icon} <strong>${t.detail.nama}</strong> (${t.detail.qty})<br><small>${new Date(t.timestamp).toLocaleString('id-ID')} | ${t.user}</small></div></div>`;
            }).join('');
            container.innerHTML = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3>📋 Riwayat</h3>
                        <button class="btn btn-sm btn-outline" onclick="downloadExcel()"><i class="fas fa-download"></i> Excel</button>
                    </div>
                    ${list||'<div class="empty-state">Belum ada aktivitas</div>'}
                </div>`;
        }

        function renderManageBaskets() {
            let html = '<div class="card"><h3>⚙️ Atur Nomor Keranjang</h3>';
            for (const [section, barisObj] of Object.entries(currentSections())) {
                html += `<div style="margin-bottom:20px"><strong>📍 ${section}</strong>`;
                for (const [baris, nums] of Object.entries(barisObj)) {
                    const chips = nums.sort((a,b)=>a-b).map(no => {
                        const count = stackCount(no);
                        const canDel = count===0;
                        return `<span class="chip">${no} <span style="cursor:pointer" onclick="${canDel?`removeBasket('${section}','${baris}',${no})`:'showToast(\'Keranjang berisi\')'}">${canDel?'🗑️':'🔒'}</span></span>`;
                    }).join('');
                    html += `<div style="margin-left:8px; margin-bottom:12px;">
                        <span class="baris-label">📌 Baris ${baris} (${nums.length}/5)</span>
                        <div class="chip-list">${chips}</div>`;
                    if (nums.length < 5) {
                        html += `<div style="display:flex; gap:6px; margin-top:4px;">
                            <input type="number" id="new_${section}_${baris}" placeholder="No baru" style="width:100px;">
                            <button class="btn btn-sm btn-primary" onclick="addBasket('${section}','${baris}')">+ Tambah</button>
                        </div>`;
                    }
                    html += `</div>`;
                }
                html += `</div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function addBasket(section, baris) {
            const input = document.getElementById(`new_${section}_${baris}`);
            if(!input) return;
            const no = parseInt(input.value);
            if(isNaN(no)||no<=0) return showToast('Nomor tidak valid');
            // Cek duplikat di semua section
            for (const [sec, barisObj] of Object.entries(currentSections())) {
                for (const nums of Object.values(barisObj)) {
                    if (nums.includes(no)) return showToast(`Nomor ${no} sudah ada di section ${sec}`);
                }
            }
            const barisData = currentSections()[section][baris];
            if (!barisData) return showToast('Baris tidak ditemukan');
            if (barisData.length >= 5) return showToast(`Baris ${baris} sudah penuh (5 keranjang)`);
            barisData.push(no);
            if (!currentBaskets()[no]) currentBaskets()[no] = { section, baris, items: [] };
            else {
                currentBaskets()[no].section = section;
                currentBaskets()[no].baris = baris;
            }
            saveToFirestore();
            input.value = '';
            renderManageBaskets();
            showToast(`✅ ${no} ditambahkan ke ${section} baris ${baris}`);
        }

        function removeBasket(section, baris, no) {
            if(stackCount(no)>0) return showToast('Keranjang masih berisi');
            if(!confirm(`Hapus keranjang ${no} dari ${section} baris ${baris}?`)) return;
            const arr = currentSections()[section][baris];
            const idx = arr.indexOf(no);
            if(idx>-1) arr.splice(idx,1);
            if(currentBaskets()[no] && currentBaskets()[no].items.length===0) delete currentBaskets()[no];
            saveToFirestore();
            renderManageBaskets();
            showToast('✅ Dihapus');
        }

        function downloadExcel() {
            const transactions = currentTransactions();
            if (transactions.length === 0) return showToast('Tidak ada data untuk diunduh');
            
            let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="UTF-8"><title>Rekap Transaksi Walk-in ${currentArea.toUpperCase()}</title></head>
            <body>
            <h2>Rekap Transaksi - Area ${currentArea.toUpperCase()}</h2>
            <table border="1">
                <tr style="background:#2563eb; color:white;">
                    <th>Tanggal</th><th>Jenis</th><th>Item</th><th>Jumlah</th><th>Jenis Brg</th><th>Keranjang</th><th>Section</th><th>User</th>
                    <th>Exp Date</th><th>Est Out</th>
                </tr>`;
            
            transactions.forEach(t => {
                const d = t.detail;
                html += `<tr>
                    <td>${new Date(t.timestamp).toLocaleString('id-ID')}</td>
                    <td>${t.type==='in'?'Masuk':'Keluar'}</td>
                    <td>${d.nama || ''}</td>
                    <td>${d.qty || ''}</td>
                    <td>${d.jenis || ''}</td>
                    <td>${d.keranjang || ''}</td>
                    <td>${d.section || ''}</td>
                    <td>${t.user}</td>
                    <td>${d.expDate || ''}</td>
                    <td>${d.estOutDate || ''}</td>
                </tr>`;
            });
            html += '</table></body></html>';
            
            const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `rekap_${currentArea}_${new Date().toISOString().split('T')[0]}.xls`;
            link.click();
        }

        // Tab navigation
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                renderCurrentTab();
            });
        });

        document.getElementById('areaSelect').value = currentArea;
    </script>
</body>
</html>
