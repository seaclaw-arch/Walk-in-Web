<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Walk-in Frozen & Chiller | Cloud v11</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#f0f4f8; --card:#fff; --text:#1e293b; --primary:#2563eb; --danger:#ef4444; --warning:#f59e0b; --success:#10b981; --orange:#f97316; --shadow:0 4px 12px rgba(0,0,0,0.05); --radius:20px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui; background:linear-gradient(135deg,#e0e7ff,#f0f4ff); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
        .header { background:rgba(15,23,42,0.9); backdrop-filter:blur(10px); width:100%; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; color:white; position:sticky; top:0; z-index:100; gap:12px; flex-wrap:wrap; }
        .header h2 { font-size:1.2rem; font-weight:700; }
        .area-selector { display:flex; align-items:center; gap:8px; }
        .area-selector select { padding:8px 12px; border-radius:12px; border:1px solid #cbd5e1; font-weight:600; }
        .user-row { display:flex; align-items:center; gap:6px; }
        .tab-bar { display:flex; width:100%; background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); padding:6px 12px; gap:6px; overflow-x:auto; }
        .tab-btn { flex:1 0 auto; padding:10px 12px; border:none; background:transparent; font-weight:600; color:#64748b; border-radius:40px; cursor:pointer; font-size:0.82rem; white-space:nowrap; }
        .tab-btn.active { background:var(--primary); color:white; box-shadow:0 4px 12px rgba(37,99,235,0.3); }
        .container { width:100%; max-width:780px; padding:16px; display:flex; flex-direction:column; gap:16px; margin-bottom:20px; }
        .card { background:var(--card); border-radius:var(--radius); padding:18px 16px; box-shadow:var(--shadow); }
        .form-group { margin-bottom:14px; } label { font-weight:600; font-size:0.8rem; display:block; margin-bottom:4px; }
        input, select { width:100%; padding:12px 14px; border:1px solid #cbd5e1; border-radius:14px; font-size:0.95rem; background:#f8fafc; }
        .btn { padding:12px 18px; border-radius:14px; border:none; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-size:0.9rem; }
        .btn-primary { background:var(--primary); color:white; } .btn-danger { background:var(--danger); color:white; } .btn-outline { background:transparent; border:1px solid #cbd5e1; }
        .btn-sm { padding:6px 12px; font-size:0.75rem; }
        .item-row { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f1f5f9; border-radius:12px; margin-bottom:6px; }
        .item-row.in { background:#d1fae5; } .item-row.out { background:#fee2e2; } .item-row.move { background:#dbeafe; }
        .item-row.expired { background:#fee2e2; border:1px solid #ef4444; }
        .empty-state { color:#94a3b8; text-align:center; padding:20px; }
        .toast { position:fixed; bottom:20px; left:20px; right:20px; background:#1e293b; color:white; padding:14px; border-radius:14px; text-align:center; opacity:0; transform:translateY(20px); transition:0.3s; z-index:200; }
        .toast.show { opacity:1; transform:translateY(0); }

        /* Denah */
        .fp-room { border:3px solid #1e293b; border-radius:10px; padding:10px; overflow-x:auto; }
        .fp-room-title { font-weight:800; font-size:0.95rem; color:#1e293b; margin-bottom:10px; text-align:center; }
        .fp-legend { display:flex; gap:16px; flex-wrap:wrap; padding:8px 4px; font-size:0.8rem; font-weight:600; margin-top:10px; }

        .baris-wrapper { display:flex; flex-direction:column; align-items:center; gap:4px; }
        .baris-label { font-size:0.65rem; font-weight:800; color:#92400e; text-align:center; white-space:nowrap; }
        .baris-box { width:120px; height:120px; background:#fde68a; border:2.5px solid #d97706; border-radius:10px; padding:4px; display:flex; flex-direction:column; flex-shrink:0; }
        .baris-slots { display:flex; flex-direction:column-reverse; gap:1px; flex:1; }

        .basket-slot { flex:1; border-radius:4px; background:#fff; border:1.5px solid #cbd5e1; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; transition:transform 0.1s; overflow:hidden; min-height:0; }
        .basket-slot:active { transform:scale(0.95); }
        .basket-slot.green { border-color:var(--success); background:#ecfdf5; }
        .basket-slot.orange { border-color:var(--orange); background:#fff7ed; animation:softPulse 1.8s infinite; }
        .basket-slot.red { border-color:var(--danger); background:#fef2f2; animation:strongPulse 0.9s infinite; }
        .basket-slot.slot-empty { background:#f8fafc; border:1.5px dashed #d1d5db; cursor:default; }
        .slot-num { font-weight:800; font-size:0.55rem; line-height:1; color:#1e293b; }
        .slot-count { font-size:0.45rem; color:#64748b; }
        .slot-alert { position:absolute; top:-3px; right:-3px; background:var(--danger); color:white; border-radius:50%; width:11px; height:11px; display:flex; align-items:center; justify-content:center; font-size:0.4rem; font-weight:bold; z-index:5; }

        .stock-box { width:120px; height:120px; background:#e0e7ff; border:2.5px solid #6366f1; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
        .stock-box .baris-label { color:#4338ca; font-size:0.7rem; white-space:normal; text-align:center; line-height:1.3; }
        .stock-icon { font-size:1.8rem; }

        .spacer { min-height:40px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#c8d3df; font-size:0.75rem; flex:1; }
        .spacer-box { width:120px; height:120px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#c8d3df; font-size:0.85rem; flex-shrink:0; }

        .frz-plan { display:flex; flex-direction:column; gap:8px; min-width:820px; }
        .frz-body { display:flex; gap:8px; align-items:flex-start; }
        .frz-left { display:flex; flex-direction:column; gap:8px; flex:1; }
        .frz-right { display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
        .frz-bot { display:flex; gap:8px; align-items:flex-start; }
        .boxes-row { display:flex; gap:8px; }

        .chl-plan { display:flex; flex-direction:column; gap:8px; min-width:840px; }
        .chl-top { display:flex; gap:8px; align-items:flex-start; }
        .chl-space { min-height:80px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#c8d3df; font-size:0.75rem; }
        .chl-bot { display:flex; gap:8px; flex-wrap:wrap; }

        .move-form { background:#f8fafc; border:1px solid #cbd5e1; border-radius:10px; padding:8px; margin-top:6px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
        .move-form select { width:auto; padding:6px; }

        .rekap-tabs { display:flex; gap:8px; margin-bottom:16px; }
        .rekap-tab { padding:8px 20px; border-radius:20px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:600; cursor:pointer; font-size:0.85rem; }
        .rekap-tab.active { background:var(--primary); color:white; border-color:var(--primary); }
        .rekap-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        .rekap-table th { background:#1e3a5f; color:white; padding:10px 8px; text-align:left; }
        .rekap-table td { padding:9px 8px; border-bottom:1px solid #e2e8f0; }
        .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
        .stat-box { background:#f0f4ff; border-radius:14px; padding:14px; text-align:center; }
        .stat-box .val { font-size:1.8rem; font-weight:800; color:var(--primary); }
        .stat-box .lbl { font-size:0.75rem; color:#64748b; }
        .stat-box.out { background:#fff0f0; } .stat-box.out .val { color:var(--danger); }
        .section-badge { background:#dbeafe; color:#1d4ed8; border-radius:20px; padding:2px 8px; font-size:0.75rem; font-weight:600; margin:2px; display:inline-block; }
        .filter-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
        .filter-row select { width:auto; padding:8px 12px; font-size:0.85rem; }
        .reset-btn { background:#fee2e2; color:#ef4444; border:2px solid #ef4444; padding:10px 20px; border-radius:14px; cursor:pointer; font-weight:600; margin-top:20px; width:100%; }
        .google-btn { background:#fff; color:#333; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border-radius:12px; cursor:pointer; font-weight:500; margin-top:10px; width:100%; }

        @keyframes softPulse { 0%{box-shadow:0 0 0 0 rgba(249,115,22,0.3)} 50%{box-shadow:0 0 0 5px rgba(249,115,22,0.1)} 100%{box-shadow:0 0 0 0 rgba(249,115,22,0.3)} }
        @keyframes strongPulse { 0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 0 7px rgba(239,68,68,0.15)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} }
    </style>
</head>
<body>
<div id="loginScreen" class="container" style="max-width:400px;margin-top:40px;">
    <div class="card" style="text-align:center">
        <h2>🔐 Masuk Walk-in</h2>
        <p style="color:#64748b;margin-bottom:16px;">Gunakan akun tim</p>
        <div class="form-group"><input type="email" id="loginEmail" value="tim@walkin.com"></div>
        <div class="form-group"><input type="password" id="loginPassword" value="frozen2024"></div>
        <button class="btn btn-primary" style="width:100%" onclick="login()">Masuk</button>
        <button class="google-btn" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Login dengan Google</button>
        <p id="loginError" style="color:red;margin-top:10px;"></p>
    </div>
</div>

<div id="appScreen" style="display:none;width:100%;">
    <div class="header">
        <h2>🧊 Walk-in <span id="areaTitle">Frozen</span></h2>
        <div class="area-selector">
            <span style="color:white;">Area:</span>
            <select id="areaSelect" onchange="switchArea()"><option value="frozen">❄️ Frozen</option><option value="chiller">🌡️ Chiller</option></select>
        </div>
        <div class="user-row">
            <span id="currentUserName" style="font-size:0.8rem;color:white;"></span>
            <button class="btn-outline" style="color:white;border-color:white;padding:4px 10px;" onclick="logout()">Keluar</button>
        </div>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="dashboard">🗺️ Denah</button>
        <button class="tab-btn" data-tab="in">📥 Masuk</button>
        <button class="tab-btn" data-tab="history">📋 Riwayat</button>
        <button class="tab-btn" data-tab="rekap">📊 Rekap</button>
    </div>
    <div class="container" id="appContainer"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1K3kQ93LSz1yKpBa2cMCRD045alTm6cs",
    authDomain: "walk-in-web.firebaseapp.com",
    projectId: "walk-in-web",
    storageBucket: "walk-in-web.firebasestorage.app",
    messagingSenderId: "42449089338",
    appId: "1:42449089338:web:a34b589a7c746b8dcc1603"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let currentArea = 'frozen';
let appData = { frozen: { sections:{}, baskets:{}, transactions:[] }, chiller: { sections:{}, baskets:{}, transactions:[] } };
let currentTab = 'dashboard';
let rekapMode  = 'bulanan';
let unsubscribe = null;
const ADMIN_EMAILS = ['slardar.men@gmail.com'];

// Default sections dengan slot kosong (null)
const defaultFrozenSections = {
    'IMP': { A: Array(5).fill(null), B: Array(5).fill(null), C: Array(5).fill(null), D: Array(5).fill(null), E: Array(5).fill(null) },
    'RTL': { A: Array(5).fill(null), B: Array(5).fill(null), C: Array(5).fill(null) },
    'NPL': { A: Array(5).fill(null), B: Array(5).fill(null), C: Array(5).fill(null) },
    'RDQ': { A: Array(5).fill(null) },
    'MTPP': { A: Array(5).fill(null), B: Array(5).fill(null) },
    'MI':   { A: Array(5).fill(null), B: Array(5).fill(null), C: Array(5).fill(null) }
};
const defaultChillerSections = {
    'IMP': { A: Array(5).fill(null) },
    'RTL': { A: Array(5).fill(null) },
    'NPL': { A: Array(5).fill(null) },
    'MTPP': { A: Array(5).fill(null) },
    'RDQ': { A: Array(5).fill(null) },
    'MI': { A: Array(5).fill(null) },
    'THAWING': { A: Array(5).fill(null), B: Array(5).fill(null) }
};

function getDefaultSections(area) {
    return area === 'frozen' ? JSON.parse(JSON.stringify(defaultFrozenSections)) : JSON.parse(JSON.stringify(defaultChillerSections));
}

function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value.trim();
    auth.signInWithEmailAndPassword(email, pass).catch(e => document.getElementById('loginError').textContent = 'Gagal: ' + e.message);
}
function loginWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => document.getElementById('loginError').textContent = 'Google login gagal: ' + e.message);
}
function logout() { auth.signOut(); }

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display   = 'block';
        document.getElementById('currentUserName').textContent = user.email;
        listenToFirestore();
    } else {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('appScreen').style.display   = 'none';
        if (unsubscribe) unsubscribe();
    }
});

function listenToFirestore() {
    if (unsubscribe) unsubscribe();
    unsubscribe = db.collection('shared').doc('data').onSnapshot(doc => {
        if (doc.exists) {
            const data = doc.data();
            let fData = data.frozen  || { sections: getDefaultSections('frozen'),  baskets:{}, transactions:[] };
            let cData = data.chiller || { sections: getDefaultSections('chiller'), baskets:{}, transactions:[] };
            // Pastikan struktur sections sesuai default jika ada yang hilang
            fData.sections = { ...getDefaultSections('frozen'), ...(fData.sections || {}) };
            cData.sections = { ...getDefaultSections('chiller'), ...(cData.sections || {}) };
            appData.frozen  = fData; appData.chiller = cData;
            syncBasketsWithSections('frozen'); syncBasketsWithSections('chiller');
            if (!data.frozen) saveToFirestore();
            renderCurrentTab();
        } else {
            appData.frozen  = { sections: getDefaultSections('frozen'),  baskets:{}, transactions:[] };
            appData.chiller = { sections: getDefaultSections('chiller'), baskets:{}, transactions:[] };
            syncBasketsWithSections('frozen'); syncBasketsWithSections('chiller');
            saveToFirestore();
            renderCurrentTab();
        }
    });
}
function saveToFirestore() {
    db.collection('shared').doc('data').set({ frozen: appData.frozen, chiller: appData.chiller }, { merge: true });
}
function syncBasketsWithSections(area) {
    const sections = appData[area].sections;
    const baskets  = appData[area].baskets;
    const validNos = new Set();
    for (const barisObj of Object.values(sections))
        for (const slots of Object.values(barisObj))
            slots.forEach(no => { if (no !== null) validNos.add(no); });
    for (const no of Object.keys(baskets))
        if (!validNos.has(Number(no))) delete baskets[no];
    for (const [sec, barisObj] of Object.entries(sections))
        for (const [baris, slots] of Object.entries(barisObj))
            slots.forEach((no, idx) => {
                if (no === null) return;
                if (!baskets[no]) baskets[no] = { section: sec, baris, slot: idx+1, items: [] };
                else { baskets[no].section = sec; baskets[no].baris = baris; baskets[no].slot = idx+1; }
            });
}

function currentSections() { return appData[currentArea].sections; }
function currentBaskets() { return appData[currentArea].baskets; }
function currentTransactions() { return appData[currentArea].transactions; }
function switchArea() {
    currentArea = document.getElementById('areaSelect').value;
    document.getElementById('areaTitle').textContent = currentArea==='frozen'?'Frozen':'Chiller';
    renderCurrentTab();
}
function itemCount(no) { return (currentBaskets()[no]?.items || []).length; }
function hasExpiredItems(no) {
    const items = currentBaskets()[no]?.items || [];
    const now = new Date();
    return items.some(i => (i.expDate && new Date(i.expDate) < now) || (i.estOutDate && new Date(i.estOutDate) < now));
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
function logTransaction(type, detail) {
    currentTransactions().unshift({ id: Date.now(), timestamp: new Date().toISOString(), type, detail, user: auth.currentUser?.email || 'unknown' });
    if (currentTransactions().length > 500) currentTransactions().pop();
    saveToFirestore();
}
function isAdmin() {
    const user = auth.currentUser;
    if (!user) return false;
    return user.providerData.some(p => p.providerId==='google.com') && ADMIN_EMAILS.includes(user.email);
}
async function resetAllData() {
    if (!isAdmin()) { showToast('⚠️ Hanya admin yang bisa mereset data.'); return; }
    if (!confirm('PERINGATAN! Semua data akan dihapus. Lanjutkan?')) return;
    if (!confirm('Terakhir: data akan hilang total. Yakin?')) return;
    await db.collection('shared').doc('data').set({
        frozen:  { sections: getDefaultSections('frozen'),  baskets:{}, transactions:[] },
        chiller: { sections: getDefaultSections('chiller'), baskets:{}, transactions:[] }
    });
    showToast('✅ Data berhasil direset.');
}

// Cari slot kosong di section dan baris tertentu
function findEmptySlot(section, baris) {
    const slots = currentSections()[section]?.[baris];
    if (!slots) return null;
    const idx = slots.findIndex(no => no === null);
    return idx !== -1 ? { idx, slot: idx+1 } : null;
}

const container = document.getElementById('appContainer');
function renderCurrentTab() {
    try {
        switch (currentTab) {
            case 'dashboard': renderDashboard(); break;
            case 'in': renderInputForm(); break;
            case 'history': renderHistory(); break;
            case 'rekap': renderRekap(); break;
        }
    } catch(e) { console.error(e); container.innerHTML = '<div class="card"><div class="empty-state">Error. Refresh halaman.</div></div>'; }
}

// Slot kecil, label di luar
function buildBasketSlot(no) {
    if (no === null) return `<div class="basket-slot slot-empty"></div>`;
    const count = itemCount(no);
    const expired = hasExpiredItems(no);
    let cls = 'basket-slot';
    if (count >= 5) cls += ' orange';
    else if (expired) cls += ' red';
    else if (count > 0) cls += ' green';
    else cls += ' slot-empty';
    const badge = (expired || count >= 5) ? '<span class="slot-alert">!</span>' : '';
    return `<div class="${cls}" onclick="showBasketDetail(${no})" title="Keranjang ${no} — ${count}/5${expired?' ⚠️':''}">
        <span class="slot-num">${no}</span>
        <span class="slot-count">${count}/5</span>
        ${badge}
    </div>`;
}

function buildBarisBox(secName, barisIdx, slots) {
    const num = String(barisIdx + 1).padStart(2, '0');
    const lbl = `${secName} ${num}`;
    let slotElements = '';
    for (let i = 0; i < 5; i++) {
        slotElements += buildBasketSlot(slots[i]);
    }
    return `<div class="baris-wrapper">
        <div class="baris-label">${lbl}</div>
        <div class="baris-box">
            <div class="baris-slots">${slotElements}</div>
        </div>
    </div>`;
}

function getSecBoxes(secName) {
    const barisObj = currentSections()[secName] || {};
    return Object.entries(barisObj).map(([b, slots], idx) => buildBarisBox(secName, idx, slots)).join('');
}

function renderFrozenPlan() {
    const adminBtn = isAdmin() ? `<button class="reset-btn" onclick="resetAllData()"><i class="fas fa-exclamation-triangle"></i> Reset Semua Data (Admin Only)</button>` : '';
    container.innerHTML = `
    <div class="card" style="padding:12px;">
        <div class="fp-room-title">❄️ Denah Walk-in Frozen</div>
        <div class="fp-room" style="background:#e8f4f8;">
            <div class="frz-plan">
                <div class="frz-body">
                    <div class="frz-left">
                        <div class="boxes-row">${getSecBoxes('IMP')}</div>
                        <div class="spacer">— Area Kosong —</div>
                        <div class="boxes-row">${getSecBoxes('RTL')}</div>
                        <div class="boxes-row">${getSecBoxes('NPL')}</div>
                        <div class="spacer">— Area Kosong —</div>
                        <div class="frz-bot">
                            <div class="boxes-row">${getSecBoxes('RDQ')}</div>
                            <div class="boxes-row">${getSecBoxes('MTPP')}</div>
                        </div>
                    </div>
                    <div class="frz-right">
                        <div class="spacer-box">Area Kosong</div>
                        ${getSecBoxes('MI')}
                    </div>
                </div>
            </div>
        </div>
        <div class="fp-legend">
            <span>🟢 Tersedia</span>
            <span>🟠 Penuh (5/5)</span>
            <span>🔴 Expired / Est Lewat</span>
            <span>⚪ Kosong</span>
        </div>
        ${adminBtn}
    </div>`;
}

function renderChillerPlan() {
    const stockBox = `<div class="baris-wrapper"><div class="baris-label">📦 Stock Keranjang</div><div class="stock-box"><div class="stock-icon">🧺</div></div></div>`;
    const adminBtn = isAdmin() ? `<button class="reset-btn" onclick="resetAllData()"><i class="fas fa-exclamation-triangle"></i> Reset Semua Data (Admin Only)</button>` : '';
    const bottomSecs = ['IMP','RTL','NPL','MTPP','RDQ','MI'];
    container.innerHTML = `
    <div class="card" style="padding:12px;">
        <div class="fp-room-title">🌡️ Denah Walk-in Chiller</div>
        <div class="fp-room" style="background:#f0fdf4;">
            <div class="chl-plan">
                <div class="chl-top">${stockBox}${getSecBoxes('THAWING')}</div>
                <div class="chl-space">— Area Kosong —</div>
                <div class="chl-bot">${bottomSecs.map(s => getSecBoxes(s)).join('')}</div>
            </div>
        </div>
        <div class="fp-legend">
            <span>🟢 Tersedia</span>
            <span>🟠 Penuh (5/5)</span>
            <span>🔴 Expired / Est Lewat</span>
            <span>⚪ Kosong</span>
        </div>
        ${adminBtn}
    </div>`;
}

function renderDashboard() {
    if (currentArea === 'frozen') renderFrozenPlan(); else renderChillerPlan();
}

// ─── DETAIL KERANJANG + PINDAH + KELUAR ───
function showBasketDetail(no, moveItemIdx = null) {
    const basket = currentBaskets()[no];
    const count = itemCount(no);
    const now = new Date();
    let itemsHtml = basket && basket.items.length
        ? basket.items.map((item, idx) => {
            let cls = '', lbl = '';
            if (item.expDate && new Date(item.expDate) < now) { cls = 'expired'; lbl = ' ⚠️ EXP'; }
            else if (item.estOutDate && new Date(item.estOutDate) < now) { cls = 'expired'; lbl = ' ⚠️ EST LEWAT'; }
            const moveFormHtml = (moveItemIdx === idx) ? renderMoveForm(no, idx) : '';
            return `<div class="item-row ${cls}">
                <div>
                    <strong>${item.nama}</strong> (${item.qty})${lbl}
                    <br><small>${item.jenis||''} | Masuk: ${item.tglMasuk?new Date(item.tglMasuk).toLocaleDateString('id-ID'):'-'}
                    ${item.expDate?' | Exp: '+new Date(item.expDate).toLocaleDateString('id-ID'):''}
                    ${item.estOutDate?' | Est.Keluar: '+new Date(item.estOutDate).toLocaleDateString('id-ID'):''}</small>
                </div>
                <div style="display:flex; gap:4px;">
                    <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); showBasketDetail(${no}, ${idx})">Pindah</button>
                    <button class="btn btn-outline btn-sm" onclick="keluarkanItem(${no}, ${idx})">Keluar</button>
                </div>
                ${moveFormHtml}
            </div>`;
        }).join('')
        : '<div class="empty-state">Keranjang kosong</div>';

    container.innerHTML = `<div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
            <h3>Keranjang ${no}${basket?' — Baris '+basket.baris+' Slot '+basket.slot+' ('+basket.section+')':''}</h3>
            <button class="btn btn-outline btn-sm" onclick="renderDashboard()">← Denah</button>
        </div>
        <p style="margin-bottom:12px;">Total item: ${count}/5</p>
        ${itemsHtml}
    </div>`;
}

function renderMoveForm(fromNo, fromIdx) {
    const sections = Object.keys(currentSections());
    const sectionOpts = sections.map(s => `<option value="${s}">${s}</option>`).join('');
    return `<div class="move-form" onclick="event.stopPropagation();">
        <select id="moveSection" onchange="updateMoveBaris()">${sectionOpts}</select>
        <select id="moveBaris" onchange="updateMoveKeranjang()"><option>-- Baris --</option></select>
        <select id="moveKeranjang"><option>-- Keranjang --</option></select>
        <button class="btn btn-sm btn-primary" onclick="pindahkanItem(${fromNo}, ${fromIdx})">Pindahkan</button>
    </div>`;
}

function updateMoveBaris() {
    const sec = document.getElementById('moveSection')?.value;
    const barisSel = document.getElementById('moveBaris');
    if (!barisSel) return;
    barisSel.innerHTML = '<option value="">-- Baris --</option>';
    if (!sec) return;
    const barisObj = currentSections()[sec] || {};
    Object.keys(barisObj).forEach((baris, idx) => {
        const label = `${sec} ${String(idx+1).padStart(2,'0')}`;
        barisSel.innerHTML += `<option value="${baris}">${label}</option>`;
    });
    updateMoveKeranjang();
}

function updateMoveKeranjang() {
    const sec = document.getElementById('moveSection')?.value;
    const baris = document.getElementById('moveBaris')?.value;
    const kerSel = document.getElementById('moveKeranjang');
    if (!kerSel) return;
    kerSel.innerHTML = '<option value="">-- Keranjang --</option>';
    if (!sec || !baris) return;
    const slots = currentSections()[sec][baris];
    if (slots) {
        slots.forEach((no, idx) => {
            if (no === null) return;
            const c = itemCount(no);
            const disabled = c >= 5 ? 'disabled' : '';
            kerSel.innerHTML += `<option value="${no}" ${disabled}>Keranjang ${no} (Slot ${idx+1}) ${c}/5</option>`;
        });
    }
}

function pindahkanItem(fromNo, fromIdx) {
    const toNo = parseInt(document.getElementById('moveKeranjang')?.value);
    if (!toNo) return showToast('Pilih keranjang tujuan.');
    if (toNo === fromNo) return showToast('Tidak bisa pindah ke keranjang yang sama.');
    if (itemCount(toNo) >= 5) return showToast('Keranjang tujuan sudah penuh.');
    const fromBasket = currentBaskets()[fromNo];
    if (!fromBasket || !fromBasket.items[fromIdx]) return;
    const item = fromBasket.items[fromIdx];
    fromBasket.items.splice(fromIdx, 1);
    if (!currentBaskets()[toNo]) {
        currentBaskets()[toNo] = { section: currentBaskets()[toNo]?.section || '', items: [] };
    }
    currentBaskets()[toNo].items.push(item);
    logTransaction('move', { nama: item.nama, qty: item.qty, jenis: item.jenis, dari: fromNo, ke: toNo });
    saveToFirestore();
    showToast('✅ Barang dipindahkan.');
    showBasketDetail(fromNo);
}

function keluarkanItem(no, idx) {
    const basket = currentBaskets()[no]; if (!basket) return;
    const item = basket.items[idx];
    if (confirm(`Keluarkan "${item.nama}" dari keranjang ${no}?`)) {
        basket.items.splice(idx, 1);
        logTransaction('out', { nama:item.nama, qty:item.qty, jenis:item.jenis, keranjang:no, section:basket.section });
        saveToFirestore(); showToast('✅ Barang dikeluarkan'); showBasketDetail(no);
    }
}

// ─── INPUT BARANG (dengan nomor keranjang bebas) ───
function renderInputForm() {
    const sectionOpt = Object.keys(currentSections()).map(s => `<option value="${s}">${s}</option>`).join('');
    container.innerHTML = `<div class="card"><h3>📥 Barang Masuk</h3>
        <form id="inForm" onsubmit="submitIn(event)">
            <div class="form-group"><label>Nama Barang</label><input type="text" id="inNama" list="namaList" required><datalist id="namaList"></datalist></div>
            <div class="form-group"><label>Jumlah</label><input type="text" id="inQty" placeholder="3 Pack" required></div>
            <div class="form-group"><label>Jenis</label><select id="inJenis"><option value="IIP">IIP</option><option value="RM">RM</option><option value="TH">TH</option></select></div>
            <div class="form-group"><label>Tanggal Exp (opsional)</label><input type="date" id="inExpDate"></div>
            <div class="form-group"><label>Estimasi Keluar (opsional)</label><input type="date" id="inEstOutDate"></div>
            <div class="form-group"><label>Section</label><select id="inSection" onchange="updateBarisSelect()">${sectionOpt}</select></div>
            <div class="form-group"><label>Baris</label><select id="inBaris"><option value="">-- Pilih --</option></select></div>
            <div class="form-group"><label>Nomor Keranjang</label><input type="number" id="inKeranjang" placeholder="Masukkan nomor keranjang" required></div>
            <button type="submit" class="btn btn-primary" style="width:100%">💾 Simpan</button>
        </form></div>`;
    updateBarisSelect();
    updateNamaDatalist();
}

function updateBarisSelect() {
    const section = document.getElementById('inSection')?.value;
    const barisSelect = document.getElementById('inBaris');
    if (!barisSelect) return;
    barisSelect.innerHTML = '<option value="">-- Pilih --</option>';
    if (section) {
        const barisObj = currentSections()[section] || {};
        Object.keys(barisObj).forEach((baris, idx) => {
            const label = `${section} ${String(idx+1).padStart(2,'0')}`;
            barisSelect.innerHTML += `<option value="${baris}">${label}</option>`;
        });
        if (Object.keys(barisObj).length > 0) barisSelect.value = Object.keys(barisObj)[0];
    }
}

function updateNamaDatalist() {
    const set = new Set();
    currentTransactions().forEach(t => { if (t.detail?.nama) set.add(t.detail.nama); });
    const dl = document.getElementById('namaList');
    if (dl) dl.innerHTML = [...set].map(n => `<option value="${n}">`).join('');
}

function submitIn(e) {
    e.preventDefault();
    const nama = document.getElementById('inNama').value.trim();
    const qty = document.getElementById('inQty').value.trim();
    const jenis = document.getElementById('inJenis').value;
    const expDate = document.getElementById('inExpDate').value;
    const estOutDate = document.getElementById('inEstOutDate').value;
    const section = document.getElementById('inSection').value;
    const baris = document.getElementById('inBaris').value;
    const noKeranjang = parseInt(document.getElementById('inKeranjang').value);

    if (!nama || !qty) return showToast('Lengkapi data!');
    if (!baris) return showToast('Pilih Baris terlebih dahulu.');
    if (isNaN(noKeranjang) || noKeranjang <= 0) return showToast('Masukkan nomor keranjang yang valid.');

    // Cek apakah keranjang sudah ada di slot
    const existingBasket = currentBaskets()[noKeranjang];
    if (existingBasket) {
        // Keranjang sudah ada, cek apakah penuh
        if (itemCount(noKeranjang) >= 5) return showToast('Keranjang sudah penuh (5 item).');
        // Tambahkan item ke keranjang tersebut
        const item = { nama, qty, jenis, tglMasuk: new Date().toISOString() };
        if (expDate) item.expDate = expDate;
        if (estOutDate) item.estOutDate = estOutDate;
        existingBasket.items.push(item);
        logTransaction('in', { nama, qty, jenis, keranjang: noKeranjang, section: existingBasket.section, baris: existingBasket.baris, expDate, estOutDate });
        saveToFirestore();
        showToast('✅ Barang ditambahkan ke keranjang yang sudah ada.');
        renderInputForm();
        return;
    }

    // Keranjang belum ada, cari slot kosong di section/baris terpilih
    const slotInfo = findEmptySlot(section, baris);
    if (!slotInfo) return showToast(`Semua slot di baris ${baris} sudah terisi. Pilih baris lain.`);

    // Tempatkan keranjang di slot kosong
    currentSections()[section][baris][slotInfo.idx] = noKeranjang;
    // Buat basket baru
    currentBaskets()[noKeranjang] = { section, baris, slot: slotInfo.slot, items: [] };
    const item = { nama, qty, jenis, tglMasuk: new Date().toISOString() };
    if (expDate) item.expDate = expDate;
    if (estOutDate) item.estOutDate = estOutDate;
    currentBaskets()[noKeranjang].items.push(item);
    logTransaction('in', { nama, qty, jenis, keranjang: noKeranjang, section, baris, expDate, estOutDate });
    saveToFirestore();
    showToast(`✅ Barang masuk ke keranjang baru di slot ${slotInfo.slot}.`);
    renderInputForm();
}

// ─── RIWAYAT (dengan warna) ───
function renderHistory() {
    const list = currentTransactions().slice(0,100).map(t => {
        let icon = '', cls = '';
        if (t.type === 'in') { icon = '📥'; cls = 'in'; }
        else if (t.type === 'out') { icon = '📤'; cls = 'out'; }
        else if (t.type === 'move') { icon = '🔄'; cls = 'move'; }
        return `<div class="item-row ${cls}">
            <div>${icon} <strong>${t.detail.nama}</strong> (${t.detail.qty})
            <br><small>${new Date(t.timestamp).toLocaleString('id-ID')} | ${t.detail.section||''} | ${t.user}</small></div>
        </div>`;
    }).join('');
    container.innerHTML = `<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><h3>📋 Riwayat</h3><button class="btn btn-sm btn-outline" onclick="downloadExcel()"><i class="fas fa-download"></i> Excel</button></div>${list||'<div class="empty-state">Belum ada aktivitas</div>'}</div>`;
}

// ─── REKAP & DOWNLOAD (tidak berubah) ───
function renderRekap() {
    const BULAN=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    const trx=currentTransactions(); const nowYear=new Date().getFullYear();
    const yearsSet=new Set(trx.map(t=>new Date(t.timestamp).getFullYear()));
    const years=[...yearsSet].sort((a,b)=>b-a);
    const selYear=parseInt(document.getElementById('rekapYearFilter')?.value||nowYear);
    let totalIn=0,totalOut=0; trx.forEach(t=>t.type==='in'?totalIn++:totalOut++);
    const statBoxes=`<div class="stat-grid"><div class="stat-box"><div class="val">${totalIn}</div><div class="lbl">Total Masuk</div></div><div class="stat-box out"><div class="val">${totalOut}</div><div class="lbl">Total Keluar</div></div></div>`;
    const modeTabs=`<div class="rekap-tabs"><button class="rekap-tab ${rekapMode==='bulanan'?'active':''}" onclick="rekapMode='bulanan';renderRekap()">📅 Bulanan</button><button class="rekap-tab ${rekapMode==='tahunan'?'active':''}" onclick="rekapMode='tahunan';renderRekap()">📆 Tahunan</button></div>`;
    if (rekapMode==='bulanan') {
        const monthData={};
        trx.forEach(t=>{const d=new Date(t.timestamp);if(d.getFullYear()!==selYear)return;const m=d.getMonth();if(!monthData[m])monthData[m]={in:0,out:0,bySection:{}};monthData[m][t.type]++;const sec=t.detail.section||'-';if(!monthData[m].bySection[sec])monthData[m].bySection[sec]={in:0,out:0};monthData[m].bySection[sec][t.type]++;});
        let rows='';for(let m=0;m<12;m++){const md=monthData[m];if(!md)continue;const badges=Object.entries(md.bySection).map(([s,v])=>`<span class="section-badge">${s}: +${v.in} -${v.out}</span>`).join('');rows+=`<tr><td><strong>${BULAN[m]} ${selYear}</strong></td><td style="color:var(--primary);">+${md.in}</td><td style="color:var(--danger);">-${md.out}</td><td>${md.in-md.out>=0?'+':''}${md.in-md.out}</td><td>${badges}</td></tr>`;}
        if(!rows) rows=`<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:20px;">Tidak ada data tahun ${selYear}</td></tr>`;
        const yearOpts=years.map(y=>`<option value="${y}" ${y===selYear?'selected':''}>${y}</option>`).join('')||`<option value="${nowYear}">${nowYear}</option>`;
        container.innerHTML=`<div class="card"><h3>📊 Rekap — ${currentArea.toUpperCase()}</h3>${statBoxes}${modeTabs}<div class="filter-row"><label>Tahun: <select id="rekapYearFilter" onchange="renderRekap()">${yearOpts}</select></label><button class="btn btn-sm btn-outline" onclick="downloadRekapExcel()"><i class="fas fa-download"></i> Excel</button></div><div style="overflow-x:auto;"><table class="rekap-table"><thead><tr><th>Bulan</th><th>Masuk</th><th>Keluar</th><th>Selisih</th><th>Per Section</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    } else {
        const yearData={};
        trx.forEach(t=>{const y=new Date(t.timestamp).getFullYear();if(!yearData[y])yearData[y]={in:0,out:0,bySection:{}};yearData[y][t.type]++;const sec=t.detail.section||'-';if(!yearData[y].bySection[sec])yearData[y].bySection[sec]={in:0,out:0};yearData[y].bySection[sec][t.type]++;});
        let rows='';[...Object.keys(yearData)].sort((a,b)=>b-a).forEach(y=>{const yd=yearData[y];const badges=Object.entries(yd.bySection).map(([s,v])=>`<span class="section-badge">${s}: +${v.in} -${v.out}</span>`).join('');rows+=`<tr><td><strong>${y}</strong></td><td style="color:var(--primary);">+${yd.in}</td><td style="color:var(--danger);">-${yd.out}</td><td>${yd.in-yd.out>=0?'+':''}${yd.in-yd.out}</td><td>${badges}</td></tr>`;});
        if(!rows) rows=`<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:20px;">Belum ada data</td></tr>`;
        container.innerHTML=`<div class="card"><h3>📊 Rekap — ${currentArea.toUpperCase()}</h3>${statBoxes}${modeTabs}<div class="filter-row"><button class="btn btn-sm btn-outline" onclick="downloadRekapExcel()"><i class="fas fa-download"></i> Excel</button></div><div style="overflow-x:auto;"><table class="rekap-table"><thead><tr><th>Tahun</th><th>Masuk</th><th>Keluar</th><th>Selisih</th><th>Per Section</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }
}

function downloadExcel() {
    const trx = currentTransactions(); if (!trx.length) return showToast('Tidak ada data');
    let h = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><h2>Riwayat — ${currentArea.toUpperCase()}</h2><table border="1"><tr style="background:#2563eb;color:white;"><th>Tanggal</th><th>Jenis</th><th>Item</th><th>Jumlah</th><th>Jenis Brg</th><th>Keranjang</th><th>Section</th><th>User</th><th>Exp</th><th>Est Out</th></tr>`;
    trx.forEach(t => { const d = t.detail; h += `<tr><td>${new Date(t.timestamp).toLocaleString('id-ID')}</td><td>${t.type==='in'?'Masuk':t.type==='move'?'Pindah':'Keluar'}</td><td>${d.nama||''}</td><td>${d.qty||''}</td><td>${d.jenis||''}</td><td>${d.keranjang||d.dari||''}</td><td>${d.section||''}</td><td>${t.user}</td><td>${d.expDate||''}</td><td>${d.estOutDate||''}</td></tr>`; });
    h += '</table></body></html>'; _dlBlob(h, `riwayat_${currentArea}_${new Date().toISOString().split('T')[0]}.xls`);
}
function downloadRekapExcel() { /* sama seperti sebelumnya */ }
function _dlBlob(html, filename) {
    const blob = new Blob([html], { type:'application/vnd.ms-excel;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function () {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentTab = this.dataset.tab;
        renderCurrentTab();
    });
});
document.getElementById('areaSelect').value = currentArea;
