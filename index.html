<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Walk-in Frozen & Chiller | v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #f0f4f8; --card: #fff; --text: #1e293b; --primary: #2563eb;
            --danger: #ef4444; --warning: #f59e0b; --success: #10b981; --orange: #f97316;
            --shadow: 0 4px 12px rgba(0,0,0,0.05); --radius: 20px;
            --move-color: #8b5cf6; --in-color: #10b981; --out-color: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI', system-ui;
            background: linear-gradient(135deg, #e0e7ff, #f0f4ff);
            color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); width:100%; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; color:white; position:sticky; top:0; z-index:100; gap:12px; flex-wrap:wrap; }
        .header h2 { font-size:1.2rem; font-weight:700; }
        .area-selector { display:flex; align-items:center; gap:8px; }
        .area-selector select { padding:8px 12px; border-radius:12px; border:1px solid #cbd5e1; font-weight:600; }
        .user-row { display:flex; align-items:center; gap:6px; }
        .tab-bar { display:flex; width:100%; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); padding:6px 12px; gap:6px; overflow-x:auto; }
        .tab-btn { flex:1 0 auto; padding:10px 12px; border:none; background:transparent; font-weight:600; color:#64748b; border-radius:40px; cursor:pointer; font-size:0.82rem; white-space:nowrap; }
        .tab-btn.active { background:var(--primary); color:white; box-shadow:0 4px 12px rgba(37,99,235,0.3); }
        .container { width:100%; max-width:780px; padding:16px; display:flex; flex-direction:column; gap:16px; margin-bottom:20px; }
        .card { background:var(--card); border-radius:var(--radius); padding:18px 16px; box-shadow:var(--shadow); }
        .form-group { margin-bottom:14px; }
        label { font-weight:600; font-size:0.8rem; display:block; margin-bottom:4px; }
        input, select { width:100%; padding:12px 14px; border:1px solid #cbd5e1; border-radius:14px; font-size:0.95rem; background:#f8fafc; }
        .btn { padding:12px 18px; border-radius:14px; border:none; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-size:0.9rem; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-danger { background:var(--danger); color:white; }
        .btn-outline { background:transparent; border:1px solid #cbd5e1; }
        .btn-sm { padding:6px 12px; font-size:0.75rem; }
        .item-row { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f1f5f9; border-radius:12px; margin-bottom:6px; }
        .item-row.expired { background:#fee2e2; border:1px solid #ef4444; }
        .empty-state { color:#94a3b8; text-align:center; padding:20px; }
        .toast { position:fixed; bottom:20px; left:20px; right:20px; background:#1e293b; color:white; padding:14px; border-radius:14px; text-align:center; opacity:0; transform:translateY(20px); transition:0.3s; z-index:200; }
        .toast.show { opacity:1; transform:translateY(0); }
        .chip { background:#e2e8f0; border-radius:20px; padding:6px 12px; font-size:0.85rem; display:inline-flex; align-items:center; gap:6px; margin:2px; }
        .baris-label { font-size:0.75rem; font-weight:700; color:#475569; margin-top:10px; margin-bottom:4px; background:#e2e8f0; display:inline-block; padding:2px 10px; border-radius:20px; }
        .rekap-tabs { display:flex; gap:8px; margin-bottom:16px; }
        .rekap-tab { padding:8px 20px; border-radius:20px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:600; cursor:pointer; font-size:0.85rem; }
        .rekap-tab.active { background:var(--primary); color:white; border-color:var(--primary); }
        .rekap-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        .rekap-table th { background:#1e3a5f; color:white; padding:10px 8px; text-align:left; }
        .rekap-table td { padding:9px 8px; border-bottom:1px solid #e2e8f0; }
        .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
        .stat-box { background:#f0f4ff; border-radius:14px; padding:14px; text-align:center; }
        .stat-box .val { font-size:1.8rem; font-weight:800; color:var(--primary); }
        .stat-box .lbl { font-size:0.75rem; color:#64748b; }
        .stat-box.out { background:#fff0f0; } .stat-box.out .val { color:var(--danger); }
        .section-badge { background:#dbeafe; color:#1d4ed8; border-radius:20px; padding:2px 8px; font-size:0.75rem; font-weight:600; margin:2px; display:inline-block; }
        .filter-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
        .filter-row select { width:auto; padding:8px 12px; font-size:0.85rem; }
        .reset-btn { background:#fee2e2; color:#ef4444; border:2px solid #ef4444; padding:10px 20px; border-radius:14px; cursor:pointer; font-weight:600; margin-top:20px; width:100%; }
        .google-btn { background:#fff; color:#333; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border-radius:12px; cursor:pointer; font-weight:500; margin-top:10px; width:100%; }
        .fp-room { border:3px solid #1e293b; border-radius:10px; padding:10px; overflow-x:auto; }
        .fp-room-title { font-weight:800; font-size:0.95rem; color:#1e293b; margin-bottom:10px; text-align:center; }
        .fp-legend { display:flex; gap:16px; flex-wrap:wrap; padding:8px 4px; font-size:0.8rem; font-weight:600; margin-top:10px; }
        .baris-box { width:110px; height:175px; background:#fde68a; border:2.5px solid #d97706; border-radius:10px; padding:5px; display:flex; flex-direction:column; flex-shrink:0; }
        .baris-box-lbl { font-size:0.6rem; font-weight:800; color:#92400e; text-align:center; line-height:1.2; margin-bottom:3px; white-space:nowrap; overflow:hidden; }
        .baris-slots { display:flex; flex-direction:column-reverse; gap:1px; flex:1; min-height:0; }
        .basket-slot { flex:1; min-height:0; border-radius:5px; background:#fff; border:1.5px solid #cbd5e1; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; transition:transform 0.1s; overflow:hidden; }
        .basket-slot:active { transform:scale(0.95); }
        .basket-slot.green { border-color:var(--success); background:#ecfdf5; }
        .basket-slot.yellow { border-color:#f59e0b; background:#fffbeb; animation:softPulseYellow 1.8s infinite; }
        .basket-slot.red { border-color:var(--danger); background:#fef2f2; animation:strongPulse 0.9s infinite; }
        .basket-slot.slot-empty { background:#f8fafc; border:1.5px dashed #d1d5db; cursor:default; }
        .slot-num { font-weight:800; font-size:0.6rem; line-height:1; color:#1e293b; }
        .slot-count { font-size:0.5rem; color:#64748b; }
        .baris-box.stock-box { background:#e0e7ff; border-color:#6366f1; justify-content:center; align-items:center; gap:4px; width:110px; height:175px; }
        .baris-box.stock-box .baris-box-lbl { color:#4338ca; font-size:0.58rem; white-space:normal; text-align:center; line-height:1.3; margin:0; }
        .stock-icon { font-size:1.8rem; }
        .spacer { min-height:40px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#c8d3df; font-size:0.75rem; flex:1; }
        .spacer-box { width:110px; height:175px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#c8d3df; font-size:0.85rem; flex-shrink:0; }
        .chl-plan { display:flex; flex-direction:column; gap:8px; min-width:840px; }
        .chl-top { display:flex; gap:8px; align-items:flex-start; }
        .chl-space { min-height:80px; background:rgba(255,255,255,0.4); border:1px dashed #d1d5db; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#c8d3df; font-size:0.75rem; }
        .chl-bot { display:flex; gap:8px; flex-wrap:wrap; }
        .move-form { background:#f8fafc; border:1px solid #cbd5e1; border-radius:10px; padding:8px; margin-top:6px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
        .move-form select { width:auto; padding:6px; }
        .history-item { display:flex; align-items:flex-start; gap:10px; padding:12px; border-radius:12px; margin-bottom:6px; font-size:0.85rem; }
        .history-item.type-in { background:#ecfdf5; border-left:6px solid var(--in-color); }
        .history-item.type-out { background:#fef2f2; border-left:6px solid var(--out-color); }
        .history-item.type-move { background:#f5f3ff; border-left:6px solid var(--move-color); }
        .history-item.type-edit { background:#fffbeb; border-left:6px solid var(--warning); }
        .history-badge { display:inline-block; padding:3px 8px; border-radius:12px; font-weight:700; font-size:0.7rem; letter-spacing:0.5px; }
        .badge-in { background:#d1fae5; color:#065f46; } .badge-out { background:#fee2e2; color:#991b1b; }
        .badge-move { background:#ede9fe; color:#5b21b6; } .badge-edit { background:#fef3c7; color:#92400e; }
        .search-container { background:white; border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
        .search-input-wrapper { position:relative; margin-bottom:16px; }
        .search-input-wrapper input { padding-right:50px; font-size:1rem; }
        .search-input-wrapper .search-icon { position:absolute; right:12px; top:50%; transform:translateY(-50%); color:#64748b; cursor:pointer; font-size:1.2rem; }
        .search-result-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:12px; margin-bottom:8px; transition:all 0.2s; }
        .search-result-item:hover { border-color:var(--primary); box-shadow:0 2px 8px rgba(37,99,235,0.1); }
        .search-result-item.current { border-left:4px solid var(--success); background:#f0fdf4; }
        .search-result-item.out { border-left:4px solid var(--danger); background:#fef2f2; opacity:0.8; }
        .search-result-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
        .search-result-badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:700; }
        .badge-current { background:#d1fae5; color:#065f46; }
        .search-highlight { background:#fef3c7; padding:1px 3px; border-radius:3px; font-weight:600; }
        .search-stats { display:flex; gap:16px; margin-bottom:16px; padding:12px; background:#f0f4ff; border-radius:12px; }
        .search-stat { text-align:center; flex:1; } .search-stat .count { font-size:1.5rem; font-weight:800; color:var(--primary); }
        .search-stat .label { font-size:0.7rem; color:#64748b; }
        .area-badge { display:inline-block; padding:2px 8px; border-radius:8px; font-size:0.7rem; font-weight:600; margin-right:4px; }
        .area-frozen { background:#dbeafe; color:#1e40af; } .area-chiller { background:#d1fae5; color:#065f46; }
        @keyframes softPulseYellow { 0%{box-shadow:0 0 0 0 rgba(245,158,11,0.3)} 50%{box-shadow:0 0 0 5px rgba(245,158,11,0.15)} 100%{box-shadow:0 0 0 0 rgba(245,158,11,0.3)} }
        @keyframes strongPulse { 0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 0 7px rgba(239,68,68,0.15)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        .input-warning { border-color:#ef4444 !important; background:#fef2f2 !important; animation:shake 0.5s; }
        .input-success { border-color:#10b981 !important; background:#f0fdf4 !important; }
        .warning-message { color:#ef4444; font-size:0.75rem; margin-top:4px; font-weight:600; display:flex; align-items:center; gap:4px; }
        .success-message { color:#10b981; font-size:0.75rem; margin-top:4px; font-weight:600; display:flex; align-items:center; gap:4px; }
        .item-actions { display:flex; gap:4px; align-items:center; }
        .action-btn { width:32px; height:32px; border-radius:8px; border:1px solid #cbd5e1; background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; position:relative; }
        .action-btn:hover { transform:scale(1.1); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        .action-btn.move-btn { color:#8b5cf6; } .action-btn.move-btn:hover { background:#f5f3ff; border-color:#8b5cf6; }
        .action-btn.edit-btn { color:#f59e0b; } .action-btn.edit-btn:hover { background:#fffbeb; border-color:#f59e0b; }
        .action-btn.out-btn { color:#ef4444; } .action-btn.out-btn:hover { background:#fef2f2; border-color:#ef4444; }
        .action-btn::after { content:attr(data-tooltip); position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:4px 8px; border-radius:4px; font-size:0.65rem; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.2s; margin-bottom:4px; }
        .action-btn:hover::after { opacity:1; }
        .basket-move-btn { background:linear-gradient(135deg, #8b5cf6, #7c3aed); color:white; border:none; padding:8px 16px; border-radius:12px; cursor:pointer; font-weight:600; font-size:0.85rem; display:flex; align-items:center; gap:6px; transition:all 0.2s; box-shadow:0 2px 8px rgba(139,92,246,0.3); }
        .basket-move-btn:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(139,92,246,0.4); }
        .move-type-badge { display:inline-block; padding:2px 8px; border-radius:8px; font-size:0.7rem; font-weight:700; margin-left:6px; }
        .move-type-badge.basket-move { background:#ede9fe; color:#5b21b6; }
        .move-type-badge.item-move { background:#f5f3ff; color:#7c3aed; }
        .slot-status-icons { position:absolute; top:2px; right:2px; display:flex; flex-direction:row-reverse; gap:1px; z-index:5; }
        .status-icon { width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.4rem; color:white; box-shadow:0 1px 2px rgba(0,0,0,0.3); }
        .status-icon.full { background:rgba(245,158,11,0.9); border:1.5px solid #d97706; }
        .status-icon.expired { background:rgba(239,68,68,0.9); border:1.5px solid #dc2626; }
        .status-icon.est-lewat { background:rgba(249,115,22,0.9); border:1.5px solid #ea580c; }
    </style>
</head>
<body>
    <div id="loginScreen" class="container" style="max-width:400px;margin-top:40px;">
        <div class="card" style="text-align:center">
            <h2>🔐 Masuk Walk-in</h2>
            <p style="color:#64748b;margin-bottom:16px;">Gunakan email hokben</p>
            <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Masuk</button>
            <button class="google-btn" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Login dengan Google</button>
            <p id="loginError" style="color:red;margin-top:10px;"></p>
        </div>
    </div>
    <div id="appScreen" style="display:none;width:100%;">
        <div class="header">
            <h2>🧊 Walk-in <span id="areaTitle">Frozen</span></h2>
            <div class="area-selector"><span style="color:white;">Area:</span><select id="areaSelect" onchange="switchArea()"><option value="frozen">❄️ Frozen</option><option value="chiller">🌡️ Chiller</option></select></div>
            <div class="user-row"><span id="currentUserName" style="font-size:0.8rem;color:white;"></span><button class="btn-outline" style="color:white;border-color:white;padding:4px 10px;" onclick="logout()">Keluar</button></div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="dashboard">🗺️ Denah</button>
            <button class="tab-btn" data-tab="in">📥 Masuk</button>
            <button class="tab-btn" data-tab="search">🔍 Cari</button>
            <button class="tab-btn" data-tab="history">📋 Riwayat</button>
            <button class="tab-btn" data-tab="rekap">📊 Rekap</button>
            <button class="tab-btn" data-tab="manage">⚙️ Atur</button>
        </div>
        <div class="container" id="appContainer"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ==================== FIREBASE INIT ====================
        const firebaseConfig = { apiKey: "AIzaSyA1K3kQ93LSz1yKpBa2cMCRD045alTm6cs", authDomain: "walk-in-web.firebaseapp.com", projectId: "walk-in-web", storageBucket: "walk-in-web.firebasestorage.app", messagingSenderId: "42449089338", appId: "1:42449089338:web:a34b589a7c746b8dcc1603" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== GLOBAL STATE ====================
        let currentArea = 'frozen';
        let appData = { frozen: { sections: {}, baskets: {}, transactions: [] }, chiller: { sections: {}, baskets: {}, transactions: [] } };
        let currentTab = 'dashboard';
        let rekapMode = 'bulanan';
        let unsubscribe = null;
        const ADMIN_EMAILS = ['slardar.men@gmail.com'];
        const container = document.getElementById('appContainer');
        const BASKET_CAPACITY = { DEFAULT: 5, MIXED_WITH_TH: 3, TH_ONLY: 3 };

        function getBasketCapacity(no) { const items = currentBaskets()[no]?.items || []; if (items.length === 0) return BASKET_CAPACITY.DEFAULT; return items.some(i => i.jenis === 'TH') ? BASKET_CAPACITY.MIXED_WITH_TH : BASKET_CAPACITY.DEFAULT; }
        function isBasketFull(no) { return (currentBaskets()[no]?.items || []).length >= getBasketCapacity(no); }

        // ==================== DEFAULT DENAH ====================
        const defaultFrozenSections = { 'IMP': { A:[null,null,null,null,null], B:[null,null,null,null,null], C:[null,null,null,null,null], D:[null,null,null,null,null], E:[null,null,null,null,null] }, 'RTL': { A:[null,null,null,null,null], B:[null,null,null,null,null], C:[null,null,null,null,null] }, 'NPL': { A:[null,null,null,null,null], B:[null,null,null,null,null], C:[null,null,null,null,null] }, 'RDQ': { A:[null,null,null,null,null] }, 'MTPP': { A:[null,null,null,null,null], B:[null,null,null,null,null] }, 'MI': { A:[null,null,null,null,null], B:[null,null,null,null,null], C:[null,null,null,null,null] } };
        const defaultChillerSections = { 'IMP': { A:[null,null,null,null,null] }, 'RTL': { A:[null,null,null,null,null] }, 'NPL': { A:[null,null,null,null,null] }, 'MTPP': { A:[null,null,null,null,null] }, 'RDQ': { A:[null,null,null,null,null] }, 'MI': { A:[null,null,null,null,null] }, 'THAWING': { A:[null,null,null,null,null], B:[null,null,null,null,null] } };

        function getDefaultSections(area) { return area==='frozen'?JSON.parse(JSON.stringify(defaultFrozenSections)):JSON.parse(JSON.stringify(defaultChillerSections)); }
        function upgradeBarisToSlots(b) { if(!b||!Array.isArray(b))return[null,null,null,null,null]; const s=[null,null,null,null,null]; b.forEach((n,i)=>{if(i<5&&n!==null&&n!==undefined)s[i]=n;}); return s; }
        function convertSectionsToSlotFormat(sec) { const o={}; for(const[k,v]of Object.entries(sec)){ const c={}; for(const[b,val]of Object.entries(v)){ c[b]=(Array.isArray(val)&&val.length===5&&val.every(x=>x===null||typeof x==='number'))?val:upgradeBarisToSlots(val); } o[k]=c; } return o; }

        // ==================== AUTH ====================
        function login() { const e=document.getElementById('loginEmail').value.trim(), p=document.getElementById('loginPassword').value.trim(); if(!e||!p){document.getElementById('loginError').textContent='Isi email dan password.';return;} auth.signInWithEmailAndPassword(e,p).catch(err=>{document.getElementById('loginError').textContent='Gagal: '+err.message;}); }
        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err=>{document.getElementById('loginError').textContent='Google login gagal: '+err.message;}); }
        function logout() { auth.signOut(); }
        auth.onAuthStateChanged(user => { if(user){ document.getElementById('loginScreen').style.display='none'; document.getElementById('appScreen').style.display='block'; document.getElementById('currentUserName').textContent=user.email; listenToFirestore(); } else { document.getElementById('loginScreen').style.display='block'; document.getElementById('appScreen').style.display='none'; if(unsubscribe)unsubscribe(); } });

        // ==================== FIRESTORE ====================
        function listenToFirestore() { if(unsubscribe)unsubscribe(); unsubscribe=db.collection('shared').doc('data').onSnapshot(doc=>{ if(doc.exists){ const d=doc.data(); let f=d.frozen||{sections:getDefaultSections('frozen'),baskets:{},transactions:[]}; let c=d.chiller||{sections:getDefaultSections('chiller'),baskets:{},transactions:[]}; f.sections=convertSectionsToSlotFormat(f.sections||{}); c.sections=convertSectionsToSlotFormat(c.sections||{}); appData.frozen=f; appData.chiller=c; syncBasketsWithSections('frozen'); syncBasketsWithSections('chiller'); if(!d.frozen)saveToFirestore(); renderCurrentTab(); } else { appData.frozen={sections:getDefaultSections('frozen'),baskets:{},transactions:[]}; appData.chiller={sections:getDefaultSections('chiller'),baskets:{},transactions:[]}; syncBasketsWithSections('frozen'); syncBasketsWithSections('chiller'); saveToFirestore(); renderCurrentTab(); } }); }
        function saveToFirestore() { db.collection('shared').doc('data').set({frozen:appData.frozen,chiller:appData.chiller},{merge:true}).catch(e=>{console.error(e);showToast('❌ Gagal menyimpan!');}); }
        function syncBasketsWithSections(area) { const sec=appData[area].sections, bsk=appData[area].baskets, vn=new Set(); for(const bo of Object.values(sec))for(const sl of Object.values(bo))sl.forEach(n=>{if(n!==null)vn.add(n);}); for(const n of Object.keys(bsk))if(!vn.has(Number(n)))delete bsk[n]; for(const[sk,bo]of Object.entries(sec))for(const[br,sl]of Object.entries(bo))sl.forEach((n,i)=>{if(n===null)return; if(!bsk[n])bsk[n]={section:sk,baris:br,slot:i+1,items:[]};else{bsk[n].section=sk;bsk[n].baris=br;bsk[n].slot=i+1;}}); }

        function logTransaction(type,detail){currentTransactions().unshift({id:Date.now(),timestamp:new Date().toISOString(),type,detail,user:auth.currentUser?.email||'unknown'});if(currentTransactions().length>500)currentTransactions().pop();saveToFirestore();}

        function renderCurrentTab(){try{switch(currentTab){case'dashboard':renderDashboard();break;case'in':renderInputForm();break;case'search':renderSearch();break;case'history':renderHistory();break;case'rekap':renderRekap();break;case'manage':renderManageBaskets();break;}}catch(e){console.error(e);container.innerHTML='<div class="card"><div class="empty-state">Error. Refresh halaman.</div></div>';}}

        // ==================== FEFO ====================
        function cekFEFO(no,idx){const items=currentBaskets()[no]?.items||[],sel=items[idx];if(!sel||!sel.expDate)return true;const se=new Date(sel.expDate).getTime(),now=Date.now();const ea=items.filter((it,i)=>i!==idx&&it.expDate).filter(it=>new Date(it.expDate).getTime()<se&&new Date(it.expDate).getTime()>now).sort((a,b)=>new Date(a.expDate)-new Date(b.expDate));if(ea.length>0){showToast(`⚠️ FEFO: "${ea[0].nama}" expired ${new Date(ea[0].expDate).toLocaleDateString('id-ID')} lebih dulu!`);return false;}return true;}

        // ==================== UI BUILDERS ====================
        function buildBasketSlot(no,si){if(no===null)return'<div class="basket-slot slot-empty"></div>';const c=itemCount(no),items=currentBaskets()[no]?.items||[],now=new Date(),cap=getBasketCapacity(no),f=c>=cap,he=items.some(i=>i.expDate&&new Date(i.expDate)<now),hl=items.some(i=>i.estOutDate&&new Date(i.estOutDate)<now);let cls='basket-slot';if(he||hl)cls+=' red';else if(f)cls+=' yellow';else if(c>0)cls+=' green';else cls+=' slot-empty';let ics=[];if(f)ics.push('<span class="status-icon full" title="Penuh"><i class="fas fa-ban"></i></span>');if(he)ics.push('<span class="status-icon expired" title="EXPIRED"><i class="fas fa-skull"></i></span>');if(hl)ics.push('<span class="status-icon est-lewat" title="EST LEWAT"><i class="fas fa-hourglass-end"></i></span>');const sii=ics.length>0?`<div class="slot-status-icons">${ics.join('')}</div>`:'';let tp=[`Keranjang ${no} — ${c}/${cap}`];if(f)tp.push('🚫 PENUH');if(he)tp.push('☠️ EXPIRED');if(hl)tp.push('⏳ EST LEWAT');return`<div class="${cls}" onclick="showBasketDetail(${no})" title="${tp.join(' | ')}">${sii}<span class="slot-num">${no}</span><span class="slot-count">${c}/${cap}</span></div>`;}
        function buildBarisBox(sn,bk,sl){const bo=['A','B','C','D','E'],bn=bo.indexOf(bk)+1,n=String(bn).padStart(2,'0'),l=`${sn} ${n}`;let se='';for(let i=0;i<5;i++)se+=buildBasketSlot(sl[i],i);return`<div class="baris-box"><div class="baris-box-lbl">${l}</div><div class="baris-slots">${se}</div></div>`;}
        function getSingleBarisBox(sn,b){return buildBarisBox(sn,b,currentSections()[sn]?.[b]||[null,null,null,null,null]);}
        function getSecBoxes(sn){const bo=currentSections()[sn]||{};return Object.keys(bo).sort().map(k=>buildBarisBox(sn,k,bo[k])).join('');}
        function getAreaStats(){const bsk=currentBaskets();let ti=0,te=0,tl=0,tp=0;for(const[n,b]of Object.entries(bsk)){const it=b.items||[];ti+=it.length;if(it.length>=getBasketCapacity(n))tp++;it.forEach(i=>{if(i.expDate&&new Date(i.expDate)<new Date())te++;if(i.estOutDate&&new Date(i.estOutDate)<new Date())tl++;});}return{totalItems:ti,totalExpired:te,totalEstLewat:tl,totalPenuh:tp};}

        function renderDashboard(){if(currentArea==='frozen')renderFrozenPlan();else renderChillerPlan();}
        function renderFrozenPlan(){const s=getAreaStats(),ab=isAdmin()?`<button class="reset-btn" onclick="resetAllData()"><i class="fas fa-exclamation-triangle"></i> 🗑️ Hapus Semua Data</button>`:'';container.innerHTML=`<div class="card" style="padding:12px;"><div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;"><span style="background:#dbeafe;padding:4px 12px;border-radius:20px;font-size:0.75rem;">📦 ${s.totalItems} item</span><span style="background:${s.totalExpired>0?'#fee2e2':'#f0fdf4'};padding:4px 12px;border-radius:20px;font-size:0.75rem;">☠️ ${s.totalExpired} expired</span><span style="background:${s.totalEstLewat>0?'#fff7ed':'#f0fdf4'};padding:4px 12px;border-radius:20px;font-size:0.75rem;">⏳ ${s.totalEstLewat} est lewat</span>${s.totalPenuh>0?`<span style="background:#fffbeb;padding:4px 12px;border-radius:20px;font-size:0.75rem;">🚫 ${s.totalPenuh} keranjang penuh</span>`:''}</div><div class="fp-room-title">❄️ Denah Walk-in Frozen</div><div class="fp-room" style="background:#e8f4f8;"><div style="display:grid;grid-template-columns:110px 110px 110px 110px 110px;gap:8px;width:fit-content;margin:0 auto;">${getSingleBarisBox('IMP','A')}${getSingleBarisBox('IMP','B')}${getSingleBarisBox('IMP','C')}${getSingleBarisBox('IMP','D')}${getSingleBarisBox('IMP','E')}<div style="grid-column:1/6;height:40px;" class="spacer">— Area Kosong —</div>${getSingleBarisBox('RTL','A')}${getSingleBarisBox('RTL','B')}${getSingleBarisBox('RTL','C')}<div class="spacer-box">Area Kosong</div>${getSingleBarisBox('MI','A')}${getSingleBarisBox('NPL','A')}${getSingleBarisBox('NPL','B')}${getSingleBarisBox('NPL','C')}<div class="spacer-box">Area Kosong</div>${getSingleBarisBox('MI','B')}<div style="grid-column:1/6;height:40px;" class="spacer">— Area Kosong —</div>${getSingleBarisBox('RDQ','A')}${getSingleBarisBox('MTPP','A')}${getSingleBarisBox('MTPP','B')}<div class="spacer-box">Area Kosong</div>${getSingleBarisBox('MI','C')}</div></div><div class="fp-legend"><span><i class="fa         function renderChillerPlan(){const s=getAreaStats(),sb='<div class="baris-box stock-box"><div class="baris-box-lbl">📦 Stock<br>Keranjang</div><div class="stock-icon">🧺</div></div>',ab=isAdmin()?`<button class="reset-btn" onclick="resetAllData()"><i class="fas fa-exclamation-triangle"></i> 🗑️ Hapus Semua Data</button>`:'',bts=['IMP','RTL','NPL','MTPP','RDQ','MI'];container.innerHTML=`<div class="card" style="padding:12px;"><div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;"><span style="background:#dbeafe;padding:4px 12px;border-radius:20px;font-size:0.75rem;">📦 ${s.totalItems} item</span><span style="background:${s.totalExpired>0?'#fee2e2':'#f0fdf4'};padding:4px 12px;border-radius:20px;font-size:0.75rem;">☠️ ${s.totalExpired} expired</span><span style="background:${s.totalEstLewat>0?'#fff7ed':'#f0fdf4'};padding:4px 12px;border-radius:20px;font-size:0.75rem;">⏳ ${s.totalEstLewat} est lewat</span>${s.totalPenuh>0?`<span style="background:#fffbeb;padding:4px 12px;border-radius:20px;font-size:0.75rem;">🚫 ${s.totalPenuh} keranjang penuh</span>`:''}</div><div class="fp-room-title">🌡️ Denah Walk-in Chiller</div><div class="fp-room" style="background:#f0fdf4;"><div class="chl-plan"><div class="chl-top">${sb}${getSecBoxes('THAWING')}</div><div class="chl-space">— Area Kosong —</div><div class="chl-bot">${bts.map(s=>getSecBoxes(s)).join('')}</div></div></div><div class="fp-legend"><span><i class="fas fa-circle" style="color:#10b981;font-size:0.7rem;"></i> Tersedia</span><span><span class="status-icon full" style="display:inline-flex;position:static;width:12px;height:12px;margin-right:4px;"><i class="fas fa-ban" style="font-size:0.35rem;"></i></span> Penuh</span><span><span class="status-icon expired" style="display:inline-flex;position:static;width:12px;height:12px;margin-right:4px;"><i class="fas fa-skull" style="font-size:0.35rem;"></i></span> Expired</span><span><span class="status-icon est-lewat" style="display:inline-flex;position:static;width:12         // ==================== BASKET DETAIL ====================
        function showBasketDetail(no,mi=null){const b=currentBaskets()[no],c=itemCount(no),cap=getBasketCapacity(no),now=new Date();let ih=b&&b.items.length?b.items.map((it,idx)=>{let cls='',lbl='';if(it.expDate&&new Date(it.expDate)<now){cls='expired';lbl=' ⚠️ EXP';}else if(it.estOutDate&&new Date(it.estOutDate)<now){cls='expired';lbl=' ⚠️ EST LEWAT';}const mf=(mi===idx)?renderMoveForm(no,idx):'';const ui=it.addedBy?`<br><small style="color:#64748b;">👤 Ditambah: ${it.addedBy} | ${it.tglMasuk?new Date(it.tglMasuk).toLocaleDateString('id-ID'):'-'}</small>`:`<br><small style="color:#64748b;">📅 Masuk: ${it.tglMasuk?new Date(it.tglMasuk).toLocaleDateString('id-ID'):'-'}</small>`;const mh=it.moveHistory&&it.moveHistory.length>0?`<br><small style="color:#8b5cf6;">🔄 Riwayat Pindah: ${it.moveHistory.map(m=>`${m.user||'?'} (${new Date(m.timestamp).toLocaleDateString('id-ID')})`).join(' → ')}</small>`:'';return`<div class="item-row ${cls}"><div style="flex:1;"><strong>${it.nama}</strong> <span style="font-size:1rem;font-weight:700;color:var(--primary);">(${it.qty})</span>${lbl}<br><small>${it.jenis||''} | Exp: ${it.expDate?new Date(it.expDate).toLocaleDateString('id-ID'):'-'}${it.estOutDate?' | Est.Keluar: '+new Date(it.estOutDate).toLocaleDateString('id-ID'):''}</small>${ui}${mh}</div><div class="item-actions"><button class="action-btn move-btn" data-tooltip="Pindah Barang" onclick="event.stopPropagation();showBasketDetail(${no},${idx})"><i class="fas fa-exchange-alt"></i></button><button class="action-btn edit-btn" data-tooltip="Edit Est. Keluar" onclick="event.stopPropagation();editEstOutDate(${no},${idx})"><i class="fas fa-calendar-alt"></i></button><button class="action-btn out-btn" data-tooltip="Keluarkan Barang" onclick="keluarkanItem(${no},${idx})"><i class="fas fa-sign-out-alt"></i></button></div>${mf}</div>`;}).join(''):'<div class="empty-state">Keranjang kosong</div>';container.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div><h3 style="display:inline;">🧺 Keranjang ${no}</h3>${b?`<span style="font-size:0.8rem;color:#64748b;margin-left:8px;">📍 ${b.section} Baris ${b.baris} Slot ${b.slot}</span>`:''}</div><div style="display:flex;gap:8px;"><button class="btn btn-outline btn-sm" onclick="renderDashboard()"><i class="fas fa-arrow-left"></i> Denah</button><button class="btn btn-sm" style="background:#10b981;color:white;" onclick="quickAddToBasket(${no})"><i class="fas fa-plus"></i> Tambah Barang</button><button class="basket-move-btn" onclick="showMoveBasketForm(${no})"><i class="fas fa-truck"></i> Pindah Keranjang</button></div></div>${b?.lastModifiedBy?`<div style="background:#f0f4ff;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.75rem;color:#475569;">👤 Terakhir diubah: <strong>${b.lastModifiedBy}</strong> pada ${b.lastModifiedAt?new Date(b.lastModifiedAt).toLocaleString('id-ID'):'-'}</div>`:''}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><p style="margin:0;">Total item: <strong>${c}/${cap}</strong></p><div style="display:flex;gap:12px;font-size:0.7rem;color:#64748b;"><span><i class="fas fa-exchange-alt" style="color:#8b5cf6;"></i> Pindah</span><span><i class="fas fa-calendar-alt" style="color:#f59e0b;"></i> Est</span><span><i class="fas fa-sign-out-alt" style="color:#ef4444;"></i> Keluar</span></div></div>${ih}</div>`;}

        // ==================== QUICK ADD ====================
        function quickAddToBasket(no){const b=currentBaskets()[no];if(!b)return showToast('Keranjang tidak ditemukan!');if(isBasketFull(no))return showToast(`❌ Keranjang ${no} sudah penuh!`);window._quickAddTarget={no,section:b.section,baris:b.baris,slot:b.slot};currentTab='in';document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));const t=document.querySelector('.tab-btn[data-tab="in"]');if(t)t.classList.add('active');renderQuickAddForm();}
        function renderQuickAddForm(){const t=window._quickAddTarget;if(!t)return renderInputForm();container.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h3>📥 Tambah Barang ke Keranjang ${t.no}</h3><button class="btn btn-outline btn-sm" onclick="showBasketDetail(${t.no})">← Kembali</button></div><div style="background:#ecfdf5;border:1px solid #10b981;border-radius:8px;padding:12px;margin-bottom:16px;"><strong>📍 Tujuan:</strong> ${t.section} Baris ${t.baris} Slot ${t.slot} (Keranjang ${t.no})<br>Terisi: <strong>${itemCount(t.no)}/${getBasketCapacity(t.no)}</strong></div><form id="inForm" onsubmit="submitQuickAdd(event)"><div class="form-group"><label>Nama Barang</label><input type="text" id="inNama" list="namaList" required><datalist id="namaList"></datalist></div><div class="form-group"><label>Jumlah</label><input type="text" id="inQty" placeholder="Contoh: 5 Pack" required pattern="[0-9].*"></div><div class="form-group"><label>Jenis</label><select id="inJenis"><option value="IIP">IIP</option><option value="RM">RM</option><option value="TH">TH</option></select></div><div class="form-group"><label>Tanggal Exp (wajib)</label><input type="date" id="inExpDate" required onchange="validateQuickEstOut()"></div><div class="form-group"><label>Estimasi Keluar (wajib)</label><input type="date" id="inEstOutDate" required onchange="validateQuickEstOut()"><small id="estOutWarning" style="display:block;margin-top:4px;"></small></div><input type="hidden" id="inSection" value="${t.section}"><input type="hidden" id="inBaris" value="${t.baris}"><input type="hidden" id="inSlot" value="${t.slot}"><input type="hidden" id="inKeranjangManual" value="${t.no}"><button type="submit" class="btn btn-primary" style="width:100%;background:#10b981;"><i class="fas fa-plus"></i> Tambah ke Keranjang ${t.no}</button></form></div>`;updateNamaDatalist();}
        function validateQuickEstOut(){const ed=document.getElementById('inExpDate')?.value,eo=document.getElementById('inEstOutDate')?.value,ei=document.getElementById('inEstOutDate'),w=document.getElementById('estOutWarning');if(!ed||!eo||!w)return;if(new Date(eo)>new Date(ed)){w.innerHTML='❌ Tidak boleh lebih dari Tanggal Exp!';w.style.color='#ef4444';ei.style.borderColor='#ef4444';}else{w.innerHTML='✅ Valid';w.style.color='#10b981';ei.style.borderColor='#10b981';}}
        function submitQuickAdd(e){e.preventDefault();const t=window._quickAddTarget;if(!t)return showToast('Data keranjang hilang.');if(isBasketFull(t.no))return showToast(`❌ Keranjang ${t.no} sudah penuh!`);const b=currentBaskets()[t.no];if(!b)return showToast('❌ Keranjang tidak ditemukan.');if(b.section!==t.section||b.baris!==t.baris||b.slot!==t.slot)return showToast('⚠️ Lokasi keranjang sudah berubah. Refresh.');const nama=document.getElementById('inNama').value.trim(),qty=document.getElementById('inQty').value.trim(),jenis=document.getElementById('inJenis').value,expDate=document.getElementById('inExpDate').value,estOutDate=document.getElementById('inEstOutDate').value;if(!nama||!qty)return showToast('Lengkapi data!');if(!expDate||!estOutDate)return showToast('Tanggal Exp dan Estimasi Keluar wajib!');if(new Date(estOutDate)>new Date(expDate))return showToast('❌ Est Keluar tidak boleh > Exp!');if(jenis==='TH'&&b.items.some(i=>i.jenis!=='TH'))return showToast('❌ TH tidak bisa dicampur!');if(jenis!=='TH'&&b.items.some(i=>i.jenis==='TH'))return showToast('❌ Tidak bisa dicampur dengan TH!');const cu=auth.currentUser?.email||'unknown';const item={nama,qty,jenis,tglMasuk:new Date().toISOString(),addedBy:cu};if(expDate)item.expDate=expDate;if(estOutDate)item.estOutDate=estOutDate;b.items.push(item);b.lastModifiedBy=cu;b.lastModifiedAt=new Date().toISOString();logTransaction('in',{nama,qty,jenis,keranjang:t.no,section:t.section,baris:t.baris,expDate,estOutDate});saveToFirestore();showToast(`✅ ${nama} ditambahkan ke keranjang ${t.no}`);setTimeout(()=>showBasketDetail(t.no),300);}

        // ==================== EDIT EST ====================
        function editEstOutDate(no,idx){const b=currentBaskets()[no];if(!b||!b.items[idx])return;const it=b.items[idx],ed=it.expDate?new Date(it.expDate):null,ce=it.estOutDate?new Date(it.estOutDate).toISOString().split('T')[0]:'';const ns=prompt(`Edit Estimasi Keluar untuk "${it.nama}"\nTanggal Exp: ${ed?ed.toLocaleDateString('id-ID'):'-'}\nMasukkan tanggal (YYYY-MM-DD):`,ce);if(ns===null)return;if(!/^\d{4}-\d{2}-\d{2}$/.test(ns))return showToast('Format tidak valid.');const nd=new Date(ns);if(isNaN(nd.getTime()))return showToast('Tanggal tidak valid.');if(ed&&nd>ed)return showToast(`❌ Tidak boleh > Exp (${ed.toISOString().split('T')[0]}).`);it.estOutDate=ns;logTransaction('edit',{nama:it.nama,qty:it.qty,jenis:it.jenis,keranjang:no,section:b.section,oldEstOutDate:ce,newEstOutDate:ns});saveToFirestore();showToast('✅ Estimasi keluar diperbarui.');showBasketDetail(no);}

        // ==================== MOVE ITEM ====================
        function renderMoveForm(fn,fi){const ss=Object.keys(currentSections()),so=ss.map(s=>`<option value="${s}">${s}</option>`).join(''),it=currentBaskets()[fn]?.items[fi];return`<div class="move-form" onclick="event.stopPropagation();"><div style="width:100%;"><div style="background:#f5f3ff;border-radius:8px;padding:8px 12px;margin-bottom:8px;"><strong style="color:#5b21b6;">🔄 Pindah: ${it?.nama||''}</strong></div><select id="moveSection" onchange="updateMoveBaris()" style="width:100%;margin-bottom:6px;"><option value="">-- Section --</option>${so}</select><select id="moveBaris" onchange="updateMoveKeranjang()" style="width:100%;margin-bottom:6px;"><option value="">-- Baris --</option></select><select id="moveKeranjang" style="width:100%;margin-bottom:6px;"><option value="">-- Pilih Keranjang --</option></select><input type="number" id="moveKeranjangBaru" placeholder="Atau nomor baru" min="1" style="width:100%;margin-bottom:6px;" oninput="validateMoveKeranjangBaru()"><small id="moveKeranjangWarning" style="display:block;margin-bottom:6px;"></small><button class="btn btn-sm btn-primary" style="width:100%;" onclick="pindahkanItem(${fn},${fi})"><i class="fas fa-exchange-alt"></i> Pindahkan</button><button class="btn btn-sm btn-outline" style="width:100%;margin-top:4px;" onclick="showBasketDetail(${fn})">Batal</button></div></div>`;}
        function updateMoveBaris(){const s=document.getElementById('moveSection')?.value,bs=document.getElementById('moveBaris');if(!bs)return;bs.innerHTML='<option value="">-- Baris --</option>';if(!s)return;const bo=currentSections()[s]||{};Object.keys(bo).forEach((b,i)=>{bs.innerHTML+=`<option value="${b}">${s} ${String(i+1).padStart(2,'0')}</option>`;});updateMoveKeranjang();}

        function validateMoveKeranjangBaru(){const ip=document.getElementById('moveKeranjangBaru'),w=document.getElementById('moveKeranjangWarning'),v=parseInt(ip?.value);if(!ip||!w)return;if(!v||v<=0){w.innerHTML='';ip.style.borderColor='#cbd5e1';return;}for(const a of['frozen','chiller']){for(const[sk,bo]of Object.entries(appData[a].sections)){for(const sl of Object.values(bo)){if(sl.includes(v)){w.innerHTML=`❌ Nomor ${v} sudah digunakan`;w.style.color='#ef4444';ip.style.borderColor='#ef4444';return;}}}}w.innerHTML=`✅ Nomor ${v} tersedia`;w.style.color='#10b981';ip.style.borderColor='#10b981';}
        function pindahkanItem(fn,fi){const fb=currentBaskets()[fn];if(!fb||!fb.items[fi])return;const it=fb.items[fi];if(it.expDate&&!cekFEFO(fn,fi))return;const ts=document.getElementById('moveSection')?.value,tb=document.getElementById('moveBaris')?.value;let tn=parseInt(document.getElementById('moveKeranjang')?.value);const ti=document.getElementById('moveKeranjangBaru')?.value;if(!tn&&ti){tn=parseInt(ti);if(!tn||tn<=0)return showToast('Masukkan nomor keranjang.');for(const a of['frozen','chiller']){for(const[sk,bo]of Object.entries(appData[a].sections)){for(const sl of Object.values(bo)){if(sl.includes(tn))return showToast(`❌ Nomor ${tn} sudah digunakan.`);}}}if(ts&&tb){const tsl=currentSections()[ts]?.[tb];if(tsl){const ei=tsl.findIndex(s=>s===null);if(ei!==-1)tsl[ei]=tn;}}}if(!tn)return showToast('Pilih keranjang tujuan.');if(tn===fn)return showToast('Tidak bisa ke keranjang yang sama.');if(isBasketFull(tn))return showToast('Keranjang tujuan penuh.');const cu=auth.currentUser?.email||'unknown';it.moveHistory=it.moveHistory||[];it.moveHistory.push({from:`Keranjang ${fn}`,to:`Keranjang ${tn}`,timestamp:new Date().toISOString(),user:cu});fb.items.splice(fi,1);if(fb.items.length===0)removeEmptyBasketNumber(fn);if(!currentBaskets()[tn])currentBaskets()[tn]={section:ts||'',baris:tb||'',items:[]};currentBaskets()[tn].items.push(it);if(currentBaskets()[fn]){currentBaskets()[fn].lastModifiedBy=cu;currentBaskets()[fn].lastModifiedAt=new Date().toISOString();}if(currentBaskets()[tn]){currentBaskets()[tn].lastModifiedBy=cu;currentBaskets()[tn].lastModifiedAt=new Date().toISOString();}logTransaction('move',{nama:it.nama,qty:it.qty,jenis:it.jenis,dari:fn,ke:tn,section:ts});saveToFirestore();showToast('✅ Barang dipindahkan ke '+tn);showBasketDetail(fn);}
        function removeEmptyBasketNumber(kn){for(const a of['frozen','chiller']){const sec=appData[a].sections,bsk=appData[a].baskets;for(const[sk,bo]of Object.entries(sec)){for(const[br,sl]of Object.entries(bo)){const i=sl.indexOf(kn);if(i!==-1){sl[i]=null;if(bsk[kn])delete bsk[kn];return;}}}}}

        function keluarkanItem(no,idx){const b=currentBaskets()[no];if(!b)return;const it=b.items[idx];if(it.expDate&&!cekFEFO(no,idx))return;const qn=parseFloat(it.qty)||parseInt(it.qty)||0;if(!isNaN(qn)&&qn>1){showPartialOutDialog(no,idx,it,qn);}else{if(confirm(`Keluarkan "${it.nama}" dari keranjang ${no}?`))executeFullOut(no,idx,it);}}
        function showPartialOutDialog(no,idx,it,tq){const dh=`<div id="partialOutOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:center;justify-content:center;" onclick="closePartialOutDialog()"><div class="card" style="width:90%;max-width:400px;" onclick="event.stopPropagation();"><h3>📤 Keluarkan Sebagian</h3><div style="background:#f0f4ff;border-radius:8px;padding:12px;margin-bottom:16px;"><strong>${it.nama}</strong><br>Total: <strong>${tq}</strong></div><input type="number" id="partialOutQty" min="1" max="${tq}" placeholder="Jumlah" style="font-size:1.2rem;text-align:center;width:100%;margin-bottom:8px;" onkeypress="if(event.key==='Enter')executePartialOut(${no},${idx},'${it.nama.replace(/'/g,"\\'")}',${tq},'${it.jenis||''}')"><small id="partialOutWarning" style="display:block;margin-bottom:8px;"></small><div style="display:flex;gap:8px;"><button class="btn btn-outline" style="flex:1;" onclick="closePartialOutDialog()">Batal</button><button class="btn" style="flex:1;background:#ef4444;color:white;" onclick="executePartialOut(${no},${idx},'${it.nama.replace(/'/g,"\\'")}',${tq},'${it.jenis||''}')">Keluarkan</button></div></div></div>`;const dc=document.createElement('div');dc.id='partialOutDialog';dc.innerHTML=dh;document.body.appendChild(dc);setTimeout(()=>document.getElementById('partialOutQty')?.focus(),100);}
        function executePartialOut(no,idx,nm,tq,js){const qo=parseInt(document.getElementById('partialOutQty')?.value);if(!qo||qo<=0)return showToast('❌ Jumlah tidak valid!');if(qo>tq)return showToast(`❌ Maksimal ${tq}!`);const b=currentBaskets()[no];if(!b||!b.items[idx])return;const sisa=tq-qo;if(sisa<=0){executeFullOut(no,idx,b.items[idx]);closePartialOutDialog();return;}const cu=auth.currentUser?.email||'unknown';b.items[idx].qty=sisa.toString();b.lastModifiedBy=cu;b.lastModifiedAt=new Date().toISOString();logTransaction('out',{nama:nm,qty:`${qo} dari ${tq} (sisa ${sisa})`,jenis:js,keranjang:no,section:b.section,partial:true});saveToFirestore();closePartialOutDialog();showToast(`✅ ${qo} ${nm} dikeluarkan. Sisa: ${sisa}`);showBasketDetail(no);}

        function showMoveBasketForm(fn){const b=currentBaskets()[fn];if(!b)return;const so=Object.keys(currentSections()).map(s=>`<option value="${s}">${s}</option>`).join('');container.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><h3><i class="fas fa-truck" style="color:#8b5cf6;"></i> Pindah Keranjang ${fn}</h3><button class="btn btn-outline btn-sm" onclick="showBasketDetail(${fn})">← Kembali</button></div><p>📍 Saat ini: <strong>${b.section}</strong> Baris <strong>${b.baris}</strong> Slot <strong>${b.slot}</strong> (${b.items.length} item)</p><div class="form-group"><label>Section Tujuan</label><select id="moveBasketSection" onchange="updateMoveBasketBaris()"><option value="">-- Pilih --</option>${so}</select></div><div class="form-group"><label>Baris Tujuan</label><select id="moveBasketBaris" onchange="updateMoveBasketSlot()"><option value="">-- Pilih --</option></select></div><div class="form-group"><label>Slot Tujuan</label><select id="moveBasketSlot"><option value="">-- Pilih --</option></select></div><div id="moveBasketInfo" style="margin-bottom:16px;"></div><button class="btn" style="width:100%;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white;" onclick="executeMoveBasket(${fn})"><i class="fas fa-truck"></i> Pindahkan</button></div>`;}
        function updateMoveBasketBaris(){const s=document.getElementById('moveBasketSection')?.value,bs=document.getElementById('moveBasketBaris');if(!bs)return;bs.innerHTML='<option value="">-- Pilih --</option>';if(!s)return;Object.keys(currentSections()[s]||{}).forEach((b,i)=>{bs.innerHTML+=`<option value="${b}">${s} ${String(i+1).padStart(2,'0')}</option>`;});document.getElementById('moveBasketSlot').innerHTML='<option value="">-- Pilih --</option>';}
        function updateMoveBasketSlot(){const s=document.getElementById('moveBasketSection')?.value,b=document.getElementById('moveBasketBaris')?.value,ss=document.getElementById('moveBasketSlot');if(!ss)return;ss.innerHTML='<option value="">-- Pilih --</option>';if(!s||!b)return;const sl=currentSections()[s]?.[b]||[];for(let i=0;i<5;i++){if(sl[i]===null)ss.innerHTML+=`<option value="${i+1}">Slot ${i+1} (kosong) ✅</option>`;else ss.innerHTML+=`<option value="${i+1}" disabled>Slot ${i+1}: ${sl[i]} ❌</option>`;}}
        function executeMoveBasket(fn){const ts=document.getElementById('moveBasketSection')?.value,tb=document.getElementById('moveBasketBaris')?.value,tsl=parseInt(document.getElementById('moveBasketSlot')?.value);if(!ts||!tb||!tsl)return showToast('Lengkapi semua!');const fb=currentBaskets()[fn];if(!fb)return;if(fb.section===ts&&fb.baris===tb&&fb.slot===tsl)return showToast('Lokasi sama!');const toSl=currentSections()[ts]?.[tb];if(!toSl)return;if(toSl[tsl-1]!==null)return showToast('Slot sudah terisi!');const fs=fb.section,fbr=fb.baris,fsl=fb.slot;const frSl=currentSections()[fs]?.[fbr];if(frSl)frSl[fsl-1]=null;toSl[tsl-1]=fn;fb.section=ts;fb.baris=tb;fb.slot=tsl;logTransaction('move',{nama:`[KERANJANG ${fn}]`,qty:`${fb.items.length} item`,jenis:'KERANJANG',dari:`${fs} ${fbr} Slot ${fsl}`,ke:`${ts} ${tb} Slot ${tsl}`,keranjang:fn,section:ts});saveToFirestore();showToast(`✅ Keranjang ${fn} dipindahkan!`);setTimeout(()=>showBasketDetail(fn),500);}

        // ==================== INPUT FORM ====================
        function renderInputForm(){const so=Object.keys(currentSections()).map(s=>`<option value="${s}">${s}</option>`).join('');container.innerHTML=`<div class="card"><h3>📥 Barang Masuk</h3><form id="inForm" onsubmit="submitIn(event)"><div class="form-group"><label>Nama Barang</label><input type="text" id="inNama" list="namaList" required><datalist id="namaList"></datalist></div><div class="form-group"><label>Jumlah</label><input type="text" id="inQty" placeholder="Contoh: 1 Pack" required></div><div class="form-group"><label>Jenis</label><select id="inJenis"><option value="IIP">IIP</option><option value="RM">RM</option><option value="TH">TH</option></select></div><div class="form-group"><label>Tanggal Exp (wajib)</label><input type="date" id="inExpDate" required onchange="validateEstOutDate()"></div><div class="form-group"><label>Estimasi Keluar (wajib)</label><input type="date" id="inEstOutDate" required onchange="validateEstOutDate()"><small style="color:#64748b;">⚠️ Tidak boleh lebih dari Tanggal Exp</small></div><div class="form-group"><label>Section</label><select id="inSection" onchange="updateBarisSelect()">${so}</select></div><div class="form-group"><label>Baris</label><select id="inBaris" onchange="updateSlotSelect()"><option value="">-- Pilih --</option></select></div><div class="form-group"><label>Slot (1-5)</label><select id="inSlot" onchange="handleSlotChange()"><option value="">-- Pilih Slot --</option></select></div><div class="form-group"><label>Nomor Keranjang Baru</label><input type="number" id="inKeranjangManual" placeholder="⚠️ Pilih slot dulu" min="1"><small>Isi jika slot kosong</small></div><button type="submit" class="btn btn-primary" style="width:100%">💾 Simpan</button></form></div>`;updateBarisSelect();updateNamaDatalist();}
        function handleSlotChange(){const sl=parseInt(document.getElementById('inSlot')?.value),mi=document.getElementById('inKeranjangManual'),mg=mi?.closest('.form-group');if(!mi)return;const ew=document.getElementById('keranjangWarning');if(ew)ew.remove();mi.classList.remove('input-warning','input-success');if(!sl||isNaN(sl)){mi.disabled=true;mi.placeholder="Pilih slot dulu";return;}const s=document.getElementById('inSection')?.value,b=document.getElementById('inBaris')?.value,sls=currentSections()[s]?.[b];if(!sls)return;const no=sls[sl-1];if(no!==null&&no!==undefined){mi.disabled=true;mi.value='';mi.placeholder=`Menggunakan keranjang ${no}`;mi.classList.add('input-success');const c=itemCount(no),id=document.createElement('div');id.id='keranjangWarning';id.className='success-message';id.innerHTML=`<i class="fas fa-check-circle"></i> Keranjang ${no} tersedia (${c}/${getBasketCapacity(no)} item)`;mg?.appendChild(id);}else{mi.disabled=false;mi.placeholder="⚠️ Masukkan nomor keranjang baru (wajib)";mi.classList.add('input-warning');mi.focus();mi.oninput=function(){validateKeranjangNumber(this.value);};}}
        function validateKeranjangNumber(v){const mi=document.getElementById('inKeranjangManual'),mg=mi?.closest('.form-group'),ew=document.getElementById('keranjangWarning');if(ew)ew.remove();if(!v||isNaN(parseInt(v))||parseInt(v)<=0){mi.classList.add('input-warning');mi.classList.remove('input-success');return;}const nn=parseInt(v);let di=null;for(const a of['frozen','chiller']){const sec=appData[a].sections;for(const[sk,bo]of Object.entries(sec)){for(const[br,sl]of Object.entries(bo)){if(sl.includes(nn)){di={area:a,section:sk,baris:br,slot:sl.indexOf(nn)+1};break;}}if(di)break;}if(di)break;}if(di){mi.classList.add('input-warning');mi.classList.remove('input-success');const wd=document.createElement('div');wd.id='keranjangWarning';wd.className='warning-message';wd.innerHTML=`<i class="fas fa-exclamation-triangle"></i> ❌ Nomor ${nn} sudah digunakan di ${di.area==='frozen'?'❄️ Frozen':'🌡️ Chiller'} (${di.section} Baris ${di.baris} Slot ${di.slot})`;mg?.appendChild(wd);}else{mi.classList.add('input-success');mi.classList.remove('input-warning');const sd=document.createElement('div');sd.id='keranjangWarning';sd.className='success-message';sd.innerHTML=`<i class="fas fa-check-circle"></i> ✅ Nomor ${nn} tersedia`;mg?.appendChild(sd);}}
        function validateEstOutDate(){const ed=document.getElementById('inExpDate')?.value,eo=document.getElementById('inEstOutDate')?.value,ei=document.getElementById('inEstOutDate'),eg=ei?.closest('.form-group'),ew=document.getElementById('estOutWarning');if(ew)ew.remove();ei?.classList.remove('input-warning','input-success');if(!ed||!eo)return;const eoD=new Date(eo),edD=new Date(ed);if(eoD>edD){ei?.classList.add('input-warning');const wd=document.createElement('div');wd.id='estOutWarning';wd.className='warning-message';wd.innerHTML=`<i class="fas fa-exclamation-triangle"></i> ❌ Estimasi Keluar (${eo}) tidak boleh lebih dari Tanggal Exp (${ed})`;eg?.appendChild(wd);}else if(eoD.getTime()===edD.getTime()){ei?.classList.add('input-success');const wd=document.createElement('div');wd.id='estOutWarning';wd.className='success-message';wd.innerHTML='<i class="fas fa-info-circle"></i> ⚠️ Estimasi Keluar sama dengan Tanggal Exp';eg?.appendChild(wd);}else{ei?.classList.add('input-success');const sd=document.createElement('div');sd.id='estOutWarning';sd.className='success-message';sd.innerHTML='<i class="fas fa-check-circle"></i> ✅ Estimasi Keluar valid (sebelum Exp)';eg?.appendChild(sd);}}
        function updateBarisSelect(){const s=document.getElementById('inSection')?.value,bs=document.getElementById('inBaris');if(!bs)return;bs.innerHTML='<option value="">-- Pilih --</option>';if(s){const bo=currentSections()[s]||{};Object.keys(bo).forEach((b,i)=>{bs.innerHTML+=`<option value="${b}">${s} ${String(i+1).padStart(2,'0')}</option>`;});if(Object.keys(bo).length>0){bs.value=Object.keys(bo)[0];updateSlotSelect();}}else{const ss=document.getElementById('inSlot');if(ss)ss.innerHTML='<option value="">-- Pilih Slot --</option>';}}

        function submitIn(e){e.preventDefault();const nama=document.getElementById('inNama').value.trim(),qty=document.getElementById('inQty').value.trim(),jenis=document.getElementById('inJenis').value,expDate=document.getElementById('inExpDate').value,estOutDate=document.getElementById('inEstOutDate').value,section=document.getElementById('inSection').value,baris=document.getElementById('inBaris').value,slotStr=document.getElementById('inSlot').value,km=document.getElementById('inKeranjangManual')?.value.trim();if(!nama||!qty||!baris||!slotStr||!expDate||!estOutDate)return showToast('Lengkapi data!');if(new Date(estOutDate)>new Date(expDate))return showToast('❌ Est Keluar tidak boleh > Exp!');const si=parseInt(slotStr)-1,slots=currentSections()[section]?.[baris];if(!slots)return showToast('Data baris tidak valid.');let no=slots[si];if(no===null||no===undefined){if(!km||isNaN(parseInt(km))||parseInt(km)<=0)return showToast('❌ Masukkan Nomor Keranjang Baru!');const nn=parseInt(km);for(const a of['frozen','chiller']){for(const[sk,bo]of Object.entries(appData[a].sections)){for(const sl of Object.values(bo)){if(sl.includes(nn))return showToast(`❌ Nomor ${nn} sudah digunakan di ${a} ${sk}.`);}}}slots[si]=nn;if(!currentBaskets()[nn])currentBaskets()[nn]={section,baris,slot:si+1,items:[]};else{currentBaskets()[nn].section=section;currentBaskets()[nn].baris=baris;currentBaskets()[nn].slot=si+1;}no=nn;}else{if(isBasketFull(no))return showToast(`❌ Keranjang ${no} penuh!`);}if(!currentBaskets()[no])currentBaskets()[no]={section,baris,slot:si+1,items:[]};const cu=auth.currentUser?.email||'unknown';const item={nama,qty,jenis,tglMasuk:new Date().toISOString(),addedBy:cu};if(expDate)item.expDate=expDate;if(estOutDate)item.estOutDate=estOutDate;currentBaskets()[no].items.push(item);currentBaskets()[no].lastModifiedBy=cu;currentBaskets()[no].lastModifiedAt=new Date().toISOString();logTransaction('in',{nama,qty,jenis,keranjang:no,section,baris,expDate,estOutDate,addedBy:cu});saveToFirestore();showToast('✅ Barang masuk ke keranjang '+no);setTimeout(()=>renderInputForm(),100);}

        // ==================== SEARCH ====================
        function renderSearch(){container.innerHTML=`<div class="search-container"><h3>🔍 Cari Barang</h3><div class="filter-row"><input type="date" id="searchDateFrom" onchange="performSearch()" placeholder="Exp dari"><input type="date" id="searchDateTo" onchange="performSearch()" placeholder="Exp sampai"><select id="searchStatus" onchange="performSearch()"><option value="">Semua Status</option><option value="expired">⚠️ Expired</option><option value="active">✅ Aktif</option><option value="out">📤 Sudah Keluar</option></select></div><div class="search-input-wrapper"><input type="text" id="searchInput" placeholder="Cari nama barang..." oninput="performSearch()" autocomplete="off"><span class="search-icon"><i class="fas fa-search"></i></span></div><div id="searchResults"><div class="empty-state">Ketik untuk mencari</div></div></div>`;setTimeout(()=>{const si=document.getElementById('searchInput');if(si)si.focus();},100);}
        function performSearch(){const q=document.getElementById('searchInput')?.value.trim().toLowerCase(),rc=document.getElementById('searchResults'),sf=document.getElementById('searchStatus')?.value,df=document.getElementById('searchDateFrom')?.value,dt=document.getElementById('searchDateTo')?.value;if(!q||q.length<2){rc.innerHTML='<div class="empty-state">Ketik minimal 2 karakter</div>';return;}const ar=[];collectSearchResults('frozen',q,ar);collectSearchResults('chiller',q,ar);let fl=ar;if(sf==='expired')fl=fl.filter(r=>r.item.expDate&&new Date(r.item.expDate)<new Date());else if(sf==='active')fl=fl.filter(r=>r.status==='current');else if(sf==='out')fl=fl.filter(r=>r.status==='out');if(df)fl=fl.filter(r=>r.item.expDate&&new Date(r.item.expDate)>=new Date(df));if(dt)fl=fl.filter(r=>r.item.expDate&&new Date(r.item.expDate)<=new Date(dt));if(fl.length===0){rc.innerHTML=`<div class="empty-state">Tidak ditemukan "${q}"</div>`;return;}const ci=fl.filter(r=>r.status==='current'),oi=fl.filter(r=>r.status==='out');let h=`<div class="search-stats"><div class="search-stat"><div class="count">${fl.length}</div><div class="label">Total</div></div><div class="search-stat"><div class="count" style="color:#10b981;">${ci.length}</div><div class="label">Masih Ada</div></div><div class="search-stat"><div class="count" style="color:#ef4444;">${oi.length}</div><div class="label">Keluar</div></div></div>`;fl.forEach(r=>{const ab=r.area==='frozen'?'<span class="area-badge area-frozen">❄️ Frozen</span>':'<span class="area-badge area-chiller">🌡️ Chiller</span>';const sb=r.status==='current'?'<span class="search-result-badge badge-current">📦 Masih Ada</span>':'<span class="search-result-badge badge-out">📤 Sudah Keluar</span>';const hn=highlightText(r.item.nama,q);let di='';if(r.status==='current'){di=`<div style="margin-top:6px;font-size:0.8rem;color:#64748b;">📍 Section: ${r.section} | Baris: ${r.baris} | Slot: ${r.slot} | Keranjang: ${r.keranjangNo}</div><div style="margin-top:2px;font-size:0.75rem;color:#475569;">👤 Ditambah oleh: <strong>${r.item.addedBy||'Tidak diketahui'}</strong>${r.item.tglMasuk?` | 📅 ${new Date(r.item.tglMasuk).toLocaleDateString('id-ID')}`:''}</div>`;}else{di=`<div style="margin-top:6px;font-size:0.8rem;color:#64748b;">📤 Keluar dari Keranjang: ${r.keranjangNo} | Section: ${r.section}<br>📅 Keluar: ${new Date(r.timestamp).toLocaleDateString('id-ID')}</div><div style="margin-top:2px;font-size:0.75rem;color:#475569;">👤 Dikeluarkan oleh: <strong>${r.user||'Tidak diketahui'}</strong></div>`;}const ei=r.item.expDate?`<div style="margin-top:4px;font-size:0.75rem;color:${new Date(r.item.expDate)<new Date()?'#ef4444':'#64748b'};">⏰ Exp: ${new Date(r.item.expDate).toLocaleDateString('id-ID')}${new Date(r.item.expDate)<new Date()?' ⚠️ EXPIRED':''}</div>`:'';const esi=r.item.estOutDate?`<div style="margin-top:2px;font-size:0.75rem;color:${new Date(r.item.estOutDate)<new Date()?'#ef4444':'#64748b'};">📅 Est. Keluar: ${new Date(r.item.estOutDate).toLocaleDateString('id-ID')}${new Date(r.item.estOutDate)<new Date()?' ⚠️ LEWAT':''}</div>`:'';h+=`<div class="search-result-item ${r.status}"><div class="search-result-header"><div>${ab}${sb}</div><div><small>${r.item.jenis||'-'}</small></div></div><div><strong>${hn}</strong> <span style="color:#64748b;">Qty: ${r.item.qty}</span></div>${di}${ei}${esi}${r.status==='current'?`<button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="navigateToBasket(${r.keranjangNo},'${r.area}')">📍 Lihat Keranjang</button>`:''}</div>`;});rc.innerHTML=h;}
        function collectSearchResults(area,q,results){const bsk=appData[area].baskets,trx=appData[area].transactions;for(const[kn,b]of Object.entries(bsk)){if(b.items&&b.items.length>0){b.items.forEach(it=>{if(it.nama&&it.nama.toLowerCase().includes(q)){results.push({area,status:'current',item:it,keranjangNo:parseInt(kn),section:b.section,baris:b.baris,slot:b.slot});}});}}const so=new Set();trx.forEach(t=>{if(t.type==='out'&&t.detail&&t.detail.nama&&t.detail.nama.toLowerCase().includes(q)){const key=`${t.detail.nama}_${t.detail.qty}_${t.timestamp}`;if(!so.has(key)){so.add(key);results.push({area,status:'out',item:{nama:t.detail.nama,qty:t.detail.qty,jenis:t.detail.jenis||'-',expDate:t.detail.expDate,estOutDate:t.detail.estOutDate},keranjangNo:t.detail.keranjang||'-',section:t.detail.section||'-',timestamp:t.timestamp,user:t.user});}}});}
        function highlightText(t,q){if(!t||!q)return t||'';const r=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');return t.replace(r,'<span class="search-highlight">$1</span>');}
        function navigateToBasket(kn,area){if(currentArea!==area){currentArea=area;document.getElementById('areaSelect').value=area;document.getElementById('areaTitle').textContent=area==='frozen'?'Frozen':'Chiller';}currentTab='dashboard';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));const dt=document.querySelector('.tab-btn[data-tab="dashboard"]');if(dt)dt.classList.add('active');renderDashboard();setTimeout(()=>{showBasketDetail(kn);},200);}

        // ==================== HISTORY ====================
        function renderHistory() {
    const list = currentTransactions().slice(0, 100).map(t => {
        let typeClass = '', badgeClass = '', icon = '', typeLabel = '';
        
        if (t.type === 'in') { 
            typeClass = 'type-in'; badgeClass = 'badge-in'; icon = '📥'; typeLabel = 'MASUK'; 
        }
        else if (t.type === 'move') { 
            typeClass = 'type-move'; badgeClass = 'badge-move'; icon = '🔄'; 
            typeLabel = t.detail?.jenis === 'KERANJANG' ? 'PINDAH KERANJANG' : 'PINDAH BARANG';
        }
        else if (t.type === 'edit') { 
            typeClass = 'type-edit'; badgeClass = 'badge-edit'; icon = '✏️'; typeLabel = 'EDIT EST'; 
        }
        else { 
            typeClass = 'type-out'; badgeClass = 'badge-out'; icon = '📤'; typeLabel = 'KELUAR'; 
        }
        
        const detail = t.detail || {};
        const userInfo = t.user 
            ? `<span style="font-size:0.7rem;color:#64748b;">👤 ${t.user}</span>`
            : '';
        
        let extraInfo = '';
        if (t.type === 'in') {
            extraInfo = `ditambahkan ke Keranjang <strong>${detail.keranjang || '-'}</strong> | Section: ${detail.section || '-'}`;
        } else if (t.type === 'move') {
            extraInfo = `dari <strong>${detail.dari || '-'}</strong> → <strong>${detail.ke || '-'}</strong>`;
        } else if (t.type === 'edit') {
            extraInfo = `Est: ${detail.oldEstOutDate || '-'} → <strong>${detail.newEstOutDate || '-'}</strong>`;
        } else if (t.type === 'out') {
            extraInfo = `dari Keranjang <strong>${detail.keranjang || '-'}</strong> | Section: ${detail.section || '-'}`;
            if (detail.partial) extraInfo += ' <span style="color:#f59e0b;">⚠️ Sebagian</span>';
        }
        
        return `<div class="history-item ${typeClass}">
            <div style="font-size:1.5rem;flex-shrink:0;">${icon}</div>
            <div style="flex:1;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                    <div>
                        <span class="history-badge ${badgeClass}">${typeLabel}</span>
                        ${userInfo}
                    </div>
                    <small style="color:#64748b;">${new Date(t.timestamp).toLocaleString('id-ID')}</small>
                </div>
                <div style="margin-top:4px;">
                    <strong>${detail.nama || '-'}</strong> — ${detail.qty || '-'} (${detail.jenis || '-'})
                </div>
                <div style="font-size:0.75rem;color:#64748b;margin-top:2px;">
                    ${extraInfo}
                </div>
            </div>
        </div>`;
    }).join('');
    
    container.innerHTML = `<div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
            <h3>📋 Riwayat Aktivitas</h3>
            <button class="btn btn-sm btn-outline" onclick="downloadExcel()">
                <i class="fas fa-download"></i> Excel
            </button>
        </div>
        ${list || '<div class="empty-state">Belum ada aktivitas</div>'}
    </div>`;
}

        // ==================== REKAP ====================
        function renderRekap(){const BULAN=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],trx=currentTransactions(),ny=new Date().getFullYear(),ys=new Set(trx.map(t=>new Date(t.timestamp).getFullYear())),years=[...ys].sort((a,b)=>b-a),sy=parseInt(document.getElementById('rekapYearFilter')?.value||ny);let ti=0,to=0;trx.forEach(t=>t.type==='in'?ti++:to++);const sb=`<div class="stat-grid"><div class="stat-box"><div class="val">${ti}</div><div class="lbl">Total Masuk</div></div><div class="stat-box out"><div class="val">${to}</div><div class="lbl">Total Keluar</div></div></div>`,mt=`<div class="rekap-tabs"><button class="rekap-tab ${rekapMode==='bulanan'?'active':''}" onclick="rekapMode='bulanan';renderRekap()">📅 Bulanan</button><button class="rekap-tab ${rekapMode==='tahunan'?'active':''}" onclick="rekapMode='tahunan';renderRekap()">📆 Tahunan</button></div>`;if(rekapMode==='bulanan'){const md={};trx.forEach(t=>{const d=new Date(t.timestamp);if(d.getFullYear()!==sy)return;const m=d.getMonth();if(!md[m])md[m]={in:0,out:0,bySection:{}};md[m][t.type]++;const sec=t.detail.section||'-';if(!md[m].bySection[sec])md[m].bySection[sec]={in:0,out:0};md[m].bySection[sec][t.type]++;});let rows='';for(let m=0;m<12;m++){const d=md[m];if(!d)continue;const badges=Object.entries(d.bySection).map(([s,v])=>`<span class="section-badge">${s}: +${v.in} -${v.out}</span>`).join('');rows+=`<tr><td><strong>${BULAN[m]} ${sy}</strong></td><td style="color:var(--primary);">+${d.in}</td><td style="color:var(--danger);">-${d.out}</td><td>${d.in-d.out>=0?'+':''}${d.in-d.out}</td><td>${badges}</td></tr>`;}if(!rows)rows=`<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:20px;">Tidak ada data tahun ${sy}</td></tr>`;const yo=years.map(y=>`<option value="${y}" ${y===sy?'selected':''}>${y}</option>`).join('')||`<option value="${ny}">${ny}</option>`;container.innerHTML=`<div class="card"><h3>📊 Rekap — ${currentArea.toUpperCase()}</h3>${sb}${mt}<div class="filter-row"><label>Tahun: <select id="rekapYearFilter" onchange="renderRekap()">${yo}</select></label><button class="btn btn-sm btn-outline" onclick="downloadRekapExcel()"><i class="fas fa-download"></i> Excel</button></div><div style="overflow-x:auto;"><table class="rekap-table"><thead><tr><th>Bulan</th><th>Masuk</th><th>Keluar</th><th>Selisih</th><th>Per Section</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;}else{const yd={};trx.forEach(t=>{const y=new Date(t.timestamp).getFullYear();if(!yd[y])yd[y]={in:0,out:0,bySection:{}};yd[y][t.type]++;const sec=t.detail.section||'-';if(!yd[y].bySection[sec])yd[y].bySection[sec]={in:0,out:0};yd[y].bySection[sec][t.type]++;});let rows='';[...Object.keys(yd)].sort((a,b)=>b-a).forEach(y=>{const d=yd[y];const badges=Object.entries(d.bySection).map(([s,v])=>`<span class="section-badge">${s}: +${v.in} -${v.out}</span>`).join('');rows+=`<tr><td><strong>${y}</strong></td><td style="color:var(--primary);">+${d.in}</td><td style="color:var(--danger);">-${d.out}</td><td>${d.in-d.out>=0?'+':''}${d.in-d.out}</td><td>${badges}</td></tr>`;});if(!rows)rows='<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:20px;">Belum ada data</td></tr>';container.innerHTML=`<div class="card"><h3>📊 Rekap — ${currentArea.toUpperCase()}</h3>${sb}${mt}<div class="filter-row"><button class="btn btn-sm btn-outline" onclick="downloadRekapExcel()"><i class="fas fa-download"></i> Excel</button></div><div style="overflow-x:auto;"><table class="rekap-table"><thead><tr><th>Tahun</th><th>Masuk</th><th>Keluar</th><th>Selisih</th><th>Per Section</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;}}
        function downloadExcel(){const at=[...appData.frozen.transactions.map(t=>({...t,area:'Frozen'})),...appData.chiller.transactions.map(t=>({...t,area:'Chiller'}))];at.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!at.length)return showToast('Tidak ada data');let h='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><h2>Riwayat Lengkap</h2><table border="1"><tr style="background:#2563eb;color:white;"><th>Area</th><th>Tanggal</th><th>Jenis</th><th>Item</th><th>Jumlah</th><th>Jenis Brg</th><th>Keranjang</th><th>Section</th><th>User</th><th>Exp</th><th>Est Out</th></tr>';at.forEach(t=>{const d=t.detail;h+=`<tr><td>${t.area}</td><td>${new Date(t.timestamp).toLocaleString('id-ID')}</td><td>${t.type==='in'?'Masuk':t.type==='move'?'Pindah':t.type==='edit'?'Edit Estimasi':'Keluar'}</td><td>${d.nama||''}</td><td>${d.qty||''}</td><td>${d.jenis||''}</td><td>${d.keranjang||d.dari||''}</td><td>${d.section||''}</td><td>${t.user}</td><td>${d.expDate||''}</td><td>${d.newEstOutDate||d.estOutDate||''}</td></tr>`;});h+='</table></body></html>';_dlBlob(h,`riwayat_lengkap_${new Date().toISOString().split('T')[0]}.xls`);}
        function downloadRekapExcel(){const trx=currentTransactions();if(!trx.length)return showToast('Tidak ada data');let h='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><h2>Rekap — '+currentArea.toUpperCase()+'</h2><table border="1"><tr style="background:#2563eb;color:white;"><th>Periode</th><th>Masuk</th><th>Keluar</th><th>Selisih</th></tr>';const BULAN=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],md={};trx.forEach(t=>{const d=new Date(t.timestamp),k=rekapMode==='bulanan'?`${BULAN[d.getMonth()]} ${d.getFullYear()}`:`${d.getFullYear()}`;if(!md[k])md[k]={in:0,out:0};md[k][t.type]++;});Object.entries(md).forEach(([k,v])=>{h+=`<tr><td>${k}</td><td>+${v.in}</td><td>-${v.out}</td><td>${v.in-v.out>=0?'+':''}${v.in-v.out}</td></tr>`;});h+='</table></body></html>';_dlBlob(h,`rekap_${currentArea}_${new Date().toISOString().split('T')[0]}.xls`);}
        function _dlBlob(html,fn){const b=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();}

        // ==================== MANAGE ====================
        function renderManageBaskets(){if(!isAdmin()){container.innerHTML='<div class="card"><h3>⚙️ Atur Nomor Keranjang</h3><p style="color:#ef4444;font-weight:600;">🔒 Hanya admin.</p></div>';return;}let h='<div class="card"><h3>⚙️ Atur Slot Keranjang</h3>';for(const[sn,bo]of Object.entries(currentSections())){h+=`<div style="margin-bottom:20px;"><strong>📍 ${sn}</strong>`;for(const[br,sl]of Object.entries(bo)){h+=`<div style="margin-left:8px;margin-bottom:10px;"><span class="baris-label">📌 Baris ${br}</span>`;for(let i=0;i<5;i++){const no=sl[i];if(no){const c=itemCount(no);h+=`<div style="display:inline-flex;align-items:center;gap:6px;margin:4px;"><span class="chip">Slot ${i+1}: ${no} (${c}/${getBasketCapacity(no)}) <span style="cursor:pointer;color:red;margin-left:4px;" onclick="clearSlot('${sn}','${br}',${i})">✕</span></span></div>`;}else{h+=`<div style="display:inline-flex;align-items:center;gap:6px;margin:4px;"><span class="chip" style="background:#f1f5f9;border:1px dashed #cbd5e1;">Slot ${i+1}: kosong</span><input type="number" id="inp_${sn}_${br}_${i}" placeholder="No" style="width:80px;padding:4px;"><button class="btn btn-sm btn-primary" onclick="fillSlot('${sn}','${br}',${i})">Isi</button></div>`;}}h+='</div>';}h+=`<div><button class="btn btn-sm btn-outline" onclick="addBaris('${sn}')">➕ Tambah Baris Baru</button></div></div>`;}h+='</div>';container.innerHTML=h;}
        window.clearSlot=function(s,b,i){if(!isAdmin())return;const sl=currentSections()[s]?.[b];if(!sl||!sl[i])return;const no=sl[i];if(confirm(`Hapus keranjang ${no} dari Slot ${i+1}?`)){sl[i]=null;saveToFirestore();showToast('Slot dikosongkan.');renderManageBaskets();}};
        window.fillSlot=function(s,b,i){if(!isAdmin())return;const inp=document.getElementById(`inp_${s}_${b}_${i}`),v=parseInt(inp?.value);if(!v)return showToast('Masukkan nomor.');for(const[sk,bo]of Object.entries(currentSections())){for(const sl of Object.values(bo)){if(sl.includes(v))return showToast(`Nomor ${v} sudah digunakan di ${sk}.`);}}currentSections()[s][b][i]=v;saveToFirestore();showToast('Slot diisi.');renderManageBaskets();};
        function addBaris(s){if(!isAdmin())return;const sec=currentSections(),bo=sec[s],nb=String.fromCharCode(65+Object.keys(bo).length);bo[nb]=[null,null,null,null,null];saveToFirestore();showToast(`Baris ${nb} ditambahkan.`);renderManageBaskets();}

        // ==================== INIT ====================
        document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');currentTab=this.dataset.tab;renderCurrentTab();});});
        document.getElementById('areaSelect').value=currentArea;
    </script>
